function renderBaristaDashboard() {
  const me = currentEmployee();
  if (!me) return renderDashboard();

  const today = todayISO();
  const myAttendance = (state.attendance||[]).filter(a => a.employeeId === me.id);
  const myToday = myAttendance.find(a => a.date === today);

  const now = new Date();
  // Week starts Monday: dow=0 → Mon. Saturday is dow 5, Sunday is 6.
  const dow = (now.getDay() + 6) % 7;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dow);
  weekStart.setHours(0,0,0,0);
  const weekStartISO = weekStart.toISOString().slice(0,10);
  const weekRecords = myAttendance.filter(a => a.date >= weekStartISO && a.date <= today);
  const weekMinutes = weekRecords.reduce((s,a) => s + (a.clockIn && a.clockOut ? diffMinutes(a.clockIn, a.clockOut) : 0), 0);
  const weekHours = (weekMinutes / 60).toFixed(1);
  const weekDays = new Set(weekRecords.map(a => a.date)).size;

  const balances = state.leaveBalances[me.id] || { annual:0, sick:0, personal:0 };

  const myPayroll = (state.payroll||[])
    .filter(p => p.employeeId === me.id)
    .slice().sort((a,b) => (b.period||'').localeCompare(a.period||''))
    .slice(0, 3);

  const myLeave = (state.leaveRequests||[])
    .filter(r => r.employeeId === me.id)
    .slice().sort((a,b) => (b.startDate||'').localeCompare(a.startDate||''))
    .slice(0, 3);

  const ex = getEmpExtras(me.id);
  const todayDow = now.getDay();
  const sched = (ex && ex.schedule && ex.schedule[todayDow]) || { off:false, start: state.settings.workStart||'09:00', end: state.settings.workEnd||'17:00' };

  // Status text + CTA label
  let statusText, statusSub, ctaLabel;
  if (sched.off) {
    statusText = 'Day off'; statusSub = 'Enjoy your rest day.';
    ctaLabel = null;
  } else if (!myToday) {
    statusText = 'Not clocked in yet'; statusSub = `Shift ${sched.start} – ${sched.end}`;
    ctaLabel = t('clock_in');
  } else if (!myToday.clockOut) {
    statusText = 'On the floor';
    statusSub = `Clocked in at ${myToday.clockIn || '—'}`;
    ctaLabel = t('clock_out');
  } else {
    const mins = diffMinutes(myToday.clockIn, myToday.clockOut);
    statusText = 'Done for today';
    statusSub = `${myToday.clockIn} – ${myToday.clockOut} · ${(mins/60).toFixed(1)} hrs`;
    ctaLabel = null;
  }

  const roleName = roleLabel(me.systemRole);

  return `
    <!-- Hero + clock -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="md:col-span-2 bg-white rounded-2xl shadow-card p-6 relative overflow-hidden">
        <div class="absolute -top-12 -right-12 w-48 h-48 rounded-full opacity-20" style="background: radial-gradient(circle, #c2914a 0%, transparent 70%);"></div>
        <div class="relative">
          <div class="text-[11px] uppercase tracking-[0.18em] text-brand-700 font-semibold">${escapeHTML(roleName)}</div>
          <h2 class="font-display text-3xl md:text-4xl font-semibold text-slate-900 mt-2 leading-tight">${escapeHTML(t('welcome_back'))}, ${escapeHTML(me.firstName)}.</h2>
          <p class="text-slate-500 mt-2 max-w-md">Track your day, request time off, and check your payroll.</p>
          ${ctaLabel ? `<a href="#/attendance" class="btn btn-primary shadow-card hover:shadow-pop mt-4 inline-flex">${icon('clock','w-4 h-4')} ${escapeHTML(ctaLabel)}</a>` : ''}
        </div>
      </div>
      <div class="clock-tile rounded-2xl shadow-card p-6 flex flex-col justify-center relative">
        <div class="relative z-10">
          <div class="text-white/70 text-[11px] uppercase tracking-[0.2em] font-semibold">${escapeHTML(t('today'))}</div>
          <div class="font-display text-5xl font-semibold mt-2 tabular-nums" id="dash-clock">${new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="flex items-center gap-2 mt-4 text-white/85 text-xs">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
            ${sched.off ? 'Day off' : `Shift ${sched.start} – ${sched.end}`}
          </div>
        </div>
      </div>
    </div>

    <!-- Today's status + week hours -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Today's status</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-1">${escapeHTML(statusText)}</div>
        <div class="text-sm text-slate-500 mt-1">${escapeHTML(statusSub)}</div>
      </div>
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">This week</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-1">${weekHours} hrs</div>
        <div class="text-sm text-slate-500 mt-1">${weekDays} day${weekDays===1?'':'s'} present</div>
      </div>
    </div>

    <!-- Leave balance -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-white rounded-2xl shadow-card p-4">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Annual leave</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-1">${balances.annual||0}</div>
        <div class="text-xs text-slate-500">days remaining</div>
      </div>
      <div class="bg-white rounded-2xl shadow-card p-4">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Sick leave</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-1">${balances.sick||0}</div>
        <div class="text-xs text-slate-500">days remaining</div>
      </div>
      <div class="bg-white rounded-2xl shadow-card p-4">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Personal leave</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-1">${balances.personal||0}</div>
        <div class="text-xs text-slate-500">days remaining</div>
      </div>
    </div>

    <!-- Recent payslips + leave requests -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Recent payslips</div>
            <div class="font-display text-lg font-semibold text-slate-900">Latest pay</div>
          </div>
          <a href="#/payroll" class="text-sm text-brand-700 hover:underline">View all &rarr;</a>
        </div>
        ${myPayroll.length === 0 ? `
          <div class="text-sm text-slate-500 text-center py-6">No payslips yet.</div>
        ` : `
          <div class="divide-y divide-slate-100 -mx-1">
            ${myPayroll.map(p => `
              <div class="px-1 py-3 flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-brand-50 text-brand-700 flex items-center justify-center shrink-0">${icon('wallet','w-4 h-4')}</div>
                <div class="flex-1 min-w-0">
                  <div class="font-medium text-slate-900 truncate">${escapeHTML(p.period||'')}</div>
                  <div class="text-xs text-slate-500 truncate">${escapeHTML((p.status||'').toString().toUpperCase())}${p.paidAt?' &middot; paid '+escapeHTML(fmtDate(p.paidAt)):''}</div>
                </div>
                <div class="font-semibold text-slate-900 shrink-0">${fmtMoney(p.net)}</div>
              </div>`).join('')}
          </div>
        `}
      </div>

      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="flex items-center justify-between mb-4">
          <div>
            <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Leave requests</div>
            <div class="font-display text-lg font-semibold text-slate-900">My recent leave</div>
          </div>
          <a href="#/leave" class="text-sm text-brand-700 hover:underline">${myLeave.length ? 'View all &rarr;' : escapeHTML(t('request_leave'))}</a>
        </div>
        ${myLeave.length === 0 ? `

            <a href="#/leave" class="btn btn-primary btn-sm mt-3 inline-flex">${icon('plus','w-4 h-4')} ${escapeHTML(t('request_leave'))}</a>
          </div>
        ` : `
          <div class="divide-y divide-slate-100 -mx-1">
            ${myLeave.map(r => {
              const pillClass = r.status==='approved' ? 'bg-emerald-50 text-emerald-700'
                              : r.status==='rejected' ? 'bg-rose-50 text-rose-700'

              return `

function openReceiptModal() {
  _receiptFile = null;
  const today = new Date().toISOString().slice(0,10);
  const cur = state.settings.currency || 'SAR';
  const form = `
    <div class="space-y-4">
      <div>
        <label class="label">Receipt photo / scan</label>
        <input id="rc-file" type="file" class="input" accept="image/*,application/pdf" capture="environment" onchange="handleReceiptFile(event)">
        <div class="text-xs text-slate-500 mt-1">Max 5MB. Image (PNG/JPG/WebP) or PDF. On phones, the camera will open.</div>
        <div id="rc-preview" class="mt-2"></div>
        <div class="mt-3 flex items-center gap-3 flex-wrap">
          <button type="button" id="rc-ocr-btn" onclick="runReceiptOCR()" class="btn btn-ghost btn-sm" disabled title="Upload a receipt first">
            ${icon('eye','w-4 h-4')} Extract details
          </button>
          <span id="rc-ocr-status" class="text-xs text-slate-500"></span>
        </div>
        <details id="rc-ocr-details" class="mt-2 hidden">
          <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-700">Show extracted text</summary>
          <pre id="rc-ocr-text" class="mt-1 text-[11px] leading-snug bg-slate-50 p-2 rounded-lg whitespace-pre-wrap max-h-40 overflow-auto text-slate-700"></pre>
        </details>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="label">Vendor / Supplier</label>
          <input id="rc-vendor" class="input" placeholder="e.g. Tamimi Markets">
        </div>
        <div>
          <label class="label">Date</label>
          <input id="rc-date" type="date" class="input" value="${today}">
        </div>
        <div>
          <label class="label">Amount (${escapeHTML(cur)})</label>
          <input id="rc-amount" type="number" min="0" step="0.01" class="input" placeholder="0.00">
        </div>
        <div>
          <label class="label">Category</label>
          <select id="rc-cat" class="input">
            ${Object.entries(RECEIPT_CATEGORIES).map(([k,c]) => `<option value="${k}">${escapeHTML(c.label)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div>
        <label class="label">Notes (optional)</label>
        <textarea id="rc-notes" class="input" rows="2" placeholder="e.g. weekly bean restock, invoice #..."></textarea>
      </div>
    </div>
  `;
  openModal('Add receipt', form, async () => {
    const me = currentEmployee();
    const vendor   = $('#rc-vendor').value.trim();
    const date     = $('#rc-date').value;
    const amount   = parseFloat($('#rc-amount').value);
    const category = $('#rc-cat').value;
    const notes    = $('#rc-notes').value.trim();
    if (!vendor) { toast('Vendor is required', 'error'); return false; }
    if (!date)   { toast('Date is required', 'error');   return false; }
    if (isNaN(amount) || amount < 0) { toast('Amount must be a positive number', 'error'); return false; }
    const payload = receiptToDb({
      vendor, receiptDate: date, amount, category, notes,
      currency: state.settings.currency || 'SAR',
      mime: _receiptFile?.mime || null,
      size: _receiptFile?.size || 0,
      dataUrl: _receiptFile?.dataUrl || null,
      uploadedBy: me?.id,
    });
    const { data, error } = await sb.from('receipts').insert(payload).select().single();
    if (error) { toast(error.message, 'error'); return false; }
    state.receipts.unshift(mapReceiptFromDb(data));
    _receiptFile = null;
    render();
    toast('Receipt saved', 'success');
    return true;
  }, { saveLabel: 'Save receipt' });
}

async function handleReceiptFile(ev) {
  const f = await readUploadedFile(ev, {
    allowed: RECEIPT_ALLOWED_MIMES,
    errorMsg: 'Unsupported file type. Use an image (PNG/JPG/WebP) or PDF.',
  });
  if (!f) return;
  _receiptFile = { name: f.name, mime: f.mime, size: f.size, dataUrl: f.dataUrl };
  const isImage = f.mime.startsWith('image/');
  const p = document.getElementById('rc-preview');
  if (p) {
    p.innerHTML = isImage
      ? `<img src="${f.dataUrl}" alt="Receipt preview" class="max-h-48 rounded-lg border border-slate-200" />`
      : `<div class="text-sm text-slate-700">${icon('check','w-4 h-4 inline text-emerald-600')} Loaded <strong>${escapeHTML(f.name)}</strong> (${(f.size/1024).toFixed(1)} KB)</div>`;
  }
  // OCR works on images directly and on PDFs via pdf.js (renders page 1 to
  // a canvas, then hands the canvas to Tesseract).
  const ocrBtn = document.getElementById('rc-ocr-btn');
  if (ocrBtn) {
    ocrBtn.disabled = false;
    ocrBtn.title = isImage
      ? 'Run OCR on the image and pre-fill the form'
      : 'Render the first PDF page and OCR it';
  }
}

// Lazy-load tesseract.js from CDN on first OCR attempt. ~2MB plus
// per-language data (cached by the browser after the first run).
// Pinned to v4.1.4: v5 sometimes fails silently from CDN when its
// auto-path-detection can't find the worker/core scripts. v4's simple
// recognize API is robust from a plain <script src=>.
const TESSERACT_VERSION = '4.1.4';
let _tesseractLoadingPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (_tesseractLoadingPromise) return _tesseractLoadingPromise;
  _tesseractLoadingPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = `https://cdn.jsdelivr.net/npm/tesseract.js@${TESSERACT_VERSION}/dist/tesseract.min.js`;
    s.onload = () => window.Tesseract ? resolve(window.Tesseract) : reject(new Error('OCR engine missing after load'));
    s.onerror = () => { _tesseractLoadingPromise = null; reject(new Error('Failed to load OCR engine (offline?)')); };
    document.head.appendChild(s);
  });
  return _tesseractLoadingPromise;
}

// Lazy-load pdf.js (pdfjs-dist v3 — last UMD release before the ESM switch,
// works fine via plain <script src=>). Used to render the first page of a
// PDF receipt to a JPEG so Tesseract can OCR it. ~400KB + a separate worker.
let _pdfjsLoadingPromise = null;
const PDFJS_VERSION = '3.11.174';
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (_pdfjsLoadingPromise) return _pdfjsLoadingPromise;
  _pdfjsLoadingPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/build/pdf.min.js`;
    s.onload = () => {
      if (!window.pdfjsLib) { reject(new Error('pdfjsLib missing after load')); return; }
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        `https://cdn.jsdelivr.net/npm/pdfjs-dist@${PDFJS_VERSION}/build/pdf.worker.min.js`;
      resolve(window.pdfjsLib);
    };
    s.onerror = () => { _pdfjsLoadingPromise = null; reject(new Error('Failed to load PDF engine (offline?)')); };
    document.head.appendChild(s);
  });
  return _pdfjsLoadingPromise;
}

// Renders the first page of a PDF (passed as a data URL) to a JPEG data URL
// suitable for handing to Tesseract. scale=2 puts the raster at ~144dpi which
// is the sweet spot for OCR accuracy without ballooning canvas memory.
async function pdfFirstPageToImageDataUrl(pdfDataUrl) {
  const pdfjs = await loadPdfJs();
  const base64 = String(pdfDataUrl).split(',')[1] || '';
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const pdf = await pdfjs.getDocument({ data: bytes }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement('canvas');
  canvas.width  = Math.ceil(viewport.width);
  canvas.height = Math.ceil(viewport.height);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return canvas.toDataURL('image/jpeg', 0.92);
}

async function runReceiptOCR() {
  if (!_receiptFile) { toast('Upload a receipt first.', 'error'); return; }
  const mime = (_receiptFile.mime||'').toLowerCase();
  const isPdf = mime === 'application/pdf';
  if (!isPdf && !mime.startsWith('image/')) {
    toast('OCR only works on images or PDFs.', 'error');
    return;
  }
  const btn = document.getElementById('rc-ocr-btn');
  const status = document.getElementById('rc-ocr-status');
  const details = document.getElementById('rc-ocr-details');
  const dump = document.getElementById('rc-ocr-text');
  if (btn) btn.disabled = true;
  if (status) status.innerHTML = '<span class="text-slate-500">Loading OCR engine…</span>';
  try {
    // Kick off Tesseract loading in parallel — on the PDF path the page
    // render runs concurrently, saving a round trip on first use.
    const tesseractPromise = loadTesseract();
    let imageDataUrl = _receiptFile.dataUrl;
    if (isPdf) {
      if (status) status.innerHTML = '<span class="text-slate-500">Rendering PDF page…</span>';
      imageDataUrl = await pdfFirstPageToImageDataUrl(_receiptFile.dataUrl);
    }
    const Tesseract = await tesseractPromise;
    if (status) status.innerHTML = '<span class="text-slate-500">Reading receipt… 0%</span>';
    const { data } = await Tesseract.recognize(imageDataUrl, 'eng+ara', {
      logger: m => {
        if (m.status === 'recognizing text' && status) {
          status.innerHTML = `<span class="text-slate-500">Reading receipt… ${Math.round((m.progress||0)*100)}%</span>`;
        }
      }
    });
    const text = (data?.text || '').trim();
    if (dump) dump.textContent = text || '(no text detected)';
    if (details) details.classList.remove('hidden');
    if (!text) {
      if (status) status.innerHTML = '<span class="text-amber-700">No text detected — try a clearer photo.</span>';
      return;
    }
    const parsed = parseReceiptText(text);
    const filled = [];
    const amountEl = $('#rc-amount');
    const dateEl   = $('#rc-date');
    const vendorEl = $('#rc-vendor');
    if (parsed.amount != null && amountEl && !amountEl.value) { amountEl.value = parsed.amount; filled.push('amount'); }
    if (parsed.date && dateEl) { dateEl.value = parsed.date; filled.push('date'); }
    if (parsed.vendor && vendorEl && !vendorEl.value.trim()) { vendorEl.value = parsed.vendor; filled.push('vendor'); }
    if (status) {
      status.innerHTML = filled.length
        ? `<span class="text-emerald-700">Filled ${filled.join(', ')} — review and edit as needed.</span>`
        : `<span class="text-amber-700">Couldn't auto-fill — see extracted text below.</span>`;
    }
    // Swap the receipt photo / "Loaded …" badge for a structured summary of
    // what OCR found. The raw text stays available via the <details> panel
    // below; the form fields below got pre-filled.
    const previewEl = document.getElementById('rc-preview');
    if (previewEl) {
      const cur = state.settings.currency || 'SAR';
      const fmt = v => v ? escapeHTML(String(v)) : '<span class="text-slate-400">—</span>';
      previewEl.innerHTML = `
        <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
          <div class="text-[10px] uppercase tracking-wider text-emerald-700 font-semibold mb-2 flex items-center gap-1.5">${icon('check','w-3.5 h-3.5')} Extracted from receipt</div>
          <dl class="text-sm space-y-1">
            <div class="flex justify-between gap-3"><span class="text-slate-500">Vendor</span><span class="font-medium text-slate-900 truncate max-w-[60%] text-end">${fmt(parsed.vendor)}</span></div>
            <div class="flex justify-between gap-3"><span class="text-slate-500">Date</span><span class="font-medium text-slate-900">${fmt(parsed.date)}</span></div>
            <div class="flex justify-between gap-3"><span class="text-slate-500">Amount</span><span class="font-medium text-slate-900">${parsed.amount != null ? `${escapeHTML(cur)} ${escapeHTML(String(parsed.amount))}` : '<span class="text-slate-400">—</span>'}</span></div>
          </dl>
          <div class="text-[10px] text-emerald-700 mt-3">Review and edit the fields below before saving.</div>
        </div>
      `;
    }
  } catch (e) {
    // Log the full error to devtools so users can copy/paste it back when
    // reporting issues — toast space is limited, console isn't.
    console.error('Receipt OCR failed:', e);
    const detail = e?.message
      || (typeof e === 'string' ? e : '')
      || (e?.name)
      || 'check the browser console for details';
    toast('OCR failed: ' + detail, 'error');
    if (status) status.innerHTML = '';
  } finally {
    if (btn) btn.disabled = false;
  }
}

// Best-effort parse of OCR output for vendor, date, and amount. Bilingual
// (English + Saudi-Arabic) — looks for currency keywords, common date
// formats, and falls back to the largest plausible number for amount.
function parseReceiptText(text) {
  const out = { amount: null, date: null, vendor: null };
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // Amount — collect every number that looks like money. Prefer ones on
  // lines mentioning "total" / "إجمالي" / "المجموع" / "grand total" / "net".
  const numRe = /(?:SAR|ر\.?س|ريال|\$|USD|AED|EUR)?\s*(\d{1,7}(?:[.,]\d{1,2})?)\s*(?:SAR|ر\.?س|ريال|\$|USD|AED|EUR)?/gi;
  const totalKw = /(total|grand\s*total|amount|net|إجمالي|المجموع|الإجمالي)/i;
  const candidates = [];
  for (const line of lines) {
    let m; numRe.lastIndex = 0;
    while ((m = numRe.exec(line)) !== null) {
      const n = parseFloat(m[1].replace(',', '.'));
      if (!isNaN(n) && n > 0 && n < 1_000_000) {
        candidates.push({ val: n, hasKeyword: totalKw.test(line) });
      }
    }
  }
  if (candidates.length) {
    const kw = candidates.filter(c => c.hasKeyword);
    const pool = kw.length ? kw : candidates;
    const best = pool.reduce((b, c) => c.val > b.val ? c : b, pool[0]);
    out.amount = best.val.toFixed(2);
  }

  // Date — try common Saudi-receipt formats. First plausible hit wins.
  const dateRes = [
    /(20\d{2})[-/.](\d{1,2})[-/.](\d{1,2})/,         // 2026-05-14
    /(\d{1,2})[-/.](\d{1,2})[-/.](20\d{2})/,         // 14-05-2026
    /(\d{1,2})[-/.](\d{1,2})[-/.](\d{2})(?!\d)/,     // 14-05-26 → 2026
  ];
  outer: for (const line of lines) {
    for (const re of dateRes) {
      const m = re.exec(line);
      if (!m) continue;
      let y, mo, d;
      if (m[1].length === 4) { y = +m[1]; mo = +m[2]; d = +m[3]; }
      else if (m[3].length === 4) { y = +m[3]; mo = +m[2]; d = +m[1]; }
      else { y = 2000 + +m[3]; mo = +m[2]; d = +m[1]; }
      if (y >= 2000 && mo>=1 && mo<=12 && d>=1 && d<=31) {
        out.date = `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        break outer;
      }
    }
  }

  // Vendor — first short, mostly-letter line that isn't a date/number blob.
  for (const line of lines) {
    if (line.length < 2 || line.length > 50) continue;
    if (/\d{4}/.test(line)) continue;
    const letters = (line.match(/[A-Za-z؀-ۿ]/g) || []).length;
    if (letters >= 3 && letters / line.length > 0.5) {
      out.vendor = line.replace(/\s+/g, ' ').trim();
      break;
    }
  }

  return out;
}

function previewReceipt(id) {
  const r = (state.receipts||[]).find(x => x.id === id);
  if (!r) return;
  const url = safeReceiptDataUrl(r);
  if (!url) { toast('Cannot preview this receipt', 'error'); return; }
  const w = window.open();
  if (!w) { toast('Popup blocked', 'error'); return; }
  if ((r.mime||'').startsWith('image/')) {
    w.document.write(`<title>${escapeHTML(r.vendor)} &mdash; receipt</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${url}" alt="" style="max-width:100%;max-height:100vh" /></body>`);
  } else {
    w.location.href = url;
  }
}

async function deleteReceipt(id) {
  if (!confirm('Delete this receipt permanently?')) return;
  const { error } = await sb.from('receipts').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.receipts = state.receipts.filter(r => r.id !== id);
  render();
  toast('Receipt deleted', 'success');
}

function printReceiptsReport() {
  const records = getReceiptsFiltered();
  if (records.length === 0) { toast('No receipts to print — adjust the filter first', 'error'); return; }
  const f = receiptsFilter;
  const cur = state.settings.currency || 'SAR';

  records.sort((a,b) =>
    (a.receiptDate||'').localeCompare(b.receiptDate||'') ||
    (a.uploadedAt||'').localeCompare(b.uploadedAt||'')
  );

  // Group by month, then by day, for the printed output (chronological asc).
  const byMonthDay = {};
  records.forEach(r => {
    const m = (r.receiptDate||'').slice(0,7) || 'Unknown';
    const d = r.receiptDate || 'Unknown';
    if (!byMonthDay[m]) byMonthDay[m] = {};
    (byMonthDay[m][d] = byMonthDay[m][d] || []).push(r);
  });
  const sortedMonths = Object.keys(byMonthDay).sort();

  const grandTotal = records.reduce((s,r) => s + (Number(r.amount)||0), 0);
  const distinctVendors = new Set(records.map(r => (r.vendor||'').trim().toLowerCase()).filter(Boolean));

  const distinctCategories = new Set(records.map(r => r.category || 'other'));

  const catLabel = f.category === 'all' ? 'All categories' : (RECEIPT_CATEGORIES[f.category]?.label || f.category);
  const upLabel = f.uploader === 'all' ? 'All people' : (() => {
    const e = getEmployee(f.uploader);
    return e ? ((e.firstName||'') + ' ' + (e.lastName||'')).trim() : 'Unknown';
  })();
  const dateLabel = (f.dateFrom || f.dateTo)
    ? `${f.dateFrom ? fmtDate(f.dateFrom) : '—'} → ${f.dateTo ? fmtDate(f.dateTo) : '—'}`
    : 'All dates';
  const vendorLabel = (f.vendor || '').trim() || 'All vendors';

  const html = `<!doctype html><html><head><meta charset="utf-8"><title>Receipts Report — ${escapeHTML(state.settings.companyName||'')}</title>
  <style>
    ${LETTERHEAD_CSS}
    .page { max-width:900px; }
    .filter-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:16px 18px; background:#fafafa; border:1px solid #e5e7eb; margin:8px 0 22px; }
    .filter-summary .lbl { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
    .filter-summary .val { font-size:13px; color:#0f172a; font-weight:600; margin-top:3px; word-break:break-word; }
    .stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:0 0 24px; }
    .stat { border:1px solid #e5e7eb; padding:14px 16px; }
    .stat .lbl { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
    .stat .val { font-size:20px; font-weight:700; margin-top:6px; color:#0f172a; }
    .month-block { margin: 0 0 26px; page-break-inside: avoid; }
    .month-head { display:flex; justify-content:space-between; align-items:baseline; padding:10px 12px; background:#0f172a; color:#fff; }
    .month-head .ttl { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
    .month-head .sub { font-size:11px; opacity:.85; }
    table.receipts { width:100%; border-collapse:collapse; font-size:12px; }
    table.receipts th { text-align:left; padding:8px 10px; background:#fafafa; color:#0f172a; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; border-bottom:1px solid #e5e7eb; }
    table.receipts td { padding:8px 10px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
    table.receipts td.amount, table.receipts th.amount { text-align:right; font-variant-numeric: tabular-nums; }
    .day-row td { background:#f8fafc; font-size:11px; color:#475569; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
    .month-foot { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:#fdf6e8; border-top:1px solid #e5e7eb; }
    .month-foot .lbl { font-size:12px; font-weight:700; color:#0f172a; }
    .month-foot .val { font-size:16px; font-weight:800; color:#7a4f1d; }
    .by-person { padding:10px 12px; background:#fafafa; border-top:1px solid #e5e7eb; }
    .by-person .lbl { font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; margin-bottom:6px; }
    .by-person ul { list-style:none; padding:0; margin:0; columns:2; column-gap:18px; font-size:12px; color:#0f172a; }

    @media print {

  <div class="actions" style="margin:18px;"><button class="btn" onclick="window.print()">Print or Save as PDF</button></div>
  <div class="page">

    <div class="doc-date">Date Range: ${escapeHTML(dateLabel)}</div>
    <p class="doc-intro">Itemised list of receipts for the period and filters specified below. Issued by the Accounting Department.</p>
    <div class="filter-summary">
      <div><div class="lbl">Date Range</div><div class="val">${escapeHTML(dateLabel)}</div></div>

    </div>
    <div class="stat-row">
      <div class="stat"><div class="lbl">Receipts</div><div class="val">${records.length}</div></div>
      <div class="stat"><div class="lbl">Total (${escapeHTML(cur)})</div><div class="val">${fmtMoney(grandTotal)}</div></div>
      <div class="stat"><div class="lbl">Vendors</div><div class="val">${distinctVendors.size}</div></div>
      <div class="stat"><div class="lbl">People</div><div class="val">${distinctUploaders.size}</div></div>
    </div>
    ${sortedMonths.map(month => {
      const dayMap = byMonthDay[month];
      const monthList = Object.values(dayMap).flat();
      const monthTotal = monthList.reduce((s,r) => s + (Number(r.amount)||0), 0);
      const sortedDays = Object.keys(dayMap).sort();
      const byPerson = {};
      monthList.forEach(r => {
        const pid = r.uploadedBy || '__unknown__';
        if (!byPerson[pid]) byPerson[pid] = { count:0, total:0 };
        byPerson[pid].count++;
        byPerson[pid].total += Number(r.amount)||0;
      });
      const persons = Object.entries(byPerson).sort((a,b) => b[1].total - a[1].total);
      return `
        <div class="month-block">
          <div class="month-head">
            <div class="ttl">${escapeHTML(monthLabel(month))}</div>
            <div class="sub">${monthList.length} item${monthList.length===1?'':'s'}</div>
          </div>
          <table class="receipts">
            <thead>
              <tr>
                <th style="width:90px">Date</th>
                <th>Vendor / Supplier</th>
                <th>Category</th>
                <th>Posted By</th>
                <th>Notes</th>
                <th class="amount" style="width:110px">Amount (${escapeHTML(cur)})</th>
              </tr>
            </thead>
            <tbody>
              ${sortedDays.map(day => {
                const list = dayMap[day];
                const dayTotal = list.reduce((s,r) => s + (Number(r.amount)||0), 0);
                return `

                    const cat = RECEIPT_CATEGORIES[r.category] || RECEIPT_CATEGORIES.other;
                    const emp = getEmployee(r.uploadedBy);
                    const name = emp ? ((emp.firstName||'')+' '+(emp.lastName||'')).trim() : '—';
                    return `
                      <tr>
                        <td>${escapeHTML(fmtDate(r.receiptDate||''))}</td>
                        <td>${escapeHTML(r.vendor||'')}</td>
                        <td>${escapeHTML(cat.label)}</td>
                        <td>${escapeHTML(name)}</td>
                        <td>${escapeHTML(r.notes||'')}</td>
                        <td class="amount">${fmtMoney(r.amount)}</td>
                      </tr>`;
                  }).join('')}`;
              }).join('')}
            </tbody>
          </table>
          <div class="by-person">
            <div class="lbl">Posted by</div>
            <ul>
              ${persons.map(([pid,info]) => {
                const emp = pid === '__unknown__' ? null : getEmployee(pid);
                const name = emp ? ((emp.firstName||'')+' '+(emp.lastName||'')).trim() : 'Unknown';
                return `<li><span class="nm">${escapeHTML(name)}</span> &mdash; ${info.count} receipt${info.count===1?'':'s'} <span class="am">${fmtMoney(info.total)}</span></li>`;
              }).join('')}
            </ul>
          </div>
          <div class="month-foot">
            <div class="lbl">${escapeHTML(monthLabel(month))} total</div>
            <div class="val">${fmtMoney(monthTotal)}</div>
          </div>
        </div>`;
    }).join('')}
    <div class="grand-total">
      <div class="lbl">Grand Total</div>
      <div class="val">${escapeHTML(cur)} ${Number(grandTotal).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    </div>
  </div>
  </body></html>`;

  const w = window.open('', '_blank');
  if (!w) { toast('Popup blocked — allow popups to print', 'error'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

/* -------------------- MODAL SYSTEM -------------------- */
let modalOnSave = null;
let _modalPrevFocus = null;       // element to restore focus to on close
let _modalTrapHandler = null;     // captured to remove listener on close
// opts.saveLabel — override the default "Save" button text (e.g. "Run payroll")
function openModal(title, bodyHTML, onSave, opts = {}) {
  // Close any existing modal first so we never stack them.
  if (document.getElementById('modal-root')) closeModal();
  modalOnSave = onSave;
  _modalPrevFocus = document.activeElement;
  const titleId = 'modal-title-' + Date.now();
  const saveLabel = opts.saveLabel || t('save');
  const m = el(`
    <div id="modal-root" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop fade-in"
         role="dialog" aria-modal="true" aria-labelledby="${titleId}">
      <div class="bg-white rounded-2xl shadow-pop w-full max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-slate-100">
          <h3 id="${titleId}" class="font-display text-xl font-semibold text-slate-900">${escapeHTML(title)}</h3>
          <button onclick="closeModal()" aria-label="${escapeHTML(t('cancel'))}" class="text-slate-400 hover:text-slate-700 p-1">${icon('close','w-5 h-5')}</button>
        </div>
        <div class="p-5 overflow-y-auto">${bodyHTML}</div>
        <div class="flex justify-end gap-2 p-5 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
          <button onclick="closeModal()" class="btn btn-ghost">${escapeHTML(t('cancel'))}</button>
          <button onclick="submitModal()" class="btn btn-primary">${escapeHTML(saveLabel)}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target===m) closeModal(); });

  // Focus the first focusable element inside the modal (skip the close
  // button so the user lands on actual form content).
  const focusables = getModalFocusables(m);
  const initial = focusables.find(el => !el.matches('[aria-label]')) || focusables[1] || focusables[0];
  if (initial) initial.focus();

  // Tab/Shift+Tab focus trap.
  _modalTrapHandler = e => {
    if (e.key !== 'Tab') return;
    const list = getModalFocusables(m);
    if (list.length === 0) { e.preventDefault(); return; }
    const first = list[0], last = list[list.length-1];
    const active = document.activeElement;
    if (e.shiftKey && (active === first || !m.contains(active))) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && (active === last || !m.contains(active))) {
      e.preventDefault(); first.focus();
    }
  };
  document.addEventListener('keydown', _modalTrapHandler);
}
function getModalFocusables(root) {
  return Array.from(root.querySelectorAll(
    'a[href], button:not([disabled]), input:not([disabled]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
  )).filter(el => el.offsetParent !== null);
}
function closeModal() {
  document.getElementById('modal-root')?.remove();
  modalOnSave = null;
  // Reset transient form state so it can't bleed into the next modal.
  if (typeof _pendingPhoto !== 'undefined')  _pendingPhoto = null;
  if (typeof _archiveFile !== 'undefined')   _archiveFile = null;
  if (typeof _receiptFile !== 'undefined')   _receiptFile = null;
  if (typeof _maintenancePhoto !== 'undefined') _maintenancePhoto = null;
  if (typeof _maintenancePhotoCleared !== 'undefined') _maintenancePhotoCleared = false;
  if (_modalTrapHandler) {
    document.removeEventListener('keydown', _modalTrapHandler);
    _modalTrapHandler = null;
  }
  // Return focus to whatever opened the modal (accessibility).
  if (_modalPrevFocus && document.contains(_modalPrevFocus)) {
    try { _modalPrevFocus.focus(); } catch(_) {}
  }
  _modalPrevFocus = null;
}
async function submitModal() {
  if (!modalOnSave) return closeModal();
  // MUST await: many save callbacks are async (Supabase calls). Without
  // awaiting, the modal closes synchronously and any field reads that
  // happen after the first await find an empty DOM (silent data loss —
  // saw branch/nationality/iqama persisted as null because of this).
  const result = await modalOnSave();
  if (result !== false) closeModal();
}

/* -------------------- PENDING APPROVAL GATE -------------------- */
// Shown when the logged-in employee has status='pending' — they've
// signed up but admin hasn't approved their access yet.
function renderPendingApprovalGate() {

          ${me?.role  ? `<div><span class="text-slate-500 inline-block w-20">Position</span><span class="font-medium">${escapeHTML(me.role)}</span></div>` : ''}

// Approve a pending signup — flips status to 'active' so they can
// log in. Only admins can call this (RLS enforces it on the server).
async function approvePendingEmployee(empId) {
  const e = getEmployee(empId);
  if (!e || !canManagePeople()) return;
  const { data, error } = await sb.from('employees')
    .update({ status: 'active' })
    .eq('id', empId)
    .select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(e, mapEmployeeFromDb(data));
  render();
  toast(`${e.firstName} approved`, 'success');
}

// Reject a pending signup — marks them as terminated with a "signup
// not approved" reason. Their auth account stays (Supabase admin
// API would be needed to delete) but they're permanently blocked.
async function rejectPendingEmployee(empId) {
  const e = getEmployee(empId);
  const me = currentEmployee();
  if (!e || !me || !canManagePeople()) return;
  if (!confirm(`Reject ${e.firstName}'s signup? They will be permanently blocked from logging in. To approve later you'd need to reinstate them from the directory.`)) return;
  const updates = {
    status: 'terminated',
    termination_date: todayISO(),
    termination_reason: 'Signup not approved',
    terminated_by: me.id,
  };
  const { data, error } = await sb.from('employees').update(updates).eq('id', empId).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(e, mapEmployeeFromDb(data));
  render();
  toast(`${e.firstName} rejected`, 'success');
}

/* -------------------- PDPL CONSENT GATE -------------------- */
const CURRENT_CONSENT_VERSION = '1.0';

// Has the current employee given consent under the current version?
function hasGivenConsent() {
  const e = currentEmployee();
  if (!e) return true; // not logged in yet, irrelevant
  if (!e.consentAt) return false;
  if (e.consentVersion !== CURRENT_CONSENT_VERSION) return false; // version bump = re-consent
  return true;
}

function renderConsentGate() {
  const me = currentEmployee();
  const isAr = state.settings.lang === 'ar';
  return `
  <div class="min-h-screen flex items-center justify-center p-4 md:p-8" style="background:#fbf7f1">
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-pop p-8 md:p-10">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-lg bg-white flex items-center justify-center overflow-hidden border border-slate-100">
          <img src="logo.png" alt="" class="w-full h-full object-contain" onerror="this.style.display='none'" />
        </div>
        <div>
          <div class="text-[10px] uppercase tracking-[0.18em] text-brand-700 font-semibold">${escapeHTML(state.settings.legalName || LETTERHEAD_DEFAULTS.legalName)}</div>
          <div class="text-xs text-slate-500">PDPL Compliance</div>
        </div>
      </div>

      <h1 class="font-display text-3xl md:text-4xl font-semibold text-slate-900 mt-6 leading-tight">
        ${isAr ? 'مرحباً' : 'One quick step'}, ${escapeHTML(me?.firstName||'')}.
      </h1>
      <p class="mt-3 text-sm text-slate-600 leading-relaxed">
        Before you can use the HR system, please review how we handle your personal data and confirm your consent. This is required by the Saudi Personal Data Protection Law (PDPL). Your answers are recorded with a timestamp.
      </p>

      <div class="mt-6">
        <button onclick="printPrivacyNotice()" class="text-sm text-brand-700 hover:underline inline-flex items-center gap-1.5">
          ${icon('file','w-4 h-4')} Read the full Privacy Notice
        </button>
        <span class="text-xs text-slate-400 ms-2">(opens in a new window)</span>
      </div>

      <div class="mt-7 space-y-3">

        <label class="flex items-start gap-3 p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition">
          <input id="cg-ack" type="checkbox" class="mt-0.5 w-5 h-5 accent-brand-700 shrink-0" oninput="updateConsentSubmit()">
          <div class="text-sm">
            <div class="font-semibold text-slate-900">I have read and understood the Privacy Notice <span class="text-rose-600">*</span></div>
            <div class="text-slate-500 text-xs mt-0.5">Required. Confirms you understand what data we collect and why.</div>
          </div>
        </label>

        <label class="flex items-start gap-3 p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition">
          <input id="cg-xb" type="checkbox" class="mt-0.5 w-5 h-5 accent-brand-700 shrink-0" oninput="updateConsentSubmit()">
          <div class="text-sm">
            <div class="font-semibold text-slate-900">I consent to my data being stored on cloud servers outside Saudi Arabia <span class="text-rose-600">*</span></div>
            <div class="text-slate-500 text-xs mt-0.5">Required. Our HR system uses Supabase (EU/US). Without this we cannot provide the service.</div>
          </div>
        </label>

        <label class="flex items-start gap-3 p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition">
          <input id="cg-gps" type="checkbox" class="mt-0.5 w-5 h-5 accent-brand-700 shrink-0" oninput="updateConsentSubmit()">
          <div class="text-sm">
            <div class="font-semibold text-slate-900">Capture my GPS location at clock-in <span class="text-rose-600">*</span></div>
            <div class="text-slate-500 text-xs mt-0.5">Required. Used to confirm you are physically at your assigned branch when you clock in.</div>
          </div>
        </label>

          <div class="text-sm">
            <div class="font-semibold text-slate-900">Store my photograph in the staff directory <span class="text-rose-600">*</span></div>
            <div class="text-slate-500 text-xs mt-0.5">Required. Used for visual identification across the HR system.</div>
          </div>
        </label>

      </div>

      <div class="flex flex-wrap gap-3 mt-8 pt-6 border-t border-slate-100">
        <button onclick="submitConsent()" id="cg-submit" disabled class="btn btn-primary flex-1 justify-center !py-3.5 !text-base disabled:opacity-50 disabled:cursor-not-allowed">
          ${icon('check','w-4 h-4')} I agree, continue
        </button>
        <button onclick="logout()" class="btn btn-ghost">I disagree, log out</button>
      </div>

      <p class="text-[11px] text-slate-400 mt-4 leading-relaxed">By clicking "I agree, continue" you confirm consent to all four items above. Your acceptance is recorded in the database with a timestamp and version (${escapeHTML(CURRENT_CONSENT_VERSION)}). To withdraw consent, write to HR.</p>

// Enable Continue only when all four required boxes are ticked.
function updateConsentSubmit() {
  const ack   = document.getElementById('cg-ack')?.checked;
  const xb    = document.getElementById('cg-xb')?.checked;
  const gps   = document.getElementById('cg-gps')?.checked;
  const photo = document.getElementById('cg-photo')?.checked;
  const btn = document.getElementById('cg-submit');
  if (btn) btn.disabled = !(ack && xb && gps && photo);
}

async function submitConsent() {
  const ack   = document.getElementById('cg-ack')?.checked;
  const xb    = document.getElementById('cg-xb')?.checked;
  const gps   = document.getElementById('cg-gps')?.checked;
  const photo = document.getElementById('cg-photo')?.checked;
  if (!ack || !xb || !gps || !photo) { toast('Please tick all four required boxes', 'error'); return; }
  const btn = document.getElementById('cg-submit');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
  const { error } = await sb.rpc('record_consent', { p_gps: gps, p_photo: photo, p_version: CURRENT_CONSENT_VERSION });
  if (error) {
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    toast('Could not save consent: ' + error.message, 'error');
    return;
  }
  // Refresh the employee record so consent fields populate locally.
  const me = currentEmployee();
  if (me) {
    const { data } = await sb.from('employees').select('*').eq('id', me.id).single();
    if (data) Object.assign(me, mapEmployeeFromDb(data));
  }
  toast('Thank you — consent recorded.', 'success');
  render();
}

function render() {
  document.documentElement.dir = state.settings.lang==='ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = state.settings.lang;
  const app = $('#app');
  if (!state.session) { stopClockTicker(); app.innerHTML = renderLogin(); return; }
  // Block: signed-in but not in the employees table (someone signed up
  // who wasn't pre-added by HR). The DB trigger leaves them unlinked.
  const me = currentEmployee();
  if (!me) { stopClockTicker(); app.innerHTML = renderNotAuthorizedGate(); return; }
  // Block: signup awaiting admin approval.
  if (me.status === 'pending') { stopClockTicker(); app.innerHTML = renderPendingApprovalGate(); return; }
  // Block access entirely if this employee has been terminated.
  if (me.status === 'terminated') { stopClockTicker(); app.innerHTML = renderTerminatedGate(); return; }
  // Block access to the app until PDPL consent is recorded.
  if (!hasGivenConsent()) { stopClockTicker(); app.innerHTML = renderConsentGate(); return; }
  startClockTicker();
  const route = getRoute();
  let content = '';
  switch (route) {
    case 'dashboard':    content = renderRoleDashboard(); break;
    case 'employees':    content = canManagePeople() ? renderEmployees() : renderRoleDashboard(); break;
    case 'employee':     content = canManagePeople() ? renderEmployeeProfile(getRouteParam()) : renderRoleDashboard(); break;
    case 'attendance':   content = renderAttendance(); break;
    case 'leave':        content = renderLeave(); break;
    case 'payroll':      content = renderPayroll(); break;
    case 'warnings':     content = renderWarnings(); break;
    case 'advances':     content = renderAdvances(); break;
    case 'certificates': content = renderCertificates(); break;
    case 'documents':    content = renderDocuments(); break;
    case 'archive':      content = hasRole('admin','operations') ? renderArchive() : renderRoleDashboard(); break;
    case 'receipts':     content = hasRole('admin','accounting') ? renderReceipts() : renderRoleDashboard(); break;
    case 'inventory':    content = hasRole('admin','head_barista','roaster') ? renderInventory() : renderRoleDashboard(); break;
    case 'suppliers':    content = hasRole('admin','head_barista','roaster') ? renderSuppliers() : renderRoleDashboard(); break;
    case 'roaster':      content = hasRole('admin','head_barista','roaster') ? renderRoaster() : renderRoleDashboard(); break;
    case 'maintenance':  content = renderMaintenance(); break;
    case 'assets':       content = hasRole('admin','maintenance') ? renderAssets() : renderRoleDashboard(); break;
    case 'reports':      content = canManagePeople() ? renderReports() : renderRoleDashboard(); break;
    case 'analytics':    content = isAdmin() ? renderAnalytics() : renderRoleDashboard(); break;
    case 'settings':     content = isAdmin() ? renderSettings() : renderRoleDashboard(); break;
    case 'help':         content = renderHelp(); break;
    case 'account':      content = renderAccount(); break;
    default:             content = renderDashboard();
  }
  app.innerHTML = renderShell(content);
}

/* -------------------- INIT -------------------- */
async function bootstrap() {
  // Show a quick splash
  $('#app').innerHTML = `
    <div class="min-h-screen flex items-center justify-center" style="background:#fbf7f1">
      <div class="text-center">
        <div class="w-14 h-14 rounded-full border-4 border-brand-200 border-t-brand-700 animate-spin mx-auto"></div>
        <div class="mt-4 text-sm text-slate-500 font-display">Loading…</div>
      </div>
    </div>`;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
    }
  } catch(e) { console.error('Bootstrap error:', e); }
  render();

  // React to login/logout in another tab or via session expiry
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') {
      state = emptyState();
      location.hash = '';
      render();
    } else if (event === 'SIGNED_IN' && session?.user && !state.session) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
      render();
    } else if (event === 'TOKEN_REFRESHED') {
      // no-op
    }
  });
}
bootstrap();

// Live clock on dashboard. Started on first authenticated render and
// cleared on logout via stopClockTicker().
let _clockTickerId = null;
function startClockTicker() {
  if (_clockTickerId != null) return;
  _clockTickerId = setInterval(() => {
    const c = document.getElementById('dash-clock');
    if (c) c.textContent = new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }, 30000);
}
function stopClockTicker() {
  if (_clockTickerId != null) { clearInterval(_clockTickerId); _clockTickerId = null; }
}

// Global ESC handler: closes the topmost modal if any is open.
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modal-root')) {
    e.preventDefault();
    closeModal();
  }
});
</script>
