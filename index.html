              <div class="text-xs text-slate-500 mt-0.5">${warningsByLvl.verbal} verbal · ${warningsByLvl.written} written · ${warningsByLvl.final} final</div>
            </div>
            <button onclick="openWarningModalFor('${e.id}')" class="btn btn-accent btn-sm">${icon('plus','w-4 h-4')} Issue warning</button>
          </div>
          ${myWarnings.length === 0 ? `
            <div class="p-8 text-center text-sm text-slate-400">${icon('check','w-6 h-6 mx-auto text-emerald-500 mb-2')}<div>Clean record — no warnings issued.</div></div>
          ` : `
          <div class="overflow-x-auto">
            <table class="data">
              <thead><tr><th>Date</th><th>Severity</th><th>Type</th><th>Reason</th><th class="!text-end">Letter</th></tr></thead>
              <tbody>
                ${myWarnings.map(w => `
                  <tr class="hover-row">
                    <td class="font-medium">${fmtDate(w.date)}</td>
                    <td><span class="badge ${w.severity==='final'?'badge-red':w.severity==='written'?'badge-amber':'badge-slate'}">${escapeHTML(w.severity)}</span></td>
                    <td>${escapeHTML(w.type)}</td>
                    <td class="text-slate-600 text-sm max-w-xs truncate" title="${escapeHTML(w.reason)}">${escapeHTML(w.reason)}</td>
                    <td class="!text-end"><button onclick="printWarningLetter('${w.id}')" aria-label="Print warning letter" title="Print letter" class="text-slate-500 hover:text-brand-600 p-1.5 rounded hover:bg-slate-100">${icon('file','w-4 h-4')}</button></td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`}
        </div>
      </div>

      <!-- Right column: schedule, leave, advances, certs, docs -->
      <div class="space-y-5">
        <!-- Weekly schedule -->
        <div class="bg-white rounded-2xl shadow-card p-5">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-display text-base font-semibold text-slate-900">${icon('calendar','w-4 h-4 inline text-brand-600')} Weekly Schedule</h3>
            <button onclick="openEmployeeModal('${e.id}')" class="text-xs text-brand-600 hover:underline">Edit</button>
          </div>
          <div class="space-y-1">
            ${dayOrder.map(i => {
              const d = ex.schedule[i];
              return `<div class="flex items-center justify-between text-sm py-1">
                <span class="font-medium text-slate-700 w-12">${escapeHTML(dn[i])}</span>
                ${d.off ? '<span class="badge badge-slate">Off-day</span>' : `<span class="text-slate-600 tabular-nums">${escapeHTML(d.start)} – ${escapeHTML(d.end)}</span>`}
              </div>`;
            }).join('')}
          </div>
        </div>

        <!-- Leave balances -->
        <div class="bg-white rounded-2xl shadow-card p-5">
          <h3 class="font-display text-base font-semibold text-slate-900 mb-3">${icon('calendar','w-4 h-4 inline text-emerald-600')} Leave Balances</h3>
          <div class="space-y-3">
            <div class="flex items-center justify-between"><span class="text-sm text-slate-700">Annual</span><span class="badge badge-blue">${balances.annual} days</span></div>
            <div class="flex items-center justify-between"><span class="text-sm text-slate-700">Sick</span><span class="badge badge-blue">${balances.sick} days</span></div>
            <div class="flex items-center justify-between"><span class="text-sm text-slate-700">Personal</span><span class="badge badge-blue">${balances.personal} days</span></div>
          </div>
          <div class="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-500">${leaveTaken}d taken · ${leavePending} pending</div>
        </div>

        <!-- Salary advances -->
        <div class="bg-white rounded-2xl shadow-card p-5">
          <h3 class="font-display text-base font-semibold text-slate-900 mb-3">${icon('cash','w-4 h-4 inline text-amber-600')} Salary Advances</h3>
          <div class="space-y-2">
            <div class="flex items-center justify-between"><span class="text-sm text-slate-700">Approved (lifetime)</span><span class="font-bold">${fmtMoney(advancesApproved)}</span></div>
            <div class="flex items-center justify-between"><span class="text-sm text-slate-700">Outstanding</span><span class="font-bold ${advancesOutstanding>0?'text-amber-600':''}">${fmtMoney(advancesOutstanding)}</span></div>
            <div class="flex items-center justify-between"><span class="text-sm text-slate-700">Total requests</span><span class="font-bold">${myAdvances.length}</span></div>
          </div>
          ${myAdvances.length>0 ? `<div class="mt-3 pt-3 border-t border-slate-100 space-y-1.5 max-h-32 overflow-y-auto">
            ${myAdvances.slice(0,5).map(a => `<div class="flex items-center justify-between text-xs"><span class="text-slate-500">${fmtDate(a.requestedAt)}</span><span class="text-slate-700">${fmtMoney(a.amount)}</span><span class="badge ${a.status==='approved'?'badge-green':a.status==='rejected'?'badge-red':'badge-amber'}">${escapeHTML(a.status)}</span></div>`).join('')}
          </div>` : ''}
          <a href="#/advances" class="text-xs text-brand-600 hover:underline mt-2 inline-block">Manage advances →</a>
        </div>

        <!-- Certificates -->
        <div class="bg-white rounded-2xl shadow-card p-5">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-display text-base font-semibold text-slate-900">${icon('award','w-4 h-4 inline text-amber-600')} Certificates</h3>
            <button onclick="openCertificateModalFor('${e.id}')" class="text-xs text-brand-600 hover:underline">Issue</button>
          </div>
          ${myCerts.length === 0 ? '<div class="text-sm text-slate-400">No certificates yet.</div>' :
            `<div class="space-y-2 max-h-32 overflow-y-auto">${myCerts.map(c => `
              <div class="flex items-center gap-2 text-sm">
                ${icon('star','w-3.5 h-3.5 text-amber-500')}
                <span class="text-slate-700 flex-1 truncate">${escapeHTML(c.title)}</span>
                <button onclick="printCertificate('${c.id}')" class="text-brand-600 hover:underline text-xs">View</button>
              </div>
            `).join('')}</div>`}
        </div>

        <!-- Documents (IQAMA / Baladiya) -->
        <div class="bg-white rounded-2xl shadow-card p-5">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-display text-base font-semibold text-slate-900">${icon('idcard','w-4 h-4 inline text-rose-600')} Documents</h3>
            <button onclick="openRenewModal('${e.id}')" class="text-xs text-brand-600 hover:underline">Renew</button>
          </div>
          <div class="space-y-3">
            <div>
              <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">IQAMA</div>
              <div class="text-sm font-mono text-slate-700">${escapeHTML(ex.iqama?.number || '—')}</div>
              <div class="mt-1">${ex.iqama?.expiry ? `<span class="text-xs text-slate-500">Expires ${fmtDate(ex.iqama.expiry)} · </span><span class="badge ${iqamaSt.cls}">${escapeHTML(iqamaSt.label)}</span>` : '<span class="badge badge-slate">Not set</span>'}</div>
            </div>
            <div>
              <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Baladiya</div>
              <div class="text-sm font-mono text-slate-700">${escapeHTML(ex.baladiya?.number || '—')}</div>
              <div class="mt-1">${ex.baladiya?.expiry ? `<span class="text-xs text-slate-500">Expires ${fmtDate(ex.baladiya.expiry)} · </span><span class="badge ${balSt.cls}">${escapeHTML(balSt.label)}</span>` : '<span class="badge badge-slate">Not set</span>'}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* Helper: open warning modal pre-filled with employee */
function openWarningModalFor(empId) {
  openWarningModal();
  setTimeout(() => { const sel = document.getElementById('w-emp'); if (sel) sel.value = empId; }, 50);
}
function openCertificateModalFor(empId) {
  openCertificateModal('appreciation');
  setTimeout(() => { const sel = document.getElementById('cert-emp'); if (sel) sel.value = empId; }, 50);
}
let _pendingPhoto = null;
function openEmployeeModal(id) {
  const editing = id ? getEmployee(id) : null;
  _pendingPhoto = editing?.photo || null;
  const ex = editing ? getEmpExtras(editing.id) : { schedule: defaultSchedule(), iqama:{number:'',expiry:''}, baladiya:{number:'',expiry:''} };
  const dn = dayNames();
  // Order: Mon, Tue, Wed, Thu, Fri, Sat, Sun
  const dayOrder = [1,2,3,4,5,6,0];
  const scheduleRows = dayOrder.map(i => {
    const day = ex.schedule[i] || { off:false, start: state.settings.workStart||'09:00', end: state.settings.workEnd||'17:00' };
    return `
      <div class="grid grid-cols-12 items-center gap-3 py-2 border-b border-slate-100 last:border-0" data-day="${i}">
        <div class="col-span-3 font-semibold text-slate-700 text-sm">${escapeHTML(dn[i])}</div>
        <div class="col-span-3">
          <label class="inline-flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="m-day-off w-4 h-4 accent-rose-600" data-idx="${i}" ${day.off?'checked':''} onchange="toggleScheduleRow(${i}, this.checked)">
            <span class="text-xs font-semibold text-slate-600">Off-day</span>
          </label>
        </div>
        <div class="col-span-3">
          <input type="time" class="input !py-2 !text-sm m-day-start" data-idx="${i}" value="${escapeHTML(day.start)}" ${day.off?'disabled':''}>
        </div>
        <div class="col-span-3">
          <input type="time" class="input !py-2 !text-sm m-day-end" data-idx="${i}" value="${escapeHTML(day.end)}" ${day.off?'disabled':''}>
        </div>
      </div>
    `;
  }).join('');
  const form = `
    <div class="flex items-center gap-4 mb-4 pb-4 border-b border-slate-100">
      <div id="m-photo-preview" class="w-20 h-20 rounded-full overflow-hidden flex items-center justify-center text-white font-bold text-2xl shrink-0" style="background:${editing?.avatarColor || '#a87035'}">
        ${editing?.photo ? `<img src="${escapeHTML(editing.photo)}" class="w-full h-full object-cover" alt="">` : escapeHTML((editing?.firstName?.[0]||'?')+(editing?.lastName?.[0]||''))}
      </div>
      <div class="flex-1">
        <div class="text-sm font-semibold text-slate-700 mb-1">Profile photo</div>
        <div class="text-xs text-slate-500 mb-2">JPG or PNG, ideally square. Stays in your browser only.</div>
        <div class="flex gap-2">
          <label class="btn btn-ghost btn-sm cursor-pointer">
            ${icon('plus','w-4 h-4')} Choose photo
            <input type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)" />
          </label>
          ${editing?.photo ? '<button type="button" onclick="clearPendingPhoto()" class="btn btn-danger btn-sm">Remove</button>' : ''}
        </div>
      </div>
    </div>

    <!-- Tabs inside modal -->
    <div class="flex gap-1 border-b border-slate-200 mb-4 -mx-1">
      <button type="button" class="tab active" id="emp-tab-basic" onclick="switchEmpTab('basic')">Basic info</button>
      <button type="button" class="tab" id="emp-tab-shift" onclick="switchEmpTab('shift')">Shift &amp; Off-days</button>
      <button type="button" class="tab" id="emp-tab-docs" onclick="switchEmpTab('docs')">IQAMA &amp; Baladiya</button>
    </div>

    <div id="emp-pane-basic">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="label">First name</label><input id="m-fn" class="input" value="${escapeHTML(editing?.firstName||'')}"></div>
        <div><label class="label">Last name</label><input id="m-ln" class="input" value="${escapeHTML(editing?.lastName||'')}"></div>
        <div class="col-span-2"><label class="label">Email</label><input id="m-em" class="input" type="email" value="${escapeHTML(editing?.email||'')}"></div>
        <div><label class="label">Phone</label><input id="m-ph" class="input" value="${escapeHTML(editing?.phone||'')}"></div>
        <div><label class="label">Nationality</label>
          <input id="m-nat" class="input" list="nat-list" value="${escapeHTML(ex.nationality||'')}" placeholder="e.g. Saudi">
          <datalist id="nat-list">
            ${[...new Set([...COMMON_NATIONALITIES, ...Object.values(state.empExtras||{}).map(x=>x.nationality).filter(Boolean)])].map(n=>`<option value="${escapeHTML(n)}">`).join('')}
          </datalist>
        </div>
        <div><label class="label">Job title</label><input id="m-ro" class="input" placeholder="e.g. Senior Barista" value="${escapeHTML(editing?.role||'')}"></div>
        <div><label class="label">System role</label>
          ${(() => {
            const isSelf = editing && editing.user_id === state.session?.userId;
            const allowed = isAdmin() && !isSelf;
            const reason = isSelf ? 'You cannot change your own role' : 'Only admins can change roles';
            return `
              <select id="m-sysrole" class="input" ${allowed ? '' : `disabled title="${escapeHTML(reason)}"`}>
                ${Object.entries(ROLES).map(([k,r]) => `<option value="${k}" ${(editing?.systemRole||'employee')===k?'selected':''}>${escapeHTML(r.label)}</option>`).join('')}
              </select>
              <div class="text-[10px] text-slate-500 mt-1">${allowed ? 'Controls dashboard access &amp; permissions. Distinct from job title.' : escapeHTML(reason) + '.'}</div>
            `;
          })()}
        </div>
        <div><label class="label">Department</label>
          ${(() => {
            const deptOptions = [...new Set([...SUGGESTED_DEPARTMENTS, ...state.employees.map(e=>e.department).filter(Boolean)])];
            const cur = editing?.department || '';
            const isCustom = cur && !deptOptions.includes(cur);
            return `
              <select id="m-dp" class="input" onchange="onDeptSelectChange()">
                <option value="">— Select department —</option>
                ${deptOptions.map(d=>`<option value="${escapeHTML(d)}" ${cur===d?'selected':''}>${escapeHTML(d)}</option>`).join('')}
                ${isCustom?`<option value="${escapeHTML(cur)}" selected>${escapeHTML(cur)}</option>`:''}
                <option value="__other__">+ Add custom department…</option>
              </select>
              <input id="m-dp-custom" class="input mt-2" placeholder="Enter custom department name" style="display:none">
            `;
          })()}
        </div>
        <div><label class="label">Branch</label>
          ${(() => {
            const cur = ex.branch || '';
            const isCustom = cur && !SUGGESTED_BRANCHES.includes(cur);
            return `
              <select id="m-br" class="input">
                <option value="">— Select branch —</option>
                ${SUGGESTED_BRANCHES.map(b=>`<option value="${escapeHTML(b)}" ${cur===b?'selected':''}>${escapeHTML(b)}</option>`).join('')}
                ${isCustom?`<option value="${escapeHTML(cur)}" selected>${escapeHTML(cur)} (legacy)</option>`:''}
              </select>
            `;
          })()}
        </div>
        <div><label class="label">Joining date</label><input id="m-hd" class="input" type="date" value="${escapeHTML(editing?.hireDate||todayISO())}"></div>
        <div><label class="label">Monthly salary (${state.settings.currency})</label><input id="m-sa" class="input" type="number" min="0" step="100" value="${editing?.salary||0}"></div>
        <div class="col-span-2"><label class="label">Status</label>
          <select id="m-st" class="input">
            <option value="active" ${editing?.status==='active'?'selected':''}>Active</option>
            <option value="on_leave" ${editing?.status==='on_leave'?'selected':''}>On leave</option>
          </select>
        </div>
      </div>
    </div>

    <div id="emp-pane-shift" style="display:none">
      <div class="bg-brand-50 border border-brand-100 rounded-xl p-3 text-xs text-brand-800 mb-4">
        ${icon('clock','w-4 h-4 inline')} Set the weekly schedule for this employee. Each day can have its own start/end time, or be marked as an off-day. The system uses today's hours for clock-in late-detection.
      </div>
      <div class="border border-slate-200 rounded-xl bg-white p-3">
        <div class="grid grid-cols-12 gap-3 px-1 pb-2 text-[10px] uppercase tracking-wider text-slate-500 font-semibold">
          <div class="col-span-3">Day</div>
          <div class="col-span-3">Status</div>
          <div class="col-span-3">Start</div>
          <div class="col-span-3">End</div>
        </div>
        ${scheduleRows}
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <button type="button" onclick="applyToAllDays()" class="btn btn-ghost btn-sm">${icon('refresh','w-4 h-4')} Copy Mon's hours to all working days</button>
        <button type="button" onclick="resetWeekendOff('FriSat')" class="btn btn-ghost btn-sm">Set Fri+Sat off</button>
        <button type="button" onclick="resetWeekendOff('Fri')" class="btn btn-ghost btn-sm">Set Fri off only</button>
      </div>
    </div>

    <div id="emp-pane-docs" style="display:none">
      <div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-800 mb-4">
        ${icon('warning','w-4 h-4 inline')} Track resident ID (IQAMA) and health card (Baladiya) numbers and expiry dates. The system will alert you when documents are expiring within 30 days.
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2"><div class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 mt-1">${escapeHTML(t('iqama'))} — Resident ID</div></div>
        <div><label class="label">IQAMA number</label><input id="m-iqama-no" class="input" value="${escapeHTML(ex.iqama.number||'')}" placeholder="2123456789"></div>
        <div><label class="label">IQAMA expires on</label><input id="m-iqama-exp" class="input" type="date" value="${escapeHTML(ex.iqama.expiry||'')}"></div>
        <div class="col-span-2"><div class="text-xs uppercase tracking-wider font-semibold text-slate-500 mb-2 mt-3">${escapeHTML(t('baladiya'))} — Health Card</div></div>
        <div><label class="label">Baladiya number</label><input id="m-bal-no" class="input" value="${escapeHTML(ex.baladiya.number||'')}" placeholder="HC-XXXX-XXXX"></div>
        <div><label class="label">Baladiya expires on</label><input id="m-bal-exp" class="input" type="date" value="${escapeHTML(ex.baladiya.expiry||'')}"></div>
      </div>
    </div>
  `;
  openModal(editing ? 'Edit employee' : t('add_employee'), form, async () => {
    const sysSel = $('#m-sysrole');
    const data = {
      firstName: $('#m-fn').value.trim(),
      lastName:  $('#m-ln').value.trim(),
      email:     $('#m-em').value.trim(),
      phone:     $('#m-ph').value.trim(),
      role:      $('#m-ro').value.trim() || 'Employee',
      department:($('#m-dp-custom')?.value.trim()) || $('#m-dp').value.trim() || 'General',
      hireDate:  $('#m-hd').value,
      salary:    Number($('#m-sa').value)||0,
      status:    $('#m-st').value,
      // Disabled select on self-edit; preserve the original to avoid clobber.
      systemRole: (sysSel && !sysSel.disabled) ? sysSel.value : (editing?.systemRole || 'employee'),
    };
    if (!data.firstName || !data.email) { toast('Name and email required', 'error'); return false; }
    const dbRow = { ...employeeToDb(data), photo: _pendingPhoto, avatar_color: editing?.avatarColor || pickColor() };
    let savedId = editing?.id;
    if (editing) {
      const { data: row, error } = await sb.from('employees').update(dbRow).eq('id', editing.id).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      const updated = mapEmployeeFromDb(row);
      Object.assign(editing, updated);
      toast('Employee updated', 'success');
    } else {
      const { data: row, error } = await sb.from('employees').insert(dbRow).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      const newE = mapEmployeeFromDb(row);
      state.employees.push(newE);
      state.leaveBalances[newE.id] = { annual: newE.leave_annual, sick: newE.leave_sick, personal: newE.leave_personal };
      savedId = newE.id;

          end:   (endEl   && endEl.value)   || state.settings.workEnd   || '17:00',

    _pendingPhoto = null;
    render();

function toggleScheduleRow(idx, isOff) {

function applyToAllDays() {

  const monEnd   = document.querySelector('.m-day-end[data-idx="1"]');
  if (!monStart || !monEnd) return;
  const s = monStart.value, e = monEnd.value;
  for (let i=0;i<7;i++) {
    const offEl = document.querySelector(`.m-day-off[data-idx="${i}"]`);
    if (offEl && offEl.checked) continue; // skip off-days
    const sEl = document.querySelector(`.m-day-start[data-idx="${i}"]`);
    const eEl = document.querySelector(`.m-day-end[data-idx="${i}"]`);
    if (sEl) sEl.value = s;

function resetWeekendOff(which) {
  // 'Fri' = Friday only off; 'FriSat' = Friday + Saturday off
  const offSet = which === 'FriSat' ? new Set([5,6]) : new Set([5]);
  for (let i=0;i<7;i++) {
    const offEl = document.querySelector(`.m-day-off[data-idx="${i}"]`);
    if (!offEl) continue;
    offEl.checked = offSet.has(i);
    toggleScheduleRow(i, offEl.checked);
  }
  toast(which==='FriSat' ? 'Fri & Sat set as off-days' : 'Fri set as off-day', 'success');
}
function handlePhotoUpload(ev) {

function setAttHistRange(kind) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  if (kind === 'today') {
    attHistFilter.from = fmt(today); attHistFilter.to = fmt(today);
  } else if (kind === 'yesterday') {
    const y = new Date(today); y.setDate(y.getDate()-1);
    attHistFilter.from = fmt(y); attHistFilter.to = fmt(y);
  } else if (kind === 'week') {
    const w = new Date(today); w.setDate(w.getDate()-6);
    attHistFilter.from = fmt(w); attHistFilter.to = fmt(today);
  } else if (kind === 'month') {
    const m = new Date(today); m.setDate(m.getDate()-29);
    attHistFilter.from = fmt(m); attHistFilter.to = fmt(today);
  } else if (kind === 'lastMonth') {
    const first = new Date(today.getFullYear(), today.getMonth()-1, 1);
    const last  = new Date(today.getFullYear(), today.getMonth(), 0);
    attHistFilter.from = fmt(first); attHistFilter.to = fmt(last);
  }
  render();
}
function getAttHistFiltered() {
  const records = state.attendance.filter(a => {
    if (a.date < attHistFilter.from || a.date > attHistFilter.to) return false;
    if (attHistFilter.employee !== 'all' && a.employeeId !== attHistFilter.employee) return false;
    if (attHistFilter.branch !== 'all') {
      const ex = getEmpExtras(a.employeeId);
      const empBranch = (ex.branch || '').trim();
      if (attHistFilter.branch === 'none') {
        if (empBranch !== '') return false;
      } else if (empBranch !== attHistFilter.branch) return false;
    }
    if (attHistFilter.status !== 'all' && a.status !== attHistFilter.status) return false;
    return true;
  });
  return records.sort((a,b)=> b.date.localeCompare(a.date) || (a.clockIn||'').localeCompare(b.clockIn||''));
}

function computeAttStats(records) {
  const present = records.filter(r => r.status==='present').length;
  const late = records.filter(r => r.status==='late').length;
  const absent = records.filter(r => r.status==='absent').length;
  const totalMin = records.filter(r=>r.clockIn && r.clockOut).reduce((s,r)=>s+diffMinutes(r.clockIn,r.clockOut),0);
  const avgHrs = records.length ? minutesToHrs(totalMin / Math.max(1,records.length)) : '0.00';
  return { present, late, absent, avgHrs };
}

async function clockIn() {
  const me = currentEmployee();
  if (!me) { toast('Not signed in', 'error'); return; }
  const now = nowHHMM();
  /* Use today's specific schedule; warn (but allow) if today is an off-day */
  const today = todaysShift(me.id);
  if (today.off) {
    if (!confirm(`Today (${dayNames()[today.dow]}) is your scheduled off-day. Continue with clock-in anyway?`)) return;
  }
  const shiftStart = today.start || state.settings.workStart;
  const lateMin = diffMinutes(shiftStart, now);
  const status = lateMin > 5 ? 'late' : 'present';
  let location = null;
  let branch = null;
  const branchesActive = (state.branches||[]).filter(b => b.isActive);
  const requireBranch = branchesActive.length > 0;

  if (state.settings.requireLocation || requireBranch) {
    if (!navigator.geolocation) {
      toast('This device does not support location. Ask your admin for help.', 'error');
      return;
    }
    toast('Capturing location...');
    let pos;
    try {
      pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000, enableHighAccuracy: true }));
    } catch(e) {
      toast('Could not get your location. Please enable location permissions and try again.', 'error');
      return;
    }
    const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy || 0;
    location = { lat, lng, label: 'Captured' };

    if (requireBranch) {
      const near = nearestBranch(lat, lng, acc);
      if (!near) {
        toast('No active branches configured. Ask your admin.', 'error'); return;
      }
      if (!near.within) {
        const dist = Math.round(near.distance);
        toast(`You are ${dist}m from "${near.branch.name}". Clock-in only works at a branch location.`, 'error');
        return;
      }
      branch = near.branch;
      location.label = near.branch.name;
    }
  }

  const { data, error } = await sb.from('attendance').insert({
    employee_id: me.id, date: todayISO(),
    clock_in: now, clock_out: null, status,
    location_lat: location?.lat || null, location_lng: location?.lng || null, location_label: location?.label || null,
    branch_id: branch?.id || null,
  }).select().single();
  if (error) { toast(error.message, 'error'); return; }
  state.attendance.unshift(mapAttendanceFromDb(data));
  render();
  toast(
    branch
      ? (status==='late' ? `Clocked in at ${branch.name} (late by ${lateMin}m)` : `Clocked in at ${branch.name}`)
      : (status==='late' ? `Clocked in (late by ${lateMin}m)` : 'Clocked in successfully'),
    'success'
  );
}
async function clockOut() {
  const me = currentEmployee();
  if (!me) return;
  const today = todayISO();
  const rec = state.attendance.find(a => a.employeeId===me.id && a.date===today);
  if (!rec) { toast('No clock-in found', 'error'); return; }
  const newOut = nowHHMM();
  const { data, error } = await sb.from('attendance').update({ clock_out: newOut }).eq('id', rec.id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(rec, mapAttendanceFromDb(data));
  render();
  toast('Clocked out — have a good rest!', 'success');
}

// not used). The bar visualizes consumption — width grows as remaining shrinks.
function balanceCard(label, remaining, total, color) {

  const pct  = total > 0 ? Math.min(100, (used/total)*100) : 0;
  return `
    <div class="bg-white rounded-2xl shadow-card p-5">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${escapeHTML(label)} Leave</span>

      </div>
      <div class="text-2xl font-bold text-slate-900">${remaining} <span class="text-sm font-normal text-slate-500">days left</span></div>
      <div class="progress-bar mt-3" role="progressbar" aria-valuemin="0" aria-valuemax="${total}" aria-valuenow="${used}" aria-label="${escapeHTML(label)} leave used"><div class="progress-fill" style="width:${pct}%; background:${color}"></div></div>
    </div>
  `;
}

async function decideLeave(id, decision) {
  const r = state.leaveRequests.find(x=>x.id===id);
  if (!r) return;
  // Routed through SECURITY DEFINER RPC so Operations can approve without
  // needing direct UPDATE on the employees table (balance decrement happens
  // server-side inside the function).
  const { data, error } = await sb.rpc('decide_leave_request', { p_id: id, p_decision: decision });
  if (error) { toast(error.message, 'error'); return; }
  if (data) Object.assign(r, mapLeaveFromDb(data));
  if (decision==='approved') {
    // Refresh the employee row so in-memory balance matches the DB
    const { data: empRow, error: empErr } = await sb.from('employees').select('*').eq('id', r.employeeId).single();
    if (!empErr && empRow) {
      const emp = getEmployee(r.employeeId);
      if (emp) {
        Object.assign(emp, mapEmployeeFromDb(empRow));
        state.leaveBalances[r.employeeId] = { annual: emp.leave_annual, sick: emp.leave_sick, personal: emp.leave_personal };
      }
    }
  }
  render();
  toast(`Request ${decision}`, 'success');
}

let payrollFilter = { employee:'all', branch:'all', department:'all', status:'all', from:'', to:'', q:'', sort:'period_desc' };
let payrollMonthFilter = ''; // legacy — kept for backwards compat with generatePayrollReport calls
function setPayrollRange(kind) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,7); // YYYY-MM
  if (kind === 'thisMonth')      { payrollFilter.from = fmt(today); payrollFilter.to = fmt(today); }
  else if (kind === 'lastMonth') { const m = new Date(today.getFullYear(), today.getMonth()-1, 1); payrollFilter.from = fmt(m); payrollFilter.to = fmt(m); }
  else if (kind === 'last3') {
    const m = new Date(today.getFullYear(), today.getMonth()-2, 1);
    payrollFilter.from = fmt(m); payrollFilter.to = fmt(today);
  }
  else if (kind === 'thisYear') { payrollFilter.from = today.getFullYear()+'-01'; payrollFilter.to = fmt(today); }
  else if (kind === 'lastYear') { const y = today.getFullYear()-1; payrollFilter.from = y+'-01'; payrollFilter.to = y+'-12'; }
  else if (kind === 'allTime')  { payrollFilter.from = ''; payrollFilter.to = ''; }
  render();
}
function renderPayroll() {
  const admin = canManagePeople();
  const me = currentEmployee();
  const baseRecords = admin ? state.payroll : state.payroll.filter(p => p.employeeId===me.id);

  // Apply filters
  const filtered = baseRecords.filter(p => {
    if (payrollFilter.employee !== 'all' && p.employeeId !== payrollFilter.employee) return false;
    if (payrollFilter.status !== 'all' && p.status !== payrollFilter.status) return false;
    if (payrollFilter.from && p.period < payrollFilter.from) return false;
    if (payrollFilter.to   && p.period > payrollFilter.to)   return false;
    const e = getEmployee(p.employeeId);
    if (!e) return false;
    if (payrollFilter.department !== 'all' && e.department !== payrollFilter.department) return false;
    if (payrollFilter.branch !== 'all') {
      const ex = getEmpExtras(e.id);
      const eb = (ex.branch||'').trim();
      if (payrollFilter.branch === 'none') { if (eb !== '') return false; }
      else if (eb !== payrollFilter.branch) return false;
    }
    if (payrollFilter.q) {
      const q = payrollFilter.q.toLowerCase();
      const hay = `${e.firstName} ${e.lastName} ${e.email} ${e.role} ${e.department} ${p.period}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  // Sort
  const sortFns = {
    period_desc: (a,b) => b.period.localeCompare(a.period) || (getEmployee(a.employeeId)?.firstName||'').localeCompare(getEmployee(b.employeeId)?.firstName||''),
    period_asc:  (a,b) => a.period.localeCompare(b.period),
    net_desc:    (a,b) => (b.net||0)-(a.net||0),
    net_asc:     (a,b) => (a.net||0)-(b.net||0),
    name_asc:    (a,b) => (getEmployee(a.employeeId)?.firstName||'').localeCompare(getEmployee(b.employeeId)?.firstName||''),
  };
  filtered.sort(sortFns[payrollFilter.sort] || sortFns.period_desc);

  // Stats
  const totalPaid       = filtered.reduce((s,p)=>s+(p.net||0),0);
  const totalBase       = filtered.reduce((s,p)=>s+(p.base||0),0);
  const totalBonus      = filtered.reduce((s,p)=>s+(p.bonus||0),0);
  const totalDeductions = filtered.reduce((s,p)=>s+(p.deductions||0),0);
  const avgNet     = filtered.length ? totalPaid/filtered.length : 0;
  const highestNet = filtered.length ? Math.max(...filtered.map(p=>p.net||0)) : 0;
  const lowestNet  = filtered.length ? Math.min(...filtered.map(p=>p.net||0)) : 0;
  const uniqueEmps = new Set(filtered.map(p=>p.employeeId)).size;
  const uniquePeriods = new Set(filtered.map(p=>p.period)).size;

  // Build period dropdown values (existing payroll periods + last 18 months)
  const monthsSet = new Set(baseRecords.map(p => p.period));

  const months = [...monthsSet].sort().reverse();

function generatePayrollReport(period) {
  const records = state.payroll.filter(p => p.period === period).sort((a,b)=>{
    const ea=getEmployee(a.employeeId), eb=getEmployee(b.employeeId);
    return (ea?.department||'').localeCompare(eb?.department||'') || (ea?.firstName||'').localeCompare(eb?.firstName||'');
  });
  if (records.length===0) { toast('No payroll data for that period', 'error'); return; }
  const c = state.settings;
  const [y,mo] = period.split('-');
  const monthName = new Date(+y, +mo-1, 1).toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const totals = records.reduce((s,p)=>{ s.base+=p.base; s.bonus+=p.bonus||0; s.ded+=p.deductions||0; s.net+=p.net; return s; }, {base:0,bonus:0,ded:0,net:0});

  // Department breakdown
  const byDept = {};
  records.forEach(p => {
    const e = getEmployee(p.employeeId);
    const k = e?.department || 'General';
    if (!byDept[k]) byDept[k] = { count:0, base:0, bonus:0, ded:0, net:0 };
    byDept[k].count++;
    byDept[k].base += p.base;
    byDept[k].bonus += p.bonus||0;
    byDept[k].ded   += p.deductions||0;
    byDept[k].net   += p.net;
  });

  const html = `<!doctype html><html><head><meta charset="utf-8"><title>Payroll Report — ${escapeHTML(monthName)}</title>
  <style>

    .pay-table th.right, .pay-table td.right { text-align:right; }
    .pay-table td { padding:10px 12px; border-bottom:1px solid #e5e7eb; color:#1a1a1a; }
    .pay-table tr:nth-child(even) td { background:#fafafa; }
    .pay-table tr.total td { background:#0f172a; color:#fff; font-weight:700; font-size:13px; border-color:#0f172a; }
    .pay-table tr.total td .pos, .pay-table tr.total td .neg { color:#fff; }
    .pos { color:#047857; }
    .neg { color:#b91c1c; }
  </style></head><body>
  <div class="actions"><button class="btn" onclick="window.print()">Print or Save as PDF</button></div>
  <div class="page">
    ${letterheadHTML('PAYROLL REPORT.')}
    <div class="doc-date">Pay Period: ${escapeHTML(monthName)} (${escapeHTML(period)})</div>
    <p class="doc-intro">This report summarizes payroll activity for the period above, broken down by department and itemized per employee. Issued by the Human Resources Department.</p>
    <div class="stat-row">
      <div class="stat"><div class="lbl">Employees Paid</div><div class="val">${records.length}</div></div>
      <div class="stat"><div class="lbl">Total Base</div><div class="val">${fmtMoney(totals.base)}</div></div>
      <div class="stat"><div class="lbl">Total Bonus</div><div class="val pos">+${fmtMoney(totals.bonus)}</div></div>
      <div class="stat"><div class="lbl">Total Net</div><div class="val">${fmtMoney(totals.net)}</div></div>
    </div>
    <div class="section-title">Department Breakdown</div>
    <table class="pay-table">
      <thead><tr><th>Department</th><th>Headcount</th><th class="right">Base</th><th class="right">Bonus</th><th class="right">Deductions</th><th class="right">Net</th></tr></thead>
      <tbody>
        ${Object.entries(byDept).map(([k,v])=>`
          <tr><td>${escapeHTML(k)}</td><td>${v.count}</td><td class="right">${fmtMoney(v.base)}</td><td class="right pos">+${fmtMoney(v.bonus)}</td><td class="right neg">-${fmtMoney(v.ded)}</td><td class="right"><strong>${fmtMoney(v.net)}</strong></td></tr>

      <thead><tr><th>#</th><th>Employee</th><th>Department</th><th>Role</th><th class="right">Base</th><th class="right">Bonus</th><th class="right">Deductions</th><th class="right">Net</th><th>Paid On</th></tr></thead>
      <tbody>

          const e = getEmployee(p.employeeId);
          return `<tr>

      </tbody>
    </table>
    <div class="doc-sign">
      <div class="sign-row">Issued By &mdash; HR Department:</div>
      <div class="sign-row">Approved By &mdash; Management:</div>
    </div>
    ${state.companyStamp ? `<div style="position:absolute; right:64px; bottom:96px;">${stampImgHTML(120, 0.85)}</div>` : ''}
    <div class="doc-footer">Payroll report for ${escapeHTML(monthName)} &middot; Generated ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}</div>
  </div>
  </body></html>`;
  const win = window.open('', '_blank');
  if (!win) { toast('Pop-up blocked. Allow pop-ups.', 'error'); return; }
  try { win.opener = null; } catch(_) {}
  win.document.write(html); win.document.close();
}

  // Skip terminated employees — they should not appear in payroll runs

  const rows = state.employees.filter(isActiveEmployee).map(e => {
    const empAdvances = (state.advances||[]).filter(a =>
      a.employeeId === e.id &&
      a.status === 'approved' &&
      !a.repaidAt &&
      (a.deductFromPayroll === 'next' || a.deductFromPayroll === 'installments')
    );
    let advanceDeduction = 0;
    empAdvances.forEach(a => {
      const total = Number(a.amount) || 0;
      if (a.deductFromPayroll === 'next') {
        advanceDeduction += total;
        advanceUpdates.set(a.id, { installmentsPaid: 1, repaid: true });
      } else {
        // installments: 2 equal halves. Skip if both already taken.
        const paid = Number(a.installmentsPaid) || 0;
        if (paid >= 2) return;
        const half = Math.round((total / 2) * 100) / 100;
        // Last installment takes whatever remains so totals match exactly.
        const installment = paid === 1 ? Math.max(0, total - half) : half;
        advanceDeduction += installment;
        const newPaid = paid + 1;
        advanceUpdates.set(a.id, { installmentsPaid: newPaid, repaid: newPaid >= 2 });
      }
    });
    const base = e.salary;
    const bonus = 0;
    const deductions = Math.round(advanceDeduction*100)/100;
    const net = Math.max(0, base + bonus - deductions);
    return {
      employee_id: e.id, period: ym,
      base, bonus, deductions,
      net, status: 'paid', paid_at: todayISO()
    };
  });
  const totals = rows.reduce((s, r) => ({
    base:       s.base       + r.base,
    bonus:      s.bonus      + r.bonus,
    deductions: s.deductions + r.deductions,
    net:        s.net        + r.net,
  }), { base:0, bonus:0, deductions:0, net:0 });
  return { rows, advanceUpdates, totals };
}

function runPayroll() {
  if (!canManagePeople()) return;
  const defaultYm = new Date().toISOString().slice(0,7);
  const form = `
    <div class="space-y-4">
      <div>
        <label class="label">Pay period</label>
        <input id="rp-period" type="month" class="input" value="${defaultYm}" oninput="renderRunPayrollPreview()">
        <p class="text-xs text-slate-500 mt-1">Every active employee will receive a payslip for this period. Approved advances flagged for deduction are applied automatically.</p>
      </div>
      <div id="rp-preview"></div>
    </div>
  `;
  openModal('Run payroll', form, async () => {
    const ym = $('#rp-period').value;
    if (!/^\d{4}-\d{2}$/.test(ym)) { toast('Pick a valid month', 'error'); return false; }
    const calc = calcPayroll(ym);
    if (calc.rows.length === 0) { toast('No employees to pay', 'error'); return false; }
    const isDuplicate = state.payroll.some(p => p.period===ym);
    if (isDuplicate && !confirm(`Payroll for ${ym} already exists. Running again will create duplicate payslips. Continue?`)) return false;
    const { data, error } = await sb.from('payroll').insert(calc.rows).select();
    if (error) { toast(error.message, 'error'); return false; }
    (data || []).forEach(r => state.payroll.unshift(mapPayrollFromDb(r)));

    // Persist advance bookkeeping (installments counter + repaid timestamp)
    // back to Supabase so it survives reloads and other devices see it.
    const advancesUsed = Array.from(calc.advanceUpdates.keys());
    await Promise.all(advancesUsed.map(async aid => {
      const a = state.advances.find(x => x.id === aid);
      const u = calc.advanceUpdates.get(aid);
      if (!a || !u) return;
      const updates = { installments_paid: u.installmentsPaid };
      if (u.repaid && !a.repaidAt) updates.repaid_at = todayISO();
      const { data, error } = await sb.from('advances').update(updates).eq('id', aid).select().single();
      if (error) { console.error('Advance update failed:', error); return; }
      Object.assign(a, mapAdvanceFromDb(data));
    }));
    render();
    toast(`Payroll run for ${ym} — ${calc.rows.length} payslips generated`+(advancesUsed.length?` (${advancesUsed.length} advance(s) deducted)`:''), 'success');
    if (confirm('Open the payroll report for this period?')) generatePayrollReport(ym);
    return true;
  }, { saveLabel: 'Run payroll' });
  // Modal mounts synchronously; render preview on next tick.
  setTimeout(renderRunPayrollPreview, 0);
}

function renderRunPayrollPreview() {
  const target = $('#rp-preview');
  if (!target) return;
  const ym = $('#rp-period')?.value || '';
  if (!/^\d{4}-\d{2}$/.test(ym)) {
    target.innerHTML = `<div class="text-xs text-slate-500">Pick a month above to see a preview.</div>`;
    return;
  }
  const calc = calcPayroll(ym);
  const isDuplicate = state.payroll.some(p => p.period===ym);
  const advancesAffected = calc.advanceUpdates.size;
  const installmentsRemain = Array.from(calc.advanceUpdates.values()).filter(u => !u.repaid).length;

  if (calc.rows.length === 0) {
    target.innerHTML = `<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900">No employees to pay. Add employees first.</div>`;
    return;
  }

  target.innerHTML = `
    ${isDuplicate ? `
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900 flex items-start gap-2 mb-3">
        ${icon('warning','w-4 h-4 shrink-0 mt-0.5')}
        <div>Payroll for <strong>${escapeHTML(ym)}</strong> already exists. Running again will create duplicate payslips for every employee.</div>
      </div>
    ` : ''}
    <div class="bg-slate-50 rounded-xl p-4">
      <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Preview · ${escapeHTML(ym)}</div>
      <div class="grid grid-cols-2 gap-y-2 text-sm">
        <div class="text-slate-600">Employees</div>
        <div class="text-right font-semibold text-slate-900">${calc.rows.length}</div>
        <div class="text-slate-600">Total base salary</div>
        <div class="text-right font-semibold text-slate-900">${fmtMoney(calc.totals.base)}</div>
        ${calc.totals.deductions > 0 ? `
          <div class="text-slate-600">Advance deductions</div>
          <div class="text-right font-semibold text-rose-700">−${fmtMoney(calc.totals.deductions)}</div>
        ` : ''}
        <div class="text-slate-700 border-t border-slate-200 pt-2 mt-1">Net to pay</div>
        <div class="text-right text-base font-bold text-slate-900 border-t border-slate-200 pt-2 mt-1">${fmtMoney(calc.totals.net)}</div>
      </div>
      ${advancesAffected ? `
        <div class="text-xs text-slate-500 mt-3 pt-3 border-t border-slate-200">
          ${advancesAffected} advance${advancesAffected===1?'':'s'} affected · ${installmentsRemain} installment${installmentsRemain===1?'':'s'} remain after this run
        </div>
      ` : ''}
    </div>
  `;
}

/* -------------------- REPORTS -------------------- */
let reportType = 'attendance';
let reportRange = { from: '', to: '' };
/* -------------------- ANALYTICS (admin only) --------------------
   Cross-department overview with period selector and period-over-
   period deltas. Existing per-department dashboards still own
   their own day-to-day data; this view is for the owner's
   "how's the business doing" question. */
let analyticsPeriod = 'thisMonth'; // thisMonth | lastMonth | ytd

function analyticsPeriodRange(period) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const pad = n => String(n).padStart(2,'0');
  const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const monthName = d => d.toLocaleDateString(undefined,{month:'long', year:'numeric'});
  if (period === 'lastMonth') {
    const start = new Date(y, m-1, 1), end = new Date(y, m, 0);
    const pStart = new Date(y, m-2, 1), pEnd = new Date(y, m-1, 0);
    return { fromDate: iso(start), toDate: iso(end), prevFromDate: iso(pStart), prevToDate: iso(pEnd), label: monthName(start), prevLabel: monthName(pStart) };
  }
  if (period === 'ytd') {
    const start = new Date(y, 0, 1), end = now;
    const pStart = new Date(y-1, 0, 1);
    const pEnd = new Date(y-1, m, now.getDate());
    return { fromDate: iso(start), toDate: iso(end), prevFromDate: iso(pStart), prevToDate: iso(pEnd), label: y+' YTD', prevLabel: (y-1)+' (same period)' };
  }
  // default thisMonth
  const start = new Date(y, m, 1), end = new Date(y, m+1, 0);
  const pStart = new Date(y, m-1, 1), pEnd = new Date(y, m, 0);
  return { fromDate: iso(start), toDate: iso(end), prevFromDate: iso(pStart), prevToDate: iso(pEnd), label: monthName(start), prevLabel: monthName(pStart) };
}

function renderAnalytics() {
  const period = analyticsPeriodRange(analyticsPeriod);
  const inCur  = d => d && d >= period.fromDate     && d <= period.toDate;
  const inPrev = d => d && d >= period.prevFromDate && d <= period.prevToDate;

  // Receipts (cost) — sum amount in period
  const receipts = state.receipts || [];
  const recCur  = receipts.filter(r => inCur(r.receiptDate||''));
  const recPrev = receipts.filter(r => inPrev(r.receiptDate||''));
  const recCurTotal  = recCur.reduce((s,r) => s + (Number(r.amount)||0), 0);
  const recPrevTotal = recPrev.reduce((s,r) => s + (Number(r.amount)||0), 0);

  // Payroll — period is a YYYY-MM string on the payroll record
  const payroll = state.payroll || [];
  let payCur, payPrev;
  if (analyticsPeriod === 'ytd') {
    const curY  = period.fromDate.slice(0,4);
    const prevY = period.prevFromDate.slice(0,4);
    payCur  = payroll.filter(p => (p.period||'').startsWith(curY));
    payPrev = payroll.filter(p => (p.period||'').startsWith(prevY));
  } else {
    const curYm  = period.fromDate.slice(0,7);
    const prevYm = period.prevFromDate.slice(0,7);
    payCur  = payroll.filter(p => p.period === curYm);
    payPrev = payroll.filter(p => p.period === prevYm);
  }
  const payCurTotal  = payCur.reduce((s,p) => s + (Number(p.net)||0), 0);
  const payPrevTotal = payPrev.reduce((s,p) => s + (Number(p.net)||0), 0);

  // Maintenance resolved in period
  const maintenance = state.maintenance || [];
  const maintCur  = maintenance.filter(m => m.status==='resolved' && inCur((m.resolvedAt||'').slice(0,10)));
  const maintPrev = maintenance.filter(m => m.status==='resolved' && inPrev((m.resolvedAt||'').slice(0,10)));

  // Approved leave days starting in period
  const leaves = state.leaveRequests || [];
  const leaveCurDays  = leaves.filter(r => r.status==='approved' && inCur(r.startDate||'')).reduce((s,r) => s + (r.days||0), 0);
  const leavePrevDays = leaves.filter(r => r.status==='approved' && inPrev(r.startDate||'')).reduce((s,r) => s + (r.days||0), 0);

  // Per-branch snapshot (today, not period — operational not historical)
  const activeEmps = state.employees.filter(e => e.status === 'active');
  const empBranch = e => (getEmpExtras(e.id).branch || '').trim() || 'Unassigned';
  const today = todayISO();
  const branchKeys = [...new Set(activeEmps.map(empBranch))].sort();
  const branchRows = branchKeys.map(b => {
    const emps = activeEmps.filter(e => empBranch(e) === b);
    const empIds = new Set(emps.map(e => e.id));
    const present = state.attendance.filter(a => a.date===today && a.status!=='absent' && empIds.has(a.employeeId)).length;
    const openMaint = maintenance.filter(m => m.status!=='resolved' && m.status!=='cancelled' && (m.branch||'')===b).length;
    const lowItems = (state.inventory||[]).filter(i => isLowStock(i) && (i.branch||'')===b).length;
    return { branch: b, emps: emps.length, present, openMaint, lowItems };
  }).sort((a,b) => b.emps - a.emps);

  // Top categories for the period
  const byCat = {};
  recCur.forEach(r => { const c = r.category || 'other'; byCat[c] = (byCat[c]||0) + (Number(r.amount)||0); });
  const topCats = Object.entries(byCat).sort((a,b) => b[1]-a[1]).slice(0,5);
  const catMax = topCats[0]?.[1] || 1;

  // Delta helpers
  const pctDelta = (cur, prev) => {
    if (prev === 0) return cur === 0 ? '0%' : '—';
    const p = ((cur - prev) / prev) * 100;
    return (p>=0?'+':'') + p.toFixed(0) + '%';
  };
  const absDelta = (cur, prev) => (cur - prev >= 0 ? '+' : '') + (cur - prev);
  // For cost metrics, lower is better — flip the color logic
  const deltaColor = (cur, prev, lowerBetter=false) => {
    if (cur === prev) return 'text-slate-500';
    const better = lowerBetter ? cur < prev : cur > prev;
    return better ? 'text-emerald-600' : 'text-rose-600';
  };

  // Sparklines — last 6 months of monthly totals for each KPI, independent
  // of the period selector (so the trend backdrop stays stable while the
  // big number reflects the selected period).
  const sparkMonths = lastNMonths(6);
  const receiptsSpark = sparkMonths.map(ym =>
    receipts.filter(r => (r.receiptDate||'').startsWith(ym))
            .reduce((s,r) => s + (Number(r.amount)||0), 0)
  );
  const payrollSpark = sparkMonths.map(ym =>
    payroll.filter(p => p.period === ym)
           .reduce((s,p) => s + (Number(p.net)||0), 0)
  );
  const maintSpark = sparkMonths.map(ym =>
    maintenance.filter(m => m.status==='resolved' && (m.resolvedAt||'').startsWith(ym)).length
  );
  const leaveSpark = sparkMonths.map(ym =>
    leaves.filter(r => r.status==='approved' && (r.startDate||'').startsWith(ym))
          .reduce((s,r) => s + (r.days||0), 0)
  );
  const sparkline = (values, color) => {
    const w = 140, h = 28, padY = 3;
    const max = Math.max(...values, 0);
    const min = Math.min(...values, 0);
    const range = (max - min) || 1;
    const usableH = h - 2*padY;
    const stepX = values.length > 1 ? w / (values.length - 1) : 0;
    const pts = values.map((v, i) => {
      const x = i * stepX;
      const y = padY + usableH - ((v - min) / range) * usableH;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    const lastIdx = values.length - 1;
    const lastX = (lastIdx * stepX).toFixed(1);
    const lastY = (padY + usableH - ((values[lastIdx] - min) / range) * usableH).toFixed(1);
    return `<svg viewBox="0 0 ${w} ${h}" class="block w-full mt-2" preserveAspectRatio="none" aria-label="Last 6 months trend">
      <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
      <circle cx="${lastX}" cy="${lastY}" r="2.5" fill="${color}"/>
    </svg>`;
  };

  const periods = [['thisMonth','This month'],['lastMonth','Last month'],['ytd','YTD']];
  return `
    <div class="flex items-end justify-between mb-6 flex-wrap gap-4">
      <div>
        <div class="text-[11px] uppercase tracking-[0.18em] text-brand-700 font-semibold">Analytics</div>
        <h2 class="font-display text-2xl md:text-3xl font-semibold text-slate-900 mt-1">${escapeHTML(period.label)}</h2>
        <div class="text-xs text-slate-500 mt-1">Comparing against ${escapeHTML(period.prevLabel)}</div>
      </div>
      <div class="flex gap-1 bg-white border border-slate-200 rounded-full p-1">
        ${periods.map(([k,l]) => `
          <button onclick="analyticsPeriod='${k}'; render();" class="px-3 py-1.5 text-xs font-medium rounded-full transition ${analyticsPeriod===k?'bg-brand-500 text-white':'text-slate-600 hover:bg-slate-50'}">${l}</button>
        `).join('')}
      </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center gap-1.5">${icon('receipt','w-3.5 h-3.5')} Receipts (cost)</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-2">${fmtMoney(recCurTotal)}</div>
        <div class="text-xs ${deltaColor(recCurTotal, recPrevTotal, true)} mt-1">${pctDelta(recCurTotal, recPrevTotal)} vs ${escapeHTML(period.prevLabel)}</div>
        ${sparkline(receiptsSpark, '#a87035')}
      </div>
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center gap-1.5">${icon('wallet','w-3.5 h-3.5')} Payroll</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-2">${fmtMoney(payCurTotal)}</div>
        <div class="text-xs ${deltaColor(payCurTotal, payPrevTotal, true)} mt-1">${pctDelta(payCurTotal, payPrevTotal)} vs ${escapeHTML(period.prevLabel)}</div>
        ${sparkline(payrollSpark, '#475569')}
      </div>
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center gap-1.5">${icon('wrench','w-3.5 h-3.5')} Maintenance resolved</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-2">${maintCur.length}</div>
        <div class="text-xs ${deltaColor(maintCur.length, maintPrev.length)} mt-1">${absDelta(maintCur.length, maintPrev.length)} vs ${escapeHTML(period.prevLabel)}</div>
        ${sparkline(maintSpark, '#10b981')}
      </div>
      <div class="bg-white rounded-2xl shadow-card p-5">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center gap-1.5">${icon('calendar','w-3.5 h-3.5')} Approved leave days</div>
        <div class="font-display text-2xl font-semibold text-slate-900 mt-2">${leaveCurDays}</div>
        <div class="text-xs ${deltaColor(leaveCurDays, leavePrevDays)} mt-1">${absDelta(leaveCurDays, leavePrevDays)} vs ${escapeHTML(period.prevLabel)}</div>
        ${sparkline(leaveSpark, '#6366f1')}
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
      <div class="lg:col-span-2 bg-white rounded-2xl shadow-card overflow-hidden">
        <div class="p-5 border-b border-slate-100">
          <h3 class="font-display text-lg font-semibold text-slate-900">By branch</h3>
          <div class="text-xs text-slate-500 mt-0.5">Today's operational snapshot</div>
        </div>
        <div class="overflow-x-auto">
          <table class="data">
            <thead><tr><th>Branch</th><th class="!text-end">Employees</th><th class="!text-end">Present today</th><th class="!text-end">Open maintenance</th><th class="!text-end">Low-stock items</th></tr></thead>
            <tbody>
              ${branchRows.length===0 ? `<tr><td colspan="5" class="text-center text-slate-400 !py-10">No branch data yet</td></tr>` :
                branchRows.map(b => `
                  <tr class="hover-row">
                    <td><span class="font-medium">${escapeHTML(b.branch)}</span></td>
                    <td class="!text-end">${b.emps}</td>
                    <td class="!text-end">${b.present}/${b.emps}</td>
                    <td class="!text-end ${b.openMaint>0?'text-amber-600 font-medium':''}">${b.openMaint}</td>
                    <td class="!text-end ${b.lowItems>0?'text-rose-600 font-medium':''}">${b.lowItems}</td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-card overflow-hidden">
        <div class="p-5 border-b border-slate-100">
          <h3 class="font-display text-lg font-semibold text-slate-900">Top spend</h3>
          <div class="text-xs text-slate-500 mt-0.5">${escapeHTML(period.label)} by category</div>
        </div>
        <div class="p-5">
          ${topCats.length===0 ? `<div class="text-center text-slate-400 py-6 text-sm">No receipts in this period</div>` :
            topCats.map(([cat, total]) => `
              <div class="mb-3 last:mb-0">
                <div class="flex justify-between items-baseline text-sm">
                  <span class="font-medium text-slate-700">${escapeHTML(cat)}</span>
                  <span class="text-slate-900 font-semibold tabular-nums">${fmtMoney(total)}</span>
                </div>
                <div class="progress-bar mt-1.5"><div class="progress-fill" style="width:${(total/catMax)*100}%; background:#a87035"></div></div>
              </div>
            `).join('')}
        </div>
      </div>
    </div>

    ${(() => {
      // Roaster yield — pair green-out + roasted-in movements by occurredAt.
      // Each logRoastBatch() call writes both legs with the same timestamp,
      // so grouping by occurredAt reconstitutes the batch. Sum within a key
      // tolerates multi-batch groupings (rare but possible).
      const roastMoves = (state.inventoryMovements || []).filter(m => m.type === 'roast');
      const byKey = {};
      roastMoves.forEach(m => {
        const k = m.occurredAt || m.createdAt;
        if (!k) return;
        if (!byKey[k]) byKey[k] = { out: 0, in: 0 };
        if (m.qtyDelta < 0) byKey[k].out += Math.abs(m.qtyDelta);
        else                byKey[k].in  += m.qtyDelta;
      });
      const pairs = Object.entries(byKey)
        .filter(([, v]) => v.out > 0 && v.in > 0)
        .map(([k, v]) => ({ at: k, yield: (v.in / v.out) * 100, out: v.out, in: v.in }))
        .sort((a, b) => a.at.localeCompare(b.at));
      const recent = pairs.slice(-12);
      if (recent.length === 0) {
        return `
          <div class="bg-white rounded-2xl shadow-card overflow-hidden mt-5">
            <div class="p-5 border-b border-slate-100">
              <h3 class="font-display text-lg font-semibold text-slate-900 flex items-center gap-2">${icon('cash','w-4 h-4 text-brand-700')} Roaster yield</h3>
              <div class="text-xs text-slate-500 mt-0.5">Healthy band ${ROAST_YIELD_LOW}%–${ROAST_YIELD_HIGH}%</div>
            </div>
            <div class="p-5 text-center text-slate-400 py-8 text-sm">No roasts logged yet. <a href="#/roaster" class="text-brand-700 hover:underline">Log a roast</a> to start the trend.</div>
          </div>`;
      }
      const current = recent[recent.length - 1];
      const prior   = recent[recent.length - 2] || null;
      const avg = recent.reduce((s,p) => s + p.yield, 0) / recent.length;
      return `
        <div class="bg-white rounded-2xl shadow-card overflow-hidden mt-5">
          <div class="p-5 border-b border-slate-100 flex items-center justify-between gap-4 flex-wrap">
            <div>
              <h3 class="font-display text-lg font-semibold text-slate-900 flex items-center gap-2">${icon('cash','w-4 h-4 text-brand-700')} Roaster yield</h3>
              <div class="text-xs text-slate-500 mt-0.5">Last ${recent.length} roast${recent.length===1?'':'s'} · healthy band ${ROAST_YIELD_LOW}%–${ROAST_YIELD_HIGH}%</div>
            </div>
            <button onclick="location.hash='#/roaster'" class="btn btn-ghost btn-sm">${icon('eye','w-4 h-4')} Open roaster</button>
          </div>
          <div class="p-5">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
              <div>
                <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Latest yield</div>
                <div class="font-display text-3xl font-semibold mt-1 ${roastYieldTone(current.yield)}">${current.yield.toFixed(1)}%</div>
                <div class="text-xs text-slate-500 mt-1 tabular-nums">${current.in.toFixed(2)} kg roasted from ${current.out.toFixed(2)} kg green</div>
                ${prior ? `
                  <div class="text-xs mt-1 ${current.yield >= prior.yield ? 'text-emerald-600' : 'text-rose-600'}">
                    ${current.yield >= prior.yield ? '+' : ''}${(current.yield - prior.yield).toFixed(1)} pts vs previous batch
                  </div>
                ` : ''}
              </div>
              <div class="md:col-span-2">
                <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold flex items-center justify-between">
                  <span>Trend</span>
                  <span class="text-slate-400">avg ${avg.toFixed(1)}%</span>
                </div>
                ${sparkline(recent.map(p => p.yield), '#a87035')}
                <div class="flex justify-between text-[10px] text-slate-400 tabular-nums mt-1">
                  <span>${escapeHTML(fmtDate((recent[0].at||'').slice(0,10)))}</span>
                  <span>${escapeHTML(fmtDate((current.at||'').slice(0,10)))}</span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    })()}

    ${(() => {
      // Per-employee attendance for the selected period. "Productivity" framing
      // intentionally avoided — these are attendance metrics, not subjective
      // output. Sorted best-first so the table reads as a ranking; color
      // surfaces low rates / absent days without forcing the admin to re-sort.
      // One pass to bucket records by employee — avoids an O(employees ×
      // records) filter loop that would bite once attendance grows past a
      // few thousand rows.
      const recsByEmp = new Map();
      (state.attendance || []).forEach(a => {
        if (a.date < period.fromDate || a.date > period.toDate) return;
        const arr = recsByEmp.get(a.employeeId);
        if (arr) arr.push(a);
        else     recsByEmp.set(a.employeeId, [a]);
      });
      const rows = state.employees
        .filter(isActiveEmployee)
        .map(e => {
          const recs = recsByEmp.get(e.id) || [];
          const { present, late, absent } = computeAttStats(recs);
          const totalRec = present + late + absent;
          if (totalRec === 0) return null;
          const workedDays = recs.filter(r => r.clockIn && r.clockOut).length;
          const totalMin   = recs.reduce((s, r) => s + (r.clockIn && r.clockOut ? diffMinutes(r.clockIn, r.clockOut) : 0), 0);
          return {
            emp: e, present, late, absent, totalRec,
            avgHrs: workedDays > 0 ? (totalMin / workedDays / 60) : 0,
            rate:   ((present + late) / totalRec) * 100,
          };
        })
        .filter(Boolean)
        .sort((a, b) => b.rate - a.rate || b.totalRec - a.totalRec);
      const rateTone = pct => pct >= 95 ? 'text-emerald-600' : pct >= 80 ? 'text-amber-600' : 'text-rose-600';
      return `
        <div class="bg-white rounded-2xl shadow-card overflow-hidden mt-5">
          <div class="p-5 border-b border-slate-100">
            <h3 class="font-display text-lg font-semibold text-slate-900 flex items-center gap-2">${icon('users','w-4 h-4 text-brand-700')} Per-employee attendance</h3>
            <div class="text-xs text-slate-500 mt-0.5">${escapeHTML(period.label)} · active employees with attendance records, sorted by attendance rate</div>
          </div>
          <div class="overflow-x-auto">
            <table class="data">
              <thead><tr>
                <th>Employee</th>
                <th class="!text-end">Present</th>
                <th class="!text-end">Late</th>
                <th class="!text-end">Absent</th>
                <th class="!text-end">Avg hrs/day</th>
                <th class="!text-end">Rate</th>
              </tr></thead>
              <tbody>
                ${rows.length === 0 ? `<tr><td colspan="6" class="text-center text-slate-400 !py-8">No attendance records in this period</td></tr>` :
                  rows.map(r => `
                    <tr class="hover-row">
                      <td><a href="#/employee/${r.emp.id}" class="flex items-center gap-2 hover:text-brand-700">${avatarHTML(r.emp, 24)}<span class="font-medium">${escapeHTML(r.emp.firstName+' '+(r.emp.lastName||''))}</span></a></td>
                      <td class="!text-end tabular-nums">${r.present}</td>
                      <td class="!text-end tabular-nums ${r.late>0?'text-amber-700':'text-slate-400'}">${r.late}</td>
                      <td class="!text-end tabular-nums ${r.absent>0?'text-rose-700':'text-slate-400'}">${r.absent}</td>
                      <td class="!text-end tabular-nums">${r.avgHrs > 0 ? r.avgHrs.toFixed(1) : '—'}</td>
                      <td class="!text-end tabular-nums font-semibold ${rateTone(r.rate)}">${r.rate.toFixed(0)}%</td>
                    </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    })()}
  `;
}

function renderReports() {
  if (!reportRange.from) {

  }
  const recs = state.attendance.filter(a => a.date>=reportRange.from && a.date<=reportRange.to);
  const byEmp = {};
  recs.forEach(a => {
    const k = a.employeeId;
    if (!byEmp[k]) byEmp[k] = { present:0, late:0, absent:0, mins:0, days:0 };
    byEmp[k][a.status] = (byEmp[k][a.status]||0) + 1;
    if (a.clockIn && a.clockOut) {

  `;
}

async function changeMyPassword() {
  const cur = $('#acc-current').value;
  const newPw = $('#acc-new').value;
  const confirmPw = $('#acc-confirm').value;
  if (!cur) { toast('Current password is required', 'error'); return; }
  if (!newPw || newPw.length < 6) { toast('New password must be at least 6 characters', 'error'); return; }
  if (newPw !== confirmPw) { toast('Passwords do not match', 'error'); return; }
  if (cur === newPw) { toast('New password must differ from current password', 'error'); return; }
  const email = state.session?.email;
  if (!email) { toast('Session expired', 'error'); return; }
  // Verify current password by attempting a sign-in. Required — never skip.
  const verify = await sb.auth.signInWithPassword({ email, password: cur });
  if (verify.error) { toast('Current password is incorrect', 'error'); return; }
  const { error } = await sb.auth.updateUser({ password: newPw });
  if (error) { toast(error.message, 'error'); return; }
  $('#acc-current').value = '';
  $('#acc-new').value = '';
  $('#acc-confirm').value = '';
  toast('Password updated successfully', 'success');
}

function openBranchModal(id) {
  const editing = id ? state.branches.find(b => b.id===id) : null;
  const form = `
    <div class="space-y-4">
      <div><label class="label">Branch name</label><input id="br-name" class="input" value="${escapeHTML(editing?.name||'')}" placeholder="e.g. Main Roastery, Café Riyadh"></div>
      <div><label class="label">Address (optional)</label><input id="br-addr" class="input" value="${escapeHTML(editing?.address||'')}" placeholder="Street, district, city"></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Latitude</label><input id="br-lat" class="input" type="number" step="any" value="${editing?.latitude ?? ''}" placeholder="24.71361"></div>
        <div><label class="label">Longitude</label><input id="br-lng" class="input" type="number" step="any" value="${editing?.longitude ?? ''}" placeholder="46.67528"></div>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <button type="button" onclick="useMyLocationForBranch()" class="btn btn-ghost btn-sm">${icon('pin','w-4 h-4')} Use my current location</button>
        <span class="text-xs text-slate-500">Tip: stand inside the branch and click this button on your phone for accurate coords. You can also paste coordinates from Google Maps.</span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label">Radius (meters)</label>
          <input id="br-radius" class="input" type="number" min="20" max="5000" step="10" value="${editing?.radius ?? 150}">
        </div>
        <div>
          <label class="label">Status</label>
          <select id="br-active" class="input">
            <option value="true" ${editing?.isActive!==false?'selected':''}>Active</option>
            <option value="false" ${editing?.isActive===false?'selected':''}>Inactive</option>
          </select>
        </div>
      </div>
      <div class="text-xs text-slate-500 bg-brand-50 border border-brand-100 rounded-lg p-3">
        Common radius values: <strong>50m</strong> single shop · <strong>150m</strong> small building (default) · <strong>300m</strong> block · <strong>500m</strong> campus.
      </div>
    </div>
  `;
  openModal(editing ? 'Edit branch' : 'Add branch', form, async () => {
    const data = {
      name: $('#br-name').value.trim(),
      address: $('#br-addr').value.trim(),
      latitude: parseFloat($('#br-lat').value),
      longitude: parseFloat($('#br-lng').value),
      radius: parseInt($('#br-radius').value, 10) || 150,
      isActive: $('#br-active').value === 'true',
    };
    if (!data.name) { toast('Branch name required', 'error'); return false; }
    if (isNaN(data.latitude) || isNaN(data.longitude)) { toast('Valid latitude and longitude required', 'error'); return false; }
    if (Math.abs(data.latitude) > 90 || Math.abs(data.longitude) > 180) { toast('Coordinates out of range', 'error'); return false; }
    const dbRow = branchToDb(data);
    if (editing) {
      const { data: row, error } = await sb.from('branches').update(dbRow).eq('id', editing.id).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      Object.assign(editing, mapBranchFromDb(row));
      toast('Branch updated', 'success');
    } else {
      const { data: row, error } = await sb.from('branches').insert(dbRow).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      state.branches.push(mapBranchFromDb(row));
      toast('Branch added — geofencing now active for clock-in', 'success');
    }
    render();
    return true;
  });
}
async function deleteBranch(id) {
  const b = state.branches.find(x => x.id===id);
  if (!b) return;
  if (!confirm(`Delete "${b.name}"? Existing attendance records linked to this branch will keep their location data.`)) return;
  const { error } = await sb.from('branches').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.branches = state.branches.filter(x => x.id!==id);
  render();
  toast('Branch deleted', 'success');
}
function useMyLocationForBranch() {
  if (!navigator.geolocation) { toast('Geolocation not supported on this device', 'error'); return; }
  toast('Capturing your location...');
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy||0;
    if ($('#br-lat')) $('#br-lat').value = lat.toFixed(6);
    if ($('#br-lng')) $('#br-lng').value = lng.toFixed(6);
    toast(`Location captured (accuracy ±${Math.round(acc)}m)`, 'success');
  }, err => {
    toast('Could not get location: ' + err.message, 'error');
  }, { timeout: 8000, enableHighAccuracy: true });
}

function handleStampUpload(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  if (file.size > 1024 * 1024) { toast('Stamp image must be under 1 MB', 'error'); ev.target.value=''; return; }
  if (!file.type.startsWith('image/')) { toast('Please choose an image file', 'error'); return; }
  const reader = new FileReader();
  reader.onload = async e => {
    const dataUrl = e.target.result;
    if (!state.companyId) { toast('Company record not loaded yet', 'error'); return; }
    const { error } = await sb.from('companies').update({ company_stamp: dataUrl }).eq('id', state.companyId);
    if (error) { toast(error.message, 'error'); return; }
    state.companyStamp = dataUrl;
    render();
    toast('Company stamp uploaded — it will appear on all printed documents', 'success');
  };
  reader.readAsDataURL(file);
}
async function removeCompanyStamp() {
  if (!confirm('Remove the company stamp? Documents will print without it.')) return;
  if (!state.companyId) { toast('Company record not loaded yet', 'error'); return; }
  const { error } = await sb.from('companies').update({ company_stamp: null }).eq('id', state.companyId);
  if (error) { toast(error.message, 'error'); return; }
  state.companyStamp = '';
  render();
  toast('Company stamp removed', 'success');
}

function numberToWords(num) {
  const value = Number(num) || 0;
  const whole = Math.floor(Math.abs(value));
  const cents = Math.round((Math.abs(value) - whole) * 100);
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function below1000(n) {
    if (n < 20) return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' '+ones[n%10] : '');
    return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' and '+below1000(n%100) : '');
  }
  function intToWords(n) {
    if (n === 0) return 'Zero';
    let words = '', remainder = n;
    if (remainder >= 1000000) { words += below1000(Math.floor(remainder/1000000)) + ' Million '; remainder %= 1000000; }
    if (remainder >= 1000)    { words += below1000(Math.floor(remainder/1000)) + ' Thousand '; remainder %= 1000; }
    if (remainder > 0)        { words += below1000(remainder); }
    return words.trim();
  }
  const sign = value < 0 ? 'Negative ' : '';
  const main = intToWords(whole);
  const fraction = cents > 0 ? ` and ${cents.toString().padStart(2,'0')}/100` : '';
  return sign + main + fraction + ' Only';
}
