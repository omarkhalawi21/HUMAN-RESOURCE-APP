// Pure calculator — figures out payroll rows + advance bookkeeping for a
// given YYYY-MM period without writing anything. Used both by the live
// preview in the modal and by the actual run.
function calcPayroll(ym) {
  const advanceUpdates = new Map(); // advanceId -> { installmentsPaid, repaid }
  const rows = state.employees.map(e => {
    const empAdvances = (state.advances||[]).filter(a =>
      a.employeeId === e.id &&
      a.status === 'approved' &&
      !a.repaidAt &&
      (a.deductFromPayroll === 'next' || a.deductFromPayroll === 'installments')
    );
    let advanceDeduction = 0;
    empAdvances.forEach(a => {
      const total = Number(a.amount) || 0;
      if (a.deductFromPayroll === 'next') {
        advanceDeduction += total;
        advanceUpdates.set(a.id, { installmentsPaid: 1, repaid: true });
      } else {
        // installments: 2 equal halves. Skip if both already taken.
        const paid = Number(a.installmentsPaid) || 0;
        if (paid >= 2) return;
        const half = Math.round((total / 2) * 100) / 100;
        // Last installment takes whatever remains so totals match exactly.
        const installment = paid === 1 ? Math.max(0, total - half) : half;
        advanceDeduction += installment;
        const newPaid = paid + 1;
        advanceUpdates.set(a.id, { installmentsPaid: newPaid, repaid: newPaid >= 2 });
      }
    });
    const base = e.salary;
    const bonus = 0;
    const deductions = Math.round(advanceDeduction*100)/100;
    const net = Math.max(0, base + bonus - deductions);
    return {
      employee_id: e.id, period: ym,
      base, bonus, deductions,
      net, status: 'paid', paid_at: todayISO()
    };
  });
  const totals = rows.reduce((s, r) => ({
    base:       s.base       + r.base,
    bonus:      s.bonus      + r.bonus,
    deductions: s.deductions + r.deductions,
    net:        s.net        + r.net,
  }), { base:0, bonus:0, deductions:0, net:0 });
  return { rows, advanceUpdates, totals };
}

function runPayroll() {
  if (!isAdmin()) return;
  const defaultYm = new Date().toISOString().slice(0,7);
  const form = `
    <div class="space-y-4">
      <div>
        <label class="label">Pay period</label>
        <input id="rp-period" type="month" class="input" value="${defaultYm}" oninput="renderRunPayrollPreview()">
        <p class="text-xs text-slate-500 mt-1">Every active employee will receive a payslip for this period. Approved advances flagged for deduction are applied automatically.</p>
      </div>
      <div id="rp-preview"></div>
    </div>
  `;
  openModal('Run payroll', form, async () => {
    const ym = $('#rp-period').value;
    if (!/^\d{4}-\d{2}$/.test(ym)) { toast('Pick a valid month', 'error'); return false; }
    const calc = calcPayroll(ym);
    if (calc.rows.length === 0) { toast('No employees to pay', 'error'); return false; }
    const isDuplicate = state.payroll.some(p => p.period===ym);
    if (isDuplicate && !confirm(`Payroll for ${ym} already exists. Running again will create duplicate payslips. Continue?`)) return false;
    const { data, error } = await sb.from('payroll').insert(calc.rows).select();
    if (error) { toast(error.message, 'error'); return false; }
    (data || []).forEach(r => state.payroll.unshift(mapPayrollFromDb(r)));

    // Persist advance bookkeeping (installments counter + repaid timestamp)
    // back to Supabase so it survives reloads and other devices see it.
    const advancesUsed = Array.from(calc.advanceUpdates.keys());
    await Promise.all(advancesUsed.map(async aid => {
      const a = state.advances.find(x => x.id === aid);
      const u = calc.advanceUpdates.get(aid);
      if (!a || !u) return;
      const updates = { installments_paid: u.installmentsPaid };
      if (u.repaid && !a.repaidAt) updates.repaid_at = todayISO();
      const { data, error } = await sb.from('advances').update(updates).eq('id', aid).select().single();
      if (error) { console.error('Advance update failed:', error); return; }
      Object.assign(a, mapAdvanceFromDb(data));
    }));
    render();
    toast(`Payroll run for ${ym} — ${calc.rows.length} payslips generated`+(advancesUsed.length?` (${advancesUsed.length} advance(s) deducted)`:''), 'success');
    if (confirm('Open the payroll report for this period?')) generatePayrollReport(ym);
    return true;
  }, { saveLabel: 'Run payroll' });
  // Modal mounts synchronously; render preview on next tick.
  setTimeout(renderRunPayrollPreview, 0);
}

function renderRunPayrollPreview() {
  const target = $('#rp-preview');
  if (!target) return;
  const ym = $('#rp-period')?.value || '';
  if (!/^\d{4}-\d{2}$/.test(ym)) {
    target.innerHTML = `<div class="text-xs text-slate-500">Pick a month above to see a preview.</div>`;
    return;
  }
  const calc = calcPayroll(ym);
  const isDuplicate = state.payroll.some(p => p.period===ym);
  const advancesAffected = calc.advanceUpdates.size;
  const installmentsRemain = Array.from(calc.advanceUpdates.values()).filter(u => !u.repaid).length;

  if (calc.rows.length === 0) {
    target.innerHTML = `<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900">No employees to pay. Add employees first.</div>`;
    return;
  }

  target.innerHTML = `
    ${isDuplicate ? `
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-900 flex items-start gap-2 mb-3">
        ${icon('warning','w-4 h-4 shrink-0 mt-0.5')}
        <div>Payroll for <strong>${escapeHTML(ym)}</strong> already exists. Running again will create duplicate payslips for every employee.</div>
      </div>
    ` : ''}
    <div class="bg-slate-50 rounded-xl p-4">
      <div class="text-xs uppercase tracking-wider text-slate-500 font-semibold mb-3">Preview · ${escapeHTML(ym)}</div>
      <div class="grid grid-cols-2 gap-y-2 text-sm">
        <div class="text-slate-600">Employees</div>
        <div class="text-right font-semibold text-slate-900">${calc.rows.length}</div>
        <div class="text-slate-600">Total base salary</div>
        <div class="text-right font-semibold text-slate-900">${fmtMoney(calc.totals.base)}</div>
        ${calc.totals.deductions > 0 ? `
          <div class="text-slate-600">Advance deductions</div>
          <div class="text-right font-semibold text-rose-700">−${fmtMoney(calc.totals.deductions)}</div>
        ` : ''}
        <div class="text-slate-700 border-t border-slate-200 pt-2 mt-1">Net to pay</div>
        <div class="text-right text-base font-bold text-slate-900 border-t border-slate-200 pt-2 mt-1">${fmtMoney(calc.totals.net)}</div>
      </div>
      ${advancesAffected ? `
        <div class="text-xs text-slate-500 mt-3 pt-3 border-t border-slate-200">
          ${advancesAffected} advance${advancesAffected===1?'':'s'} affected · ${installmentsRemain} installment${installmentsRemain===1?'':'s'} remain after this run
        </div>
      ` : ''}
    </div>
  `;
}

async function changeMyPassword() {
  const cur = $('#acc-current').value;
  const newPw = $('#acc-new').value;
  const confirmPw = $('#acc-confirm').value;
  if (!cur) { toast('Current password is required', 'error'); return; }
  if (!newPw || newPw.length < 6) { toast('New password must be at least 6 characters', 'error'); return; }
  if (newPw !== confirmPw) { toast('Passwords do not match', 'error'); return; }
  if (cur === newPw) { toast('New password must differ from current password', 'error'); return; }
  const email = state.session?.email;
  if (!email) { toast('Session expired', 'error'); return; }
  // Verify current password by attempting a sign-in. Required — never skip.
  const verify = await sb.auth.signInWithPassword({ email, password: cur });
  if (verify.error) { toast('Current password is incorrect', 'error'); return; }
  const { error } = await sb.auth.updateUser({ password: newPw });
  if (error) { toast(error.message, 'error'); return; }
  $('#acc-current').value = '';
  $('#acc-new').value = '';
  $('#acc-confirm').value = '';
  toast('Password updated successfully', 'success');
}

        </div>
        <div>
          <label class="label">Status</label>
          <select id="br-active" class="input">
            <option value="true" ${editing?.isActive!==false?'selected':''}>Active</option>
            <option value="false" ${editing?.isActive===false?'selected':''}>Inactive</option>
          </select>
        </div>

      <div class="text-xs text-slate-500 bg-brand-50 border border-brand-100 rounded-lg p-3">

      </div>
    </div>
  `;
  openModal(editing ? 'Edit branch' : 'Add branch', form, async () => {
    const data = {
      name: $('#br-name').value.trim(),
      address: $('#br-addr').value.trim(),
      latitude: parseFloat($('#br-lat').value),
      longitude: parseFloat($('#br-lng').value),
      radius: parseInt($('#br-radius').value, 10) || 150,
      isActive: $('#br-active').value === 'true',
    };
    if (!data.name) { toast('Branch name required', 'error'); return false; }
    if (isNaN(data.latitude) || isNaN(data.longitude)) { toast('Valid latitude and longitude required', 'error'); return false; }
    if (Math.abs(data.latitude) > 90 || Math.abs(data.longitude) > 180) { toast('Coordinates out of range', 'error'); return false; }
    const dbRow = branchToDb(data);
    if (editing) {
      const { data: row, error } = await sb.from('branches').update(dbRow).eq('id', editing.id).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      Object.assign(editing, mapBranchFromDb(row));
      toast('Branch updated', 'success');
    } else {
      const { data: row, error } = await sb.from('branches').insert(dbRow).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      state.branches.push(mapBranchFromDb(row));
      toast('Branch added — geofencing now active for clock-in', 'success');
    }
    render();
    return true;
  });

async function deleteBranch(id) {
  const b = state.branches.find(x => x.id===id);
  if (!b) return;
  if (!confirm(`Delete "${b.name}"? Existing attendance records linked to this branch will keep their location data.`)) return;
  const { error } = await sb.from('branches').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.branches = state.branches.filter(x => x.id!==id);
  render();
  toast('Branch deleted', 'success');
}
function useMyLocationForBranch() {
  if (!navigator.geolocation) { toast('Geolocation not supported on this device', 'error'); return; }
  toast('Capturing your location...');
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy||0;
    if ($('#br-lat')) $('#br-lat').value = lat.toFixed(6);
    if ($('#br-lng')) $('#br-lng').value = lng.toFixed(6);
    toast(`Location captured (accuracy ±${Math.round(acc)}m)`, 'success');
  }, err => {
    toast('Could not get location: ' + err.message, 'error');
  }, { timeout: 8000, enableHighAccuracy: true });
}

function handleStampUpload(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  if (file.size > 1024 * 1024) { toast('Stamp image must be under 1 MB', 'error'); ev.target.value=''; return; }
  if (!file.type.startsWith('image/')) { toast('Please choose an image file', 'error'); return; }
  const reader = new FileReader();
  reader.onload = async e => {
    const dataUrl = e.target.result;
    if (!state.companyId) { toast('Company record not loaded yet', 'error'); return; }
    const { error } = await sb.from('companies').update({ company_stamp: dataUrl }).eq('id', state.companyId);
    if (error) { toast(error.message, 'error'); return; }
    state.companyStamp = dataUrl;
    render();
    toast('Company stamp uploaded — it will appear on all printed documents', 'success');
  };
  reader.readAsDataURL(file);
}

function numberToWords(num) {
  const value = Number(num) || 0;
  const whole = Math.floor(Math.abs(value));
  const cents = Math.round((Math.abs(value) - whole) * 100);
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function below1000(n) {
    if (n < 20) return ones[n];
    if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' '+ones[n%10] : '');
    return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' and '+below1000(n%100) : '');
  }
  function intToWords(n) {
    if (n === 0) return 'Zero';
    let words = '', remainder = n;
    if (remainder >= 1000000) { words += below1000(Math.floor(remainder/1000000)) + ' Million '; remainder %= 1000000; }
    if (remainder >= 1000)    { words += below1000(Math.floor(remainder/1000)) + ' Thousand '; remainder %= 1000; }
    if (remainder > 0)        { words += below1000(remainder); }
    return words.trim();
  }
  const sign = value < 0 ? 'Negative ' : '';
  const main = intToWords(whole);
  const fraction = cents > 0 ? ` and ${cents.toString().padStart(2,'0')}/100` : '';
  return sign + main + fraction + ' Only';
}

async function resetUserPassword(uid_) {
  // We can't directly reset another user's password from the client.
  // Instead, send them a Supabase reset-password email.
  const emp = state.employees.find(e => 'u-'+e.id === uid_);
  if (!emp) return;
  if (!emp.email) { toast('No email on record', 'error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(emp.email, { redirectTo: window.location.origin });
  if (error) { toast(error.message, 'error'); return; }
  toast(`Reset link sent to ${emp.email}`, 'success');
}
async function toggleUserRole(uid_) {
  const emp = state.employees.find(e => 'u-'+e.id === uid_);
  if (!emp) return;
  if (emp.user_id === state.session?.userId) {
    toast('You cannot change your own role — ask another admin', 'error');
    return;
  }
  if (emp.isAdmin) {
    const adminCount = state.employees.filter(e=>e.isAdmin).length;
    if (adminCount <= 1) { toast('At least one admin is required', 'error'); return; }
    if (!confirm(`Demote ${emp.firstName} to employee? They will lose admin access.`)) return;
  } else {
    if (!confirm(`Promote ${emp.firstName} to admin? They will get full access to all data and settings.`)) return;
  }
  const newAdmin = !emp.isAdmin;
  const { data, error } = await sb.from('employees').update({ is_admin: newAdmin }).eq('id', emp.id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(emp, mapEmployeeFromDb(data));
  render();
  toast(`${emp.firstName} is now ${newAdmin?'an admin':'an employee'}`, 'success');
}
function downloadBackup() {
  if (!isAdmin()) { toast('Admins only', 'error'); return; }
  if (!confirm(
    'Download a full backup?\n\n' +
    'This file contains all employee records, attendance, leave, payroll, ' +
    'warnings, salary advances, certificates, and uploaded documents in ' +
    'plain text. Anyone with the file can read everything. ' +
    'Save it only to a secure location.'
  )) return;
  // Strip the active session so a leaked backup can't be used to impersonate.
  const { session, ...safe } = state;
  const blob = new Blob([JSON.stringify(safe, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pulsehr-backup-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded — store it securely', 'success');
}

/* Export the dashboard's attendance snapshot for the selected date + branch */
function exportAttendanceSnapshot() {
  const filterDate   = dashAttFilter.date || todayISO();
  const filterBranch = dashAttFilter.branch || 'all';
  const empsScoped = filterBranch === 'all'
    ? state.employees
    : filterBranch === 'none'
      ? state.employees.filter(e => !((getEmpExtras(e.id).branch||'').trim()))
      : state.employees.filter(e => getEmpExtras(e.id).branch === filterBranch);
  const rows = [['Employee','Branch','Role','Department','Clock In','Clock Out','Hours','Status']];
  empsScoped.forEach(e => {
    const ex = getEmpExtras(e.id);
    const att = state.attendance.find(a => a.employeeId===e.id && a.date===filterDate);
    const onLeave = state.leaveRequests.find(r => r.status==='approved' && r.employeeId===e.id && r.startDate<=filterDate && r.endDate>=filterDate);
    const dow = new Date(filterDate+'T00:00:00').getDay();
    const isOff = ex.schedule && ex.schedule[dow] && ex.schedule[dow].off;
    let status = 'absent';
    if (att?.status === 'present') status='present';
    else if (att?.status === 'late') status='late';
    else if (onLeave) status='on_leave';
    else if (isOff) status='off';
    const hrs = att?.clockIn && att?.clockOut ? minutesToHrs(diffMinutes(att.clockIn, att.clockOut)) : '';
    rows.push([
      e.firstName+' '+e.lastName, ex.branch||'', e.role, e.department,
      att?.clockIn||'', att?.clockOut||'', hrs, status
    ]);
  });
  const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const branchTag = filterBranch === 'all' ? 'all' : filterBranch.toLowerCase().replace(/\s+/g,'-');
  a.href = url; a.download = `attendance-${filterDate}-${branchTag}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Snapshot exported', 'success');
}

/* -------------------- CSV EXPORT -------------------- */
function exportCSV(kind) {
  let rows = [], filename = kind+'.csv';
  if (kind==='employees') {
    rows = [['Name','Email','Phone','Role','Department','Branch','Nationality','Joining date','Salary','Status']];
    state.employees.forEach(e => {
      const ex = getEmpExtras(e.id);
      rows.push([e.firstName+' '+e.lastName, e.email, e.phone, e.role, e.department, ex.branch||'', ex.nationality||'', e.hireDate, e.salary, e.status]);
    });
  } else if (kind==='my-attendance') {
    const me = currentEmployee();
    rows = [['Date','Clock In','Clock Out','Hours','Status']];
    state.attendance.filter(a=>a.employeeId===me.id).forEach(a => rows.push([a.date,a.clockIn,a.clockOut||'',a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'',a.status]));
  } else if (kind==='today-attendance') {
    rows = [['Employee','Department','Clock In','Clock Out','Status']];
    const today = todayISO();
    state.employees.forEach(e => {
      const a = state.attendance.find(x=>x.employeeId===e.id&&x.date===today);
      rows.push([e.firstName+' '+e.lastName, e.department, a?.clockIn||'', a?.clockOut||'', a?.status||'absent']);
    });
  } else if (kind==='all-attendance') {
    rows = [['Date','Employee','Clock In','Clock Out','Hours','Status']];
    state.attendance.forEach(a => {
      const e = getEmployee(a.employeeId); if(!e) return;
      rows.push([a.date, e.firstName+' '+e.lastName, a.clockIn, a.clockOut||'', a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'', a.status]);
    });
  } else if (kind==='att-history-filtered') {
    rows = [['Date','Day','Employee','Branch','Role','Clock In','Clock Out','Hours','Status','Location']];
    const filtered = getAttHistFiltered();
    filtered.forEach(a => {
      const e = getEmployee(a.employeeId); if(!e) return;
      const ex = getEmpExtras(e.id);
      const dow = new Date(a.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'});
      rows.push([
        a.date, dow, e.firstName+' '+e.lastName, ex.branch||'', e.role,
        a.clockIn||'', a.clockOut||'',
        a.clockIn && a.clockOut ? minutesToHrs(diffMinutes(a.clockIn,a.clockOut)) : '',
        a.status, a.location?.label||'',
      ]);
    });
    filename = `attendance-${attHistFilter.from}_to_${attHistFilter.to}.csv`;
  } else if (kind==='payroll') {
    rows = [['Employee','Period','Base','Bonus','Deductions','Net','Status','Paid on']];
    state.payroll.forEach(p => {
      const e = getEmployee(p.employeeId); if(!e) return;
      rows.push([e.firstName+' '+e.lastName, p.period, p.base, p.bonus||0, p.deductions||0, p.net, p.status, p.paidAt]);
    });
  } else if (kind==='payroll-filtered') {
    rows = [['Employee','Branch','Department','Role','Period','Base','Bonus','Deductions','Net','Status','Paid on']];
    const admin = isAdmin();
    const me = currentEmployee();
    const baseRecords = admin ? state.payroll : state.payroll.filter(p => p.employeeId===me.id);
    const filtered = baseRecords.filter(p => {
      if (payrollFilter.employee !== 'all' && p.employeeId !== payrollFilter.employee) return false;
      if (payrollFilter.status !== 'all' && p.status !== payrollFilter.status) return false;
      if (payrollFilter.from && p.period < payrollFilter.from) return false;
      if (payrollFilter.to   && p.period > payrollFilter.to)   return false;
      const e = getEmployee(p.employeeId);
      if (!e) return false;
      if (payrollFilter.department !== 'all' && e.department !== payrollFilter.department) return false;
      if (payrollFilter.branch !== 'all') {
        const ex = getEmpExtras(e.id);
        const eb = (ex.branch||'').trim();
        if (payrollFilter.branch === 'none') { if (eb !== '') return false; }
        else if (eb !== payrollFilter.branch) return false;
      }
      if (payrollFilter.q) {
        const q = payrollFilter.q.toLowerCase();
        const hay = `${e.firstName} ${e.lastName} ${e.email} ${e.role} ${e.department} ${p.period}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    filtered.forEach(p => {
      const e = getEmployee(p.employeeId); if(!e) return;
      const ex = getEmpExtras(e.id);
      rows.push([e.firstName+' '+e.lastName, ex.branch||'', e.department, e.role, p.period, p.base, p.bonus||0, p.deductions||0, p.net, p.status, p.paidAt]);
    });
    filename = `payroll-${payrollFilter.from||'all'}_to_${payrollFilter.to||'all'}.csv`;
  } else {
    toast('Exporting current view'); return;
  }
  const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Exported '+filename, 'success');
}

      </tbody>
    </table>

    <div class="doc-sign">

function openAdvanceModal() {
  const me = currentEmployee();
  const admin = isAdmin();
  const form = `
    ${admin ? `
    <div class="mb-4">
      <label class="label">Employee</label>
      <select id="adv-emp" class="input">
        <option value="${me.id}">${escapeHTML(me.firstName+' '+me.lastName)} (me)</option>
        ${state.employees.filter(e=>e.id!==me.id).map(e=>`<option value="${e.id}">${escapeHTML(e.firstName+' '+e.lastName)} — salary ${fmtMoney(e.salary)}</option>`).join('')}
      </select>
    </div>` : ''}
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="label">Amount (${state.settings.currency})</label>
        <input id="adv-amt" class="input" type="number" min="50" step="50" placeholder="500">
        <div class="text-xs text-slate-500 mt-1">Suggestion: max 50% of monthly salary</div>
      </div>
      <div>
        <label class="label">Repayment plan</label>
        <select id="adv-deduct" class="input">
          <option value="next" selected>Deduct from next payroll</option>
          <option value="installments">Spread over 2 months</option>
          <option value="manual">Manual repayment</option>
        </select>
      </div>
      <div class="col-span-2">
        <label class="label">Reason</label>
        <textarea id="adv-reason" class="input" rows="3" placeholder="Briefly describe what the advance is for..."></textarea>
      </div>
    </div>
    <div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-800 mt-4">
      ${icon('warning','w-4 h-4 inline')} The amount will be tracked and (when configured) automatically deducted from the next payroll run after approval.
    </div>
  `;
  openModal(t('request_advance'), form, async () => {
    const empId = admin ? ($('#adv-emp')?.value || me.id) : me.id;
    const amount = Number($('#adv-amt').value)||0;
    const deduct = $('#adv-deduct').value;
    const reason = $('#adv-reason').value.trim();
    if (amount <= 0) { toast('Enter a valid amount', 'error'); return false; }
    if (!reason) { toast('Please provide a reason', 'error'); return false; }
    const payload = advanceToDb({ employeeId: empId, amount, reason, status: 'pending', deductFromPayroll: deduct });
    const { data, error } = await sb.from('advances').insert(payload).select().single();
    if (error) { toast(error.message, 'error'); return false; }
    const saved = mapAdvanceFromDb(data);
    state.advances.unshift(saved);
    render();
    toast('Advance request submitted', 'success');
    if (confirm('Open the advance request slip for printing?')) printAdvanceSlip(saved.id);
    return true;
  });
}
async function decideAdvance(id, decision) {
  const a = state.advances.find(x => x.id===id);
  if (!a) return;
  const me = currentEmployee();
  const updates = { status: decision, decided_by: me.id, decided_at: todayISO() };
  const { data, error } = await sb.from('advances').update(updates).eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(a, mapAdvanceFromDb(data));
  render();
  toast(`Advance ${decision}`, 'success');
  if (decision === 'approved' && confirm('Open the approved advance slip for printing?')) printAdvanceSlip(id);
}
async function markAdvanceRepaid(id) {
  const a = state.advances.find(x => x.id===id);
  if (!a) return;
  const { data, error } = await sb.from('advances').update({ repaid_at: todayISO() }).eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(a, mapAdvanceFromDb(data));
  render();
  toast('Marked as repaid', 'success');
}
function printAdvanceSlip(id) {
  const a = (state.advances||[]).find(x => x.id===id);

  const repaymentLabel = {
    'next':         'Deduct from next payroll',

  const fullName  = (e ? (e.firstName + ' ' + (e.lastName||'')).trim() : '—');

  const nationalId = ex.iqama?.number || '—';
  const statusLabel = (a.status||'pending').toUpperCase();
  const statusColor = { approved:'#047857', pending:'#b45309', rejected:'#b91c1c' }[a.status] || '#374151';
  const html = `<!doctype html><html><head><meta charset="utf-8"><title>Salary Advance Slip — ${escapeHTML(fullName)}</title>
  <style>
    ${LETTERHEAD_CSS}
    .status-pill { display:inline-block; padding:5px 14px; font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; border:1.5px solid ${statusColor}; color:${statusColor}; border-radius:2px; margin-left:12px; vertical-align:middle; }
    .doc-table td.amount-val { font-size:18px; font-weight:700; color:#0f172a; }
    .amount-words { font-size:12px; font-style:italic; color:#6b7280; margin-top:4px; }
    .terms { background:#fafafa; border:1px solid #e5e7eb; padding:14px 18px; font-size:13px; color:#374151; line-height:1.65; margin:24px 0 0; }
  </style></head><body>
  <div class="actions"><button class="btn" onclick="window.print()">Print or Save as PDF</button></div>
  <div class="page">
    ${letterheadHTML('SALARY ADVANCE SLIP')}
    <div class="doc-date">Date: ${fmtDate(a.requestedAt)} <span class="status-pill">${escapeHTML(statusLabel)}</span></div>
    <p class="doc-intro">This document records a salary advance request submitted by the employee named below, along with the repayment terms agreed upon.</p>
    <table class="doc-table">
      <tbody>
        <tr><td class="lbl">Full Name</td><td class="val">${escapeHTML(fullName)}</td></tr>
        <tr><td class="lbl">National ID / Residency Number</td><td class="val">${escapeHTML(nationalId)}</td></tr>
        <tr><td class="lbl">Job Title / Department</td><td class="val">${escapeHTML(e?.role||'—')} &nbsp;&middot;&nbsp; ${escapeHTML(e?.department||'—')}</td></tr>
        <tr><td class="lbl">Branch</td><td class="val">${escapeHTML(ex.branch||'—')}</td></tr>
        <tr><td class="lbl">Monthly Base Salary</td><td class="val">${fmtMoney(e?.salary||0)}</td></tr>
        <tr><td class="lbl">Advance Amount</td><td class="val amount-val">${escapeHTML(currency)} ${Number(a.amount||0).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}<div class="amount-words">${escapeHTML(amountWords)} ${escapeHTML(currency)}</div></td></tr>
        <tr><td class="lbl">Reason for Request</td><td class="val">${escapeHTML(a.reason||'—').replace(/\n/g,'<br>')}</td></tr>
        <tr><td class="lbl">Repayment Plan</td><td class="val">${escapeHTML(repaymentLabel)}</td></tr>
        <tr><td class="lbl">Date ${a.status==='approved'?'Approved':a.status==='rejected'?'Rejected':'Reviewed'}</td><td class="val">${a.decidedAt ? fmtDate(a.decidedAt) : '—'}</td></tr>
        <tr><td class="lbl">${a.status==='approved'?'Approved By':a.status==='rejected'?'Rejected By':'Reviewed By'}</td><td class="val">${escapeHTML(deciderName || '—')}</td></tr>
        ${a.repaidAt ? `<tr><td class="lbl">Repaid On</td><td class="val">${fmtDate(a.repaidAt)}</td></tr>` : ''}
      </tbody>
    </table>
    ${a.status === 'approved' ? `
      <div class="terms">
        <strong>Terms of advance:</strong> The amount above has been advanced to the named employee against future earnings. The employee acknowledges that this advance will be deducted as per the repayment plan stated above.${a.repaidAt ? ` <strong>This advance was fully repaid on ${fmtDate(a.repaidAt)}.</strong>` : ' This advance is currently outstanding and pending repayment.'}
      </div>` : ''}
    <div class="doc-sign">
      <div class="sign-row">Employee Signature:&nbsp; <span style="font-weight:400;color:#6b7280;font-size:13px">(${escapeHTML(fullName)})</span></div>
      <div class="sign-row">Authorized Signatory &mdash; HR / Management:${deciderName ? ' &nbsp; <span style="font-weight:400;color:#6b7280;font-size:13px">(' + escapeHTML(deciderName) + ')</span>' : ''}</div>
    </div>

    <div class="doc-footer">Slip reference ADV-${escapeHTML(a.id.slice(-6).toUpperCase())} &middot; Confidential financial document</div>
  </div>
  </body></html>`;
  const win = window.open('', '_blank');
  if (!win) { toast('Pop-up blocked. Allow pop-ups.', 'error'); return; }
  try { win.opener = null; } catch(_) {}
  win.document.write(html); win.document.close();
}

// Standard renewal periods used for the auto-fill buttons in the renew modal.
// IQAMA in KSA renews for 3 months; Baladiya health card for 1 year.
const IQAMA_RENEW_MONTHS    = 3;
const BALADIYA_RENEW_MONTHS = 12;
// Add `n` calendar months to today and return YYYY-MM-DD. Day clamps to the
// target month's last day if today is e.g. the 31st and the target month is
// shorter (so adding 1 month to Jan 31 gives Feb 28/29, not Mar 3).
function todayPlusMonths(n) {
  const d = new Date();
  const targetMonth = d.getMonth() + n;
  const target = new Date(d.getFullYear(), targetMonth, 1);
  const lastDay = new Date(target.getFullYear(), target.getMonth()+1, 0).getDate();
  target.setDate(Math.min(d.getDate(), lastDay));
  return target.toISOString().slice(0,10);
}
// Click handler for the renew-modal auto-fill buttons.
function applyRenewalPeriod(target) {
  const months = target === 'iqama' ? IQAMA_RENEW_MONTHS : BALADIYA_RENEW_MONTHS;
  const inputId = target === 'iqama' ? 'r-iqama-exp' : 'r-bal-exp';
  const inp = document.getElementById(inputId);
  if (inp) inp.value = todayPlusMonths(months);
}

                ${admin?`<button onclick="deleteArchiveDoc('${d.id}')" aria-label="Delete ${escapeHTML(d.name)}" title="Delete" class="text-slate-500 hover:text-rose-600 p-1.5 rounded hover:bg-slate-100">${icon('trash','w-4 h-4')}</button>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `}
  `;
}
let _archiveFile = null;
function openArchiveUploadModal() {
  _archiveFile = null;
  const form = `
    <div class="space-y-4">
      <div>
        <label class="label">Document name</label>
        <input id="ar-name" class="input" placeholder="e.g. Standard Warning Letter Template">
      </div>
      <div>
        <label class="label">Category</label>
        <select id="ar-cat" class="input">
          <option value="warning_template">Warning Letter Template</option>
          <option value="certificate_template">Certificate Template</option>
          <option value="policy">Policy</option>
          <option value="contract">Contract / Employment doc</option>
          <option value="training">Training material</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="label">Description (optional)</label>
        <textarea id="ar-desc" class="input" rows="2" placeholder="Briefly describe what this document is for..."></textarea>
      </div>
      <div>
        <label class="label">File</label>
        <input id="ar-file" type="file" class="input" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.doc,.docx,.xls,.xlsx,.txt,.csv" onchange="handleArchiveFile(event)">
        <div class="text-xs text-slate-500 mt-1">Max 5MB. Allowed: PDF, Word, Excel, images (PNG/JPG/GIF/WebP), TXT, CSV.</div>
        <div id="ar-preview" class="mt-2 text-sm text-slate-700"></div>
      </div>
    </div>
  `;
  openModal(t('upload_document'), form, async () => {
    const me = currentEmployee();
    const name = $('#ar-name').value.trim();
    const cat  = $('#ar-cat').value;
    const desc = $('#ar-desc').value.trim();
    if (!name) { toast('Document name required', 'error'); return false; }
    if (!_archiveFile) { toast('Please choose a file', 'error'); return false; }
    const payload = archiveToDb({
      name, category: cat, description: desc,
      mime: _archiveFile.mime, size: _archiveFile.size,
      dataUrl: _archiveFile.dataUrl, uploadedBy: me.id,
    });
    const { data, error } = await sb.from('archive_documents').insert(payload).select().single();
    if (error) { toast(error.message, 'error'); return false; }
    state.archive.unshift(mapArchiveFromDb(data));
    _archiveFile = null;
    render();
    toast('Document uploaded to archive', 'success');
    return true;
  });
}
// Whitelist of allowed archive MIME types. SVG and HTML are intentionally
// excluded — both can carry executable script and would be a stored-XSS
// vector when previewed/downloaded.
const ARCHIVE_ALLOWED_MIMES = new Set([
  'application/pdf',
  'image/png','image/jpeg','image/gif','image/webp',
  'application/msword',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  'application/vnd.ms-excel',
  'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
  'text/plain','text/csv',
]);
function isAllowedArchiveMime(m) { return ARCHIVE_ALLOWED_MIMES.has((m||'').toLowerCase()); }
// Sanitize a stored value before re-using it as a data: URL. Anything that
// isn't a plain image/* or application/pdf data URL is treated as opaque
// and downloaded as application/octet-stream rather than rendered.
function safeArchiveDataUrl(d) {
  const url = String(d.dataUrl || '');
  if (!/^data:[a-z.+-]+\/[a-z0-9.+-]+(;[\w=-]+)*;base64,[A-Za-z0-9+/=]*$/i.test(url)) return '';
  if (!isAllowedArchiveMime(d.mime)) return '';
  return url;
}
// Strip path separators / control chars so a malicious filename can't
// influence where the browser saves the download.
function safeFileName(n) {
  return String(n||'document').replace(/[\\/\x00-\x1f]+/g,'_').slice(0, 200) || 'document';
}
function handleArchiveFile(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { toast('File too large (max 5MB)', 'error'); ev.target.value=''; return; }
  if (!isAllowedArchiveMime(file.type)) {
    toast('Unsupported file type. Allowed: PDF, Word, Excel, images (PNG/JPG/GIF/WebP), TXT, CSV.', 'error');
    ev.target.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    _archiveFile = { name: file.name, mime: file.type, size: file.size, dataUrl: e.target.result };
    const p = document.getElementById('ar-preview');
    if (p) p.innerHTML = `${icon('check','w-4 h-4 inline text-emerald-600')} Loaded <strong>${escapeHTML(file.name)}</strong> (${(file.size/1024).toFixed(1)} KB)`;
  };
  reader.readAsDataURL(file);
}
function downloadArchiveDoc(id) {
  const d = (state.archive||[]).find(x => x.id===id);
  if (!d) return;
  const safeUrl = safeArchiveDataUrl(d);
  if (!safeUrl) { toast('This document type is not allowed for download.', 'error'); return; }
  const a = document.createElement('a');
  a.href = safeUrl;
  a.download = safeFileName(d.name);
  a.rel = 'noopener noreferrer';
  a.click();
}
function previewArchiveDoc(id) {
  const d = (state.archive||[]).find(x => x.id===id);
  if (!d) return;
  const safeUrl = safeArchiveDataUrl(d);
  if (!safeUrl) { toast('This document type cannot be previewed.', 'error'); return; }
  const win = window.open('', '_blank');
  if (!win) { toast('Pop-up blocked.', 'error'); return; }
  try { win.opener = null; } catch(_) {}
  const isImage = (d.mime||'').startsWith('image/');
  const isPdf   = (d.mime||'').includes('pdf');
  // safeUrl is a base64 data URL — base64 charset is HTML/attribute-safe,
  // but we still pass it through escapeHTML for defense in depth.
  if (isImage) win.document.write(`<title>${escapeHTML(d.name)}</title><body style="margin:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${escapeHTML(safeUrl)}" style="max-width:100%;max-height:100vh"></body>`);
  else if (isPdf) win.document.write(`<title>${escapeHTML(d.name)}</title><body style="margin:0"><embed src="${escapeHTML(safeUrl)}" type="application/pdf" style="width:100vw;height:100vh"></body>`);
  else win.document.write(`<title>${escapeHTML(d.name)}</title><body style="font-family:system-ui;padding:40px;text-align:center;color:#475569">Preview not available for this file type. Use download instead.</body>`);
  win.document.close();
}
async function deleteArchiveDoc(id) {
  if (!confirm('Delete this document permanently?')) return;
  const { error } = await sb.from('archive_documents').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.archive = state.archive.filter(d => d.id !== id);
  render();
  toast('Document deleted', 'success');
}

/* -------------------- MODAL SYSTEM -------------------- */
let modalOnSave = null;
let _modalPrevFocus = null;       // element to restore focus to on close
let _modalTrapHandler = null;     // captured to remove listener on close
// opts.saveLabel — override the default "Save" button text (e.g. "Run payroll")
function openModal(title, bodyHTML, onSave, opts = {}) {
  // Close any existing modal first so we never stack them.
  if (document.getElementById('modal-root')) closeModal();
  modalOnSave = onSave;
  _modalPrevFocus = document.activeElement;
  const titleId = 'modal-title-' + Date.now();
  const saveLabel = opts.saveLabel || t('save');
  const m = el(`
    <div id="modal-root" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop fade-in"
         role="dialog" aria-modal="true" aria-labelledby="${titleId}">
      <div class="bg-white rounded-2xl shadow-pop w-full max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-slate-100">
          <h3 id="${titleId}" class="font-display text-xl font-semibold text-slate-900">${escapeHTML(title)}</h3>
          <button onclick="closeModal()" aria-label="${escapeHTML(t('cancel'))}" class="text-slate-400 hover:text-slate-700 p-1">${icon('close','w-5 h-5')}</button>
        </div>
        <div class="p-5 overflow-y-auto">${bodyHTML}</div>
        <div class="flex justify-end gap-2 p-5 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
          <button onclick="closeModal()" class="btn btn-ghost">${escapeHTML(t('cancel'))}</button>
          <button onclick="submitModal()" class="btn btn-primary">${escapeHTML(saveLabel)}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target===m) closeModal(); });

  // Focus the first focusable element inside the modal (skip the close
  // button so the user lands on actual form content).
  const focusables = getModalFocusables(m);
  const initial = focusables.find(el => !el.matches('[aria-label]')) || focusables[1] || focusables[0];
  if (initial) initial.focus();

  // Tab/Shift+Tab focus trap.
  _modalTrapHandler = e => {
    if (e.key !== 'Tab') return;
    const list = getModalFocusables(m);
    if (list.length === 0) { e.preventDefault(); return; }
    const first = list[0], last = list[list.length-1];
    const active = document.activeElement;
    if (e.shiftKey && (active === first || !m.contains(active))) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && (active === last || !m.contains(active))) {
      e.preventDefault(); first.focus();
    }
  };
  document.addEventListener('keydown', _modalTrapHandler);
}
function getModalFocusables(root) {
  return Array.from(root.querySelectorAll(
    'a[href], button:not([disabled]), input:not([disabled]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
  )).filter(el => el.offsetParent !== null);
}
function closeModal() {
  document.getElementById('modal-root')?.remove();
  modalOnSave = null;
  // Reset transient form state so it can't bleed into the next modal.
  if (typeof _pendingPhoto !== 'undefined')  _pendingPhoto = null;
  if (typeof _archiveFile !== 'undefined')   _archiveFile = null;
  if (_modalTrapHandler) {
    document.removeEventListener('keydown', _modalTrapHandler);
    _modalTrapHandler = null;
  }
  // Return focus to whatever opened the modal (accessibility).
  if (_modalPrevFocus && document.contains(_modalPrevFocus)) {
    try { _modalPrevFocus.focus(); } catch(_) {}
  }
  _modalPrevFocus = null;
}
async function submitModal() {
  if (!modalOnSave) return closeModal();
  // MUST await: many save callbacks are async (Supabase calls). Without
  // awaiting, the modal closes synchronously and any field reads that
  // happen after the first await find an empty DOM (silent data loss —
  // saw branch/nationality/iqama persisted as null because of this).
  const result = await modalOnSave();
  if (result !== false) closeModal();
}

/* -------------------- MAIN RENDER -------------------- */
function render() {
  document.documentElement.dir = state.settings.lang==='ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = state.settings.lang;
  const app = $('#app');
  if (!state.session) { stopClockTicker(); app.innerHTML = renderLogin(); return; }
  startClockTicker();
  const route = getRoute();
  let content = '';
  switch (route) {
    case 'dashboard':    content = renderDashboard(); break;
    case 'employees':    content = isAdmin() ? renderEmployees() : renderDashboard(); break;
    case 'employee':     content = isAdmin() ? renderEmployeeProfile(getRouteParam()) : renderDashboard(); break;
    case 'attendance':   content = renderAttendance(); break;
    case 'leave':        content = renderLeave(); break;
    case 'payroll':      content = renderPayroll(); break;
    case 'warnings':     content = renderWarnings(); break;
    case 'advances':     content = renderAdvances(); break;
    case 'certificates': content = renderCertificates(); break;
    case 'documents':    content = renderDocuments(); break;
    case 'archive':      content = renderArchive(); break;
    case 'reports':      content = isAdmin() ? renderReports() : renderDashboard(); break;
    case 'settings':     content = isAdmin() ? renderSettings() : renderDashboard(); break;
    case 'account':      content = renderAccount(); break;
    default:             content = renderDashboard();
  }
  app.innerHTML = renderShell(content);
}

/* -------------------- INIT -------------------- */
async function bootstrap() {
  // Show a quick splash
  $('#app').innerHTML = `
    <div class="min-h-screen flex items-center justify-center" style="background:#fbf7f1">
      <div class="text-center">
        <div class="w-14 h-14 rounded-full border-4 border-brand-200 border-t-brand-700 animate-spin mx-auto"></div>
        <div class="mt-4 text-sm text-slate-500 font-display">Loading…</div>
      </div>
    </div>`;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
    }
  } catch(e) { console.error('Bootstrap error:', e); }
  render();

  // React to login/logout in another tab or via session expiry
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') {
      state = emptyState();
      location.hash = '';
      render();
    } else if (event === 'SIGNED_IN' && session?.user && !state.session) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
      render();
    } else if (event === 'TOKEN_REFRESHED') {
      // no-op
    }
  });
}
bootstrap();

// Live clock on dashboard. Started on first authenticated render and
// cleared on logout via stopClockTicker().
let _clockTickerId = null;
function startClockTicker() {
  if (_clockTickerId != null) return;
  _clockTickerId = setInterval(() => {
    const c = document.getElementById('dash-clock');
    if (c) c.textContent = new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }, 30000);
}
function stopClockTicker() {
  if (_clockTickerId != null) { clearInterval(_clockTickerId); _clockTickerId = null; }
}

// Global ESC handler: closes the topmost modal if any is open.
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modal-root')) {
    e.preventDefault();
    closeModal();
  }
});
</script>
