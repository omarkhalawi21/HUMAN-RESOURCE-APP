async function saveSettings() {
  const updates = {
    name: $('#set-name').value.trim() || 'Hassad Coffee Roasters',
    work_start: $('#set-start').value,
    work_end: $('#set-end').value,
    currency: $('#set-cur').value,
    require_location: $('#set-loc').checked,
    language: $('#set-lang').value,
    legal_name:          $('#set-legal')?.value.trim() || null,
    registration_number: $('#set-reg')?.value.trim()   || null,
    address_line1:       $('#set-addr1')?.value.trim() || null,
    address_line2:       $('#set-addr2')?.value.trim() || null,
    address_line3:       $('#set-addr3')?.value.trim() || null,
  };
  const { error } = await sb.from('companies').update(updates).eq('id', state.companyId);
  if (error) { toast(error.message, 'error'); return; }
  state.settings.companyName = updates.name;
  state.settings.workStart = updates.work_start;
  state.settings.workEnd = updates.work_end;
  state.settings.currency = updates.currency;
  state.settings.requireLocation = updates.require_location;
  state.settings.legalName    = updates.legal_name          || LETTERHEAD_DEFAULTS.legalName;
  state.settings.regNumber    = updates.registration_number || LETTERHEAD_DEFAULTS.regNumber;
  state.settings.addressLine1 = updates.address_line1       || LETTERHEAD_DEFAULTS.addressLine1;
  state.settings.addressLine2 = updates.address_line2       || LETTERHEAD_DEFAULTS.addressLine2;
  state.settings.addressLine3 = updates.address_line3       || LETTERHEAD_DEFAULTS.addressLine3;
  if (updates.language !== state.settings.lang) { setLang(updates.language); }
  render();
  toast('Settings saved', 'success');
}
async function resetUserPassword(uid_) {
  // We can't directly reset another user's password from the client.
  // Instead, send them a Supabase reset-password email.
  const emp = state.employees.find(e => 'u-'+e.id === uid_);
  if (!emp) return;
  if (!emp.email) { toast('No email on record', 'error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(emp.email, { redirectTo: window.location.origin });
  if (error) { toast(error.message, 'error'); return; }
  toast(`Reset link sent to ${emp.email}`, 'success');
}
async function toggleAdmin(uid_) {
  const emp = state.employees.find(e => 'u-'+e.id === uid_);
  if (!emp) return;
  if (emp.user_id === state.session?.userId) {
    toast('You cannot change your own role — ask another admin', 'error');
    return;
  }
  if (emp.isAdmin) {
    const adminCount = state.employees.filter(e=>e.isAdmin).length;
    if (adminCount <= 1) { toast('At least one admin is required', 'error'); return; }
    if (!confirm(`Demote ${emp.firstName} to employee? They will lose admin access.`)) return;
  } else {
    if (!confirm(`Promote ${emp.firstName} to admin? They will get full access to all data and settings.`)) return;
  }
  const newRole = emp.isAdmin ? 'employee' : 'admin';
  const { data, error } = await sb.from('employees').update({ system_role: newRole }).eq('id', emp.id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(emp, mapEmployeeFromDb(data));
  render();
  toast(`${emp.firstName} is now ${newRole==='admin'?'an admin':'an employee'}`, 'success');
}
function downloadBackup() {
  if (!isAdmin()) { toast('Admins only', 'error'); return; }
  if (!confirm(
    'Download a full backup?\n\n' +
    'This file contains all employee records, attendance, leave, payroll, ' +
    'warnings, salary advances, certificates, and uploaded documents in ' +
    'plain text. Anyone with the file can read everything. ' +
    'Save it only to a secure location.'
  )) return;
  // Strip the active session so a leaked backup can't be used to impersonate.
  const { session, ...safe } = state;
  const blob = new Blob([JSON.stringify(safe, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pulsehr-backup-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded — store it securely', 'success');
}

/* Export the dashboard's attendance snapshot for the selected date + branch */
function exportAttendanceSnapshot() {
  const filterDate   = dashAttFilter.date || todayISO();
  const filterBranch = dashAttFilter.branch || 'all';
  const empsScoped = filterBranch === 'all'
    ? state.employees
    : filterBranch === 'none'
      ? state.employees.filter(e => !((getEmpExtras(e.id).branch||'').trim()))
      : state.employees.filter(e => getEmpExtras(e.id).branch === filterBranch);
  const rows = [['Employee','Branch','Role','Department','Clock In','Clock Out','Hours','Status']];
  empsScoped.forEach(e => {
    const ex = getEmpExtras(e.id);
    const att = state.attendance.find(a => a.employeeId===e.id && a.date===filterDate);
    const onLeave = state.leaveRequests.find(r => r.status==='approved' && r.employeeId===e.id && r.startDate<=filterDate && r.endDate>=filterDate);
    const dow = new Date(filterDate+'T00:00:00').getDay();
    const isOff = ex.schedule && ex.schedule[dow] && ex.schedule[dow].off;
    let status = 'absent';
    if (att?.status === 'present') status='present';
    else if (att?.status === 'late') status='late';
    else if (onLeave) status='on_leave';
    else if (isOff) status='off';
    const hrs = att?.clockIn && att?.clockOut ? minutesToHrs(diffMinutes(att.clockIn, att.clockOut)) : '';
    rows.push([
      e.firstName+' '+e.lastName, ex.branch||'', e.role, e.department,
      att?.clockIn||'', att?.clockOut||'', hrs, status
    ]);
  });
  const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const branchTag = filterBranch === 'all' ? 'all' : filterBranch.toLowerCase().replace(/\s+/g,'-');
  a.href = url; a.download = `attendance-${filterDate}-${branchTag}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Snapshot exported', 'success');
}

/* -------------------- CSV EXPORT -------------------- */
function exportCSV(kind) {
  let rows = [], filename = kind+'.csv';
  if (kind==='employees') {
    rows = [['Name','Email','Phone','Role','Department','Branch','Nationality','Joining date','Salary','Status']];
    state.employees.forEach(e => {
      const ex = getEmpExtras(e.id);
      rows.push([e.firstName+' '+e.lastName, e.email, e.phone, e.role, e.department, ex.branch||'', ex.nationality||'', e.hireDate, e.salary, e.status]);
    });
  } else if (kind==='my-attendance') {
    const me = currentEmployee();
    rows = [['Date','Clock In','Clock Out','Hours','Status']];
    state.attendance.filter(a=>a.employeeId===me.id).forEach(a => rows.push([a.date,a.clockIn,a.clockOut||'',a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'',a.status]));
  } else if (kind==='today-attendance') {
    rows = [['Employee','Department','Clock In','Clock Out','Status']];
    const today = todayISO();
    state.employees.forEach(e => {
      const a = state.attendance.find(x=>x.employeeId===e.id&&x.date===today);
      rows.push([e.firstName+' '+e.lastName, e.department, a?.clockIn||'', a?.clockOut||'', a?.status||'absent']);
    });
  } else if (kind==='all-attendance') {
    rows = [['Date','Employee','Clock In','Clock Out','Hours','Status']];
    state.attendance.forEach(a => {
      const e = getEmployee(a.employeeId); if(!e) return;
      rows.push([a.date, e.firstName+' '+e.lastName, a.clockIn, a.clockOut||'', a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'', a.status]);
    });
  } else if (kind==='att-history-filtered') {
    rows = [['Date','Day','Employee','Branch','Role','Clock In','Clock Out','Hours','Status','Location']];
    const filtered = getAttHistFiltered();
    filtered.forEach(a => {
      const e = getEmployee(a.employeeId); if(!e) return;
      const ex = getEmpExtras(e.id);
      const dow = new Date(a.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'});
      rows.push([
        a.date, dow, e.firstName+' '+e.lastName, ex.branch||'', e.role,
        a.clockIn||'', a.clockOut||'',
        a.clockIn && a.clockOut ? minutesToHrs(diffMinutes(a.clockIn,a.clockOut)) : '',
        a.status, a.location?.label||'',
      ]);
    });
    filename = `attendance-${attHistFilter.from}_to_${attHistFilter.to}.csv`;
  } else if (kind==='payroll') {
    rows = [['Employee','Period','Base','Bonus','Deductions','Net','Status','Paid on']];
    state.payroll.forEach(p => {
      const e = getEmployee(p.employeeId); if(!e) return;
      rows.push([e.firstName+' '+e.lastName, p.period, p.base, p.bonus||0, p.deductions||0, p.net, p.status, p.paidAt]);
    });
  } else if (kind==='payroll-filtered') {
    rows = [['Employee','Branch','Department','Role','Period','Base','Bonus','Deductions','Net','Status','Paid on']];
    const admin = canManagePeople();
    const me = currentEmployee();
    const baseRecords = admin ? state.payroll : state.payroll.filter(p => p.employeeId===me.id);
    const filtered = baseRecords.filter(p => {
      if (payrollFilter.employee !== 'all' && p.employeeId !== payrollFilter.employee) return false;
      if (payrollFilter.status !== 'all' && p.status !== payrollFilter.status) return false;
      if (payrollFilter.from && p.period < payrollFilter.from) return false;
      if (payrollFilter.to   && p.period > payrollFilter.to)   return false;
      const e = getEmployee(p.employeeId);
      if (!e) return false;
      if (payrollFilter.department !== 'all' && e.department !== payrollFilter.department) return false;
      if (payrollFilter.branch !== 'all') {
        const ex = getEmpExtras(e.id);
        const eb = (ex.branch||'').trim();
        if (payrollFilter.branch === 'none') { if (eb !== '') return false; }
        else if (eb !== payrollFilter.branch) return false;
      }
      if (payrollFilter.q) {
        const q = payrollFilter.q.toLowerCase();
        const hay = `${e.firstName} ${e.lastName} ${e.email} ${e.role} ${e.department} ${p.period}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    filtered.forEach(p => {
      const e = getEmployee(p.employeeId); if(!e) return;
      const ex = getEmpExtras(e.id);
      rows.push([e.firstName+' '+e.lastName, ex.branch||'', e.department, e.role, p.period, p.base, p.bonus||0, p.deductions||0, p.net, p.status, p.paidAt]);
    });
    filename = `payroll-${payrollFilter.from||'all'}_to_${payrollFilter.to||'all'}.csv`;
  } else {
    toast('Exporting current view'); return;
  }
  const csv = rows.map(r => r.map(csvCell).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Exported '+filename, 'success');
}

                return `
                <tr class="hover-row">

                    ${admin ? `<button onclick="deleteWarning('${w.id}')" aria-label="Delete warning" title="Delete" class="text-slate-500 hover:text-rose-600 p-1.5 rounded hover:bg-slate-100">${icon('trash','w-4 h-4')}</button>`:''}
                  </td>
                </tr>`;

      </div>
    </div>
  `;
}
function openWarningModal() {
  const me = currentEmployee();
  const form = `
    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="label">Employee</label>
        <select id="w-emp" class="input">
          ${state.employees.map(e=>`<option value="${e.id}">${escapeHTML(e.firstName+' '+e.lastName)} — ${escapeHTML(e.role)}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="label">Severity</label>
        <select id="w-sev" class="input">
          <option value="verbal">Verbal warning</option>
          <option value="written" selected>Written warning</option>
          <option value="final">Final written warning</option>
        </select>
      </div>
      <div>
        <label class="label">Type / Category</label>
        <input id="w-type" class="input" list="w-types" placeholder="e.g. Tardiness">
        <datalist id="w-types">
          <option value="Tardiness"><option value="Absenteeism"><option value="Misconduct">
          <option value="Insubordination"><option value="Performance"><option value="Policy violation">
          <option value="Safety violation"><option value="Other">
        </datalist>
      </div>
      <div>
        <label class="label">Date of incident</label>
        <input id="w-date" class="input" type="date" value="${todayISO()}">
      </div>
      <div>
        <label class="label">Issued by</label>
        <input class="input" disabled value="${escapeHTML(me.firstName+' '+me.lastName)}">
      </div>
      <div class="col-span-2">
        <label class="label">Reason / Description</label>
        <textarea id="w-reason" class="input" rows="3" placeholder="Describe the incident clearly and factually..."></textarea>
      </div>
      <div class="col-span-2">
        <label class="label">Notes / Corrective action</label>
        <textarea id="w-notes" class="input" rows="2" placeholder="Expected behavior going forward, consequences if repeated..."></textarea>
      </div>
    </div>
  `;
  openModal(t('issue_warning'), form, async () => {
    const w = {
      employeeId: $('#w-emp').value,
      severity:   $('#w-sev').value,
      type:       $('#w-type').value.trim() || 'General',
      date:       $('#w-date').value || todayISO(),
      reason:     $('#w-reason').value.trim(),
      notes:      $('#w-notes').value.trim(),
      issuedBy:   me.id,
    };
    if (!w.employeeId || !w.reason) { toast('Employee and reason are required', 'error'); return false; }
    const { data, error } = await sb.from('warnings').insert(warningToDb(w)).select().single();
    if (error) { toast(error.message, 'error'); return false; }
    const saved = mapWarningFromDb(data);
    state.warnings.unshift(saved);
    render();
    toast('Warning issued', 'success');
    if (confirm('Open the warning letter for printing?')) printWarningLetter(saved.id);
    return true;
  });
}
async function deleteWarning(id) {
  if (!confirm('Delete this warning record? This action cannot be undone.')) return;
  const { error } = await sb.from('warnings').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.warnings = state.warnings.filter(w => w.id !== id);
  render();
  toast('Warning deleted', 'success');
}

  const me = currentEmployee();
  const admin = canManagePeople();
  const form = `
    ${admin ? `
    <div class="mb-4">
      <label class="label">Employee</label>
      <select id="adv-emp" class="input">
        <option value="${me.id}">${escapeHTML(me.firstName+' '+me.lastName)} (me)</option>
        ${state.employees.filter(e=>e.id!==me.id).map(e=>`<option value="${e.id}">${escapeHTML(e.firstName+' '+e.lastName)} — salary ${fmtMoney(e.salary)}</option>`).join('')}

        <input id="adv-amt" class="input" type="number" min="50" step="50" placeholder="500">
        <div class="text-xs text-slate-500 mt-1">Suggestion: max 50% of monthly salary</div>
      </div>
      <div>
        <label class="label">Repayment plan</label>
        <select id="adv-deduct" class="input">
          <option value="next" selected>Deduct from next payroll</option>
          <option value="installments">Spread over 2 months</option>
          <option value="manual">Manual repayment</option>
        </select>
      </div>
      <div class="col-span-2">
        <label class="label">Reason</label>
        <textarea id="adv-reason" class="input" rows="3" placeholder="Briefly describe what the advance is for..."></textarea>
      </div>
    </div>
    <div class="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-800 mt-4">
      ${icon('warning','w-4 h-4 inline')} The amount will be tracked and (when configured) automatically deducted from the next payroll run after approval.
    </div>
  `;
  openModal(t('request_advance'), form, async () => {
    const empId = admin ? ($('#adv-emp')?.value || me.id) : me.id;
    const amount = Number($('#adv-amt').value)||0;
    const deduct = $('#adv-deduct').value;
    const reason = $('#adv-reason').value.trim();
    if (amount <= 0) { toast('Enter a valid amount', 'error'); return false; }
    if (!reason) { toast('Please provide a reason', 'error'); return false; }
    const payload = advanceToDb({ employeeId: empId, amount, reason, status: 'pending', deductFromPayroll: deduct });
    const { data, error } = await sb.from('advances').insert(payload).select().single();
    if (error) { toast(error.message, 'error'); return false; }
    const saved = mapAdvanceFromDb(data);
    state.advances.unshift(saved);
    render();
    toast('Advance request submitted', 'success');
    if (confirm('Open the advance request slip for printing?')) printAdvanceSlip(saved.id);
    return true;
  });
}
async function decideAdvance(id, decision) {
  const a = state.advances.find(x => x.id===id);
  if (!a) return;
  const me = currentEmployee();
  const updates = { status: decision, decided_by: me.id, decided_at: todayISO() };
  const { data, error } = await sb.from('advances').update(updates).eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(a, mapAdvanceFromDb(data));
  render();
  toast(`Advance ${decision}`, 'success');
  if (decision === 'approved' && confirm('Open the approved advance slip for printing?')) printAdvanceSlip(id);
}
async function markAdvanceRepaid(id) {
  const a = state.advances.find(x => x.id===id);
  if (!a) return;
  const { data, error } = await sb.from('advances').update({ repaid_at: todayISO() }).eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(a, mapAdvanceFromDb(data));
  render();
  toast('Marked as repaid', 'success');
}

  const ex = getEmpExtras(a.employeeId);
  const decider = a.decidedBy ? getEmployee(a.decidedBy) : null;
  const c = state.settings;
  const repaymentLabel = {
    'next':         'Deduct from next payroll',
    'installments': 'Spread over 2 months',

/* -------------------- DOCUMENTS (IQAMA & Baladiya tracker) -------------------- */
let docFilter = 'all'; // all | expiring | expired
function renderDocuments() {
  const me = currentEmployee();
  const admin = canManagePeople();
  // Build per-employee summary (admin) or self-only (employee)
  const sources = admin ? state.employees : state.employees.filter(e => e.id===me.id);
  const rows = sources.map(e => {
    const x = getEmpExtras(e.id);
    const iqamaSt = expiryStatus(x.iqama?.expiry);
    const balSt   = expiryStatus(x.baladiya?.expiry);
    const minDays = [iqamaSt.days, balSt.days].filter(d=>d!==null).reduce((a,b)=>a===null?b:Math.min(a,b), null);
    return { e, x, iqamaSt, balSt, minDays };
  }).sort((a,b)=> {
    if (a.minDays === null) return 1;
    if (b.minDays === null) return -1;
    return a.minDays - b.minDays;
  });
  const filtered = rows.filter(r => {
    if (docFilter==='all') return true;
    const min = r.minDays;
    if (docFilter==='expired') return min !== null && min < 0;
    if (docFilter==='expiring') return min !== null && min >= 0 && min <= 30;
    return true;
  });
  const expiringCount = rows.filter(r => r.minDays !== null && r.minDays <= 30 && r.minDays >= 0).length;
  const expiredCount  = rows.filter(r => r.minDays !== null && r.minDays < 0).length;

  return `
    <div class="bg-white rounded-2xl shadow-card p-6 mb-5 relative overflow-hidden">
      <div class="absolute -top-12 -right-12 w-48 h-48 rounded-full opacity-20" style="background: radial-gradient(circle, #c44a4a 0%, transparent 70%);"></div>

// Standard renewal periods used for the auto-fill buttons in the renew modal.
// IQAMA in KSA renews for 3 months; Baladiya health card for 1 year.
const IQAMA_RENEW_MONTHS    = 3;
const BALADIYA_RENEW_MONTHS = 12;
// Add `n` calendar months to today and return YYYY-MM-DD. Day clamps to the
// target month's last day if today is e.g. the 31st and the target month is
// shorter (so adding 1 month to Jan 31 gives Feb 28/29, not Mar 3).
function todayPlusMonths(n) {
  const d = new Date();
  const targetMonth = d.getMonth() + n;
  const target = new Date(d.getFullYear(), targetMonth, 1);
  const lastDay = new Date(target.getFullYear(), target.getMonth()+1, 0).getDate();
  target.setDate(Math.min(d.getDate(), lastDay));
  return target.toISOString().slice(0,10);
}
// Click handler for the renew-modal auto-fill buttons.
function applyRenewalPeriod(target) {

  const inputId = target === 'iqama' ? 'r-iqama-exp' : 'r-bal-exp';
  const inp = document.getElementById(inputId);
  if (inp) inp.value = todayPlusMonths(months);
}

// Whitelist of allowed archive MIME types. SVG and HTML are intentionally
// excluded — both can carry executable script and would be a stored-XSS
// vector when previewed/downloaded.
const ARCHIVE_ALLOWED_MIMES = new Set([
  'application/pdf',
  'image/png','image/jpeg','image/gif','image/webp',
  'application/msword',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  'application/vnd.ms-excel',
  'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
  'text/plain','text/csv',
]);
function isAllowedArchiveMime(m) { return ARCHIVE_ALLOWED_MIMES.has((m||'').toLowerCase()); }
// Sanitize a stored value before re-using it as a data: URL. Anything that
// isn't a plain image/* or application/pdf data URL is treated as opaque
// and downloaded as application/octet-stream rather than rendered.
function safeArchiveDataUrl(d) {
  const url = String(d.dataUrl || '');
  if (!isSafeBase64DataUrl(url))    return '';
  if (!isAllowedArchiveMime(d.mime)) return '';
  return url;
}
// Strip path separators / control chars so a malicious filename can't
// influence where the browser saves the download.
function safeFileName(n) {
  return String(n||'document').replace(/[\\/\x00-\x1f]+/g,'_').slice(0, 200) || 'document';
}
async function handleArchiveFile(ev) {
  const f = await readUploadedFile(ev, {
    allowed: ARCHIVE_ALLOWED_MIMES,
    errorMsg: 'Unsupported file type. Allowed: PDF, Word, Excel, images (PNG/JPG/GIF/WebP), TXT, CSV.',
  });
  if (!f) return;
  _archiveFile = { name: f.name, mime: f.mime, size: f.size, dataUrl: f.dataUrl };
  const p = document.getElementById('ar-preview');
  if (p) p.innerHTML = `${icon('check','w-4 h-4 inline text-emerald-600')} Loaded <strong>${escapeHTML(f.name)}</strong> (${(f.size/1024).toFixed(1)} KB)`;
}
function downloadArchiveDoc(id) {
  const d = (state.archive||[]).find(x => x.id===id);
  if (!d) return;
  const safeUrl = safeArchiveDataUrl(d);
  if (!safeUrl) { toast('This document type is not allowed for download.', 'error'); return; }
  const a = document.createElement('a');
  a.href = safeUrl;
  a.download = safeFileName(d.name);
  a.rel = 'noopener noreferrer';
  a.click();
}
function previewArchiveDoc(id) {
  const d = (state.archive||[]).find(x => x.id===id);
  if (!d) return;
  const safeUrl = safeArchiveDataUrl(d);
  if (!safeUrl) { toast('This document type cannot be previewed.', 'error'); return; }
  const mime    = (d.mime||'').toLowerCase();
  const isImage = mime.startsWith('image/');
  const isPdf   = mime.includes('pdf');
  // Browsers can't render Office docs (Word / Excel / PowerPoint) inline.
  // Rather than open a popup with a useless "preview not available" page,
  // route the click to the download path so the user gets the actual file.
  if (!isImage && !isPdf) {
    downloadArchiveDoc(id);
    toast("Browser can't preview this file type — downloading instead.", 'info');
    return;
  }
  const win = window.open('', '_blank');
  if (!win) { toast('Pop-up blocked.', 'error'); return; }
  try { win.opener = null; } catch(_) {}
  // safeUrl is a base64 data URL — base64 charset is HTML/attribute-safe,
  // but we still pass it through escapeHTML for defense in depth.
  win.document.write(isImage
    ? `<title>${escapeHTML(d.name)}</title><body style="margin:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${escapeHTML(safeUrl)}" style="max-width:100%;max-height:100vh"></body>`
    : `<title>${escapeHTML(d.name)}</title><body style="margin:0"><embed src="${escapeHTML(safeUrl)}" type="application/pdf" style="width:100vw;height:100vh"></body>`);
  win.document.close();
}
async function deleteArchiveDoc(id) {
  if (!confirm('Delete this document permanently?')) return;
  const { error } = await sb.from('archive_documents').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.archive = state.archive.filter(d => d.id !== id);
  render();
  toast('Document deleted', 'success');
}

function setReceiptsFilter(updates) {

  // Vendor is keystroke-driven; debounce so we don't re-render per character

  if ('vendor' in updates) {

      render();
      const inp = document.getElementById('rcf-vendor');
      if (inp) { inp.focus(); const v = inp.value; inp.setSelectionRange(v.length, v.length); }
    }, 200);

  render();

function clearReceiptsFilter() {
  receiptsFilter = { category:'all', dateFrom:'', dateTo:'', vendor:'', uploader:'all' };
  render();
}
function setReceiptsMonth(ym) {
  if (!/^\d{4}-\d{2}$/.test(ym)) return;
  const [y, m] = ym.split('-').map(Number);
  const start = `${ym}-01`;
  const lastDay = new Date(y, m, 0).getDate();
  const end = `${ym}-${String(lastDay).padStart(2,'0')}`;
  receiptsFilter.dateFrom = start;
  receiptsFilter.dateTo   = end;
  render();
}
function getReceiptsFiltered() {
  const f = receiptsFilter;
  const v = (f.vendor||'').trim().toLowerCase();
  return (state.receipts || []).filter(r => {
    if (f.category && f.category !== 'all' && r.category !== f.category) return false;
    if (f.uploader && f.uploader !== 'all' && r.uploadedBy !== f.uploader) return false;
    if (f.dateFrom && (r.receiptDate||'') < f.dateFrom) return false;
    if (f.dateTo   && (r.receiptDate||'') > f.dateTo)   return false;
    if (v && !((r.vendor||'').toLowerCase().includes(v))) return false;
    return true;
  });
}
function isMonthSelected(ym) {
  const f = receiptsFilter;
  if (!ym || !f.dateFrom || !f.dateTo) return false;
  const [y, m] = ym.split('-').map(Number);
  const start = `${ym}-01`;
  const lastDay = new Date(y, m, 0).getDate();
  const end = `${ym}-${String(lastDay).padStart(2,'0')}`;
  return f.dateFrom === start && f.dateTo === end;
}
function hasActiveReceiptsFilter() {
  const f = receiptsFilter;
  return (f.category && f.category !== 'all')
      || (f.uploader && f.uploader !== 'all')

}

  office:        { label: 'Office',           icon: 'file' },
  other:         { label: 'Other',            icon: 'receipt' },
};

const RECEIPT_ALLOWED_MIMES = new Set([
  'image/png','image/jpeg','image/gif','image/webp','application/pdf',
]);
function isAllowedReceiptMime(m) { return RECEIPT_ALLOWED_MIMES.has((m||'').toLowerCase()); }
function safeReceiptDataUrl(r) {
  const url = String(r.dataUrl || '');
  if (!isSafeBase64DataUrl(url))    return '';
  if (!isAllowedReceiptMime(r.mime)) return '';
  return url;
}
function monthLabel(ym) {
  if (!/^\d{4}-\d{2}$/.test(ym||'')) return ym || '';
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString(state.settings.lang==='ar'?'ar':undefined, { year:'numeric', month:'long' });
}

function renderReceipts() {
  const all = (state.receipts || []).slice().sort((a,b) =>
    (b.receiptDate||'').localeCompare(a.receiptDate||'') ||
    (b.uploadedAt||'').localeCompare(a.uploadedAt||'')
  );
  const months = Array.from(new Set(all.map(r => (r.receiptDate||'').slice(0,7)).filter(Boolean))).sort().reverse();
  const f = receiptsFilter;
  const filtered = getReceiptsFiltered();
  const hasFilter = hasActiveReceiptsFilter();

  const monthlyTotals = {};
  all.forEach(r => {
    const m = (r.receiptDate||'').slice(0,7);
    if (!m) return;
    monthlyTotals[m] = (monthlyTotals[m] || 0) + (Number(r.amount) || 0);
  });

  const byMonthDay = {};
  filtered.forEach(r => {
    const m = (r.receiptDate||'').slice(0,7) || 'Unknown';
    const d = r.receiptDate || 'Unknown';
    if (!byMonthDay[m]) byMonthDay[m] = {};
    (byMonthDay[m][d] = byMonthDay[m][d] || []).push(r);
  });
  const sortedMonths = Object.keys(byMonthDay).sort().reverse();
  const grandTotal = filtered.reduce((s,r) => s + (Number(r.amount) || 0), 0);

  // Uploader dropdown — only people who have actually posted receipts
  const uploaderIds = Array.from(new Set(all.map(r => r.uploadedBy).filter(Boolean)));
  const uploaderOptions = uploaderIds
    .map(id => ({ id, emp: getEmployee(id) }))
    .filter(x => !!x.emp)
    .sort((a,b) => (a.emp.firstName||'').localeCompare(b.emp.firstName||''));

  return `

          <p class="text-slate-500 mt-1 text-sm max-w-md">Snap or upload paper receipts. Each one is stored digitally with vendor, date, amount, and category &mdash; grouped by day and totalled per month.</p>

        <div class="flex gap-2">
          ${filtered.length > 0 ? `<button onclick="printReceiptsReport()" class="btn btn-ghost">${icon('file','w-4 h-4')} Print report</button>` : ''}

    ${months.length > 0 ? `
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        ${months.slice(0, 4).map(m => {

          return `

              <div class="font-display text-xl font-semibold text-slate-900 mt-1">${fmtMoney(monthlyTotals[m]||0)}</div>

        }).join('')}

    <div class="bg-white rounded-2xl shadow-card p-4 mb-5">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 items-end">

function renderRoleDashboard() {
  if (isAdmin()) return renderDashboard();
  const role = currentRole();
  if (role === 'accounting')   return renderAccountingDashboard();
  if (role === 'operations')   return renderOperationsDashboard();
  if (role === 'maintenance')  return renderMaintenanceDashboard();
  if (role === 'head_barista') return renderHeadBaristaDashboard();
  if (role === 'roaster')      return renderRoasterDashboard();
  // Personal-view roles share one focused employee dashboard.
  if (role === 'barista' || role === 'employee') {
    return renderBaristaDashboard();
  }
  // admin and hr still use the existing HR dashboard.
  return renderDashboard();
}

function renderOperationsDashboard() {
  const me = currentEmployee();
  if (!me) return renderDashboard();

  const today = todayISO();
  const activeEmps = state.employees.filter(isActiveEmployee);
  const presentToday = state.attendance.filter(a => a.date===today && a.status!=='absent');
  const lateToday    = state.attendance.filter(a => a.date===today && a.status==='late');
  const onLeaveToday = state.leaveRequests.filter(r => r.status==='approved' && r.startDate<=today && r.endDate>=today);
  const onLeaveIds = new Set(onLeaveToday.map(r => r.employeeId));
  const presentIds = new Set(presentToday.map(a => a.employeeId));
  const absentToday = activeEmps.filter(e => !presentIds.has(e.id) && !onLeaveIds.has(e.id));
  const pendingLeave = state.leaveRequests.filter(r => r.status==='pending');

  // Branch headcount with present/leave/absent breakdown
  const branchStats = {};
  activeEmps.forEach(e => {
    const ex = getEmpExtras(e.id);
    const b = ((ex && ex.branch) || 'Unassigned').trim() || 'Unassigned';
    if (!branchStats[b]) branchStats[b] = { total:0, present:0, leave:0 };
    branchStats[b].total++;
    if (presentIds.has(e.id)) branchStats[b].present++;
    if (onLeaveIds.has(e.id)) branchStats[b].leave++;
  });
  const branches = Object.entries(branchStats).sort((a,b) => b[1].total - a[1].total);

  // Last 7 days attendance trend (Mon..Sun rolling)
  const last7 = [];
  for (let i=6;i>=0;i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    const count = state.attendance.filter(a => a.date===iso && a.status!=='absent').length;
    last7.push({ count, label: d.toLocaleDateString(undefined,{weekday:'short'}) });
  }
  const max7 = Math.max(...last7.map(x=>x.count), 1);

  // Out today (combined absent + on-leave) — capped at 8
  const outToday = [

};

  in_progress:  { label: 'In progress',  pill: 'bg-blue-50 text-blue-700' },
  resolved:     { label: 'Resolved',     pill: 'bg-emerald-50 text-emerald-700' },
  cancelled:    { label: 'Cancelled',    pill: 'bg-slate-100 text-slate-600' },
};

let maintenanceFilter = { status:'open', priority:'all', q:'' };
let _maintFilterTimer = null;

function setMaintenanceFilter(updates) {
  Object.assign(maintenanceFilter, updates);
  if ('q' in updates) {
    clearTimeout(_maintFilterTimer);
    _maintFilterTimer = setTimeout(() => {
      render();
      const inp = document.getElementById('maint-q');
      if (inp) { inp.focus(); const v = inp.value; inp.setSelectionRange(v.length, v.length); }
    }, 200);
    return;
  }
  render();
}
function clearMaintenanceFilter() {
  maintenanceFilter = { status:'all', priority:'all', q:'' };
  render();
}
function getMaintenanceFiltered() {
  const f = maintenanceFilter;
  const q = (f.q||'').trim().toLowerCase();
  return (state.maintenance || []).filter(r => {
    if (f.status   && f.status   !== 'all' && r.status   !== f.status)   return false;
    if (f.priority && f.priority !== 'all' && r.priority !== f.priority) return false;
    if (q) {
      const reporter = getEmployee(r.reportedBy);
      const reporterName = reporter ? ((reporter.firstName||'')+' '+(reporter.lastName||'')) : '';
      const hay = `${r.title} ${r.description||''} ${r.location||''} ${assetLabelForRequest(r)} ${r.branch||''} ${reporterName}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// Convenience: resolve the asset name for a maintenance request, preferring
// the asset_id FK lookup but falling back to the legacy free-text `asset`
// column on rows that pre-date the Assets registry.
function assetLabelForRequest(r) {
  if (!r) return '';
  if (r.assetId) {
    const a = (state.assets || []).find(x => x.id === r.assetId);
    return a ? a.name : '(removed asset)';

  return r.asset || '';
}

async function deleteAsset(id) {
  const a = (state.assets||[]).find(x => x.id === id);
  if (!a) return;
  const linked = (state.maintenance||[]).filter(r => r.assetId === id).length;
  const msg = linked
    ? `Delete asset "${a.name}"? ${linked} maintenance request(s) link to it — those requests will be unlinked (asset field goes blank, no request data is lost).`
    : `Delete asset "${a.name}"?`;
  if (!confirm(msg)) return;
  const { error } = await sb.from('assets').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.assets = state.assets.filter(x => x.id !== id);
  // FK is ON DELETE SET NULL on the server; mirror that locally.
  (state.maintenance||[]).forEach(r => { if (r.assetId === id) r.assetId = null; });
  toast('Asset deleted', 'success');
  render();
}

// Photo attachments on maintenance requests — images only. The full data URL
// is fetched on demand (heavy); a small JPEG thumbnail is generated client-
// side at upload time and shipped with the bulk load for cheap list-render.
// `_maintenancePhoto` carries a new upload {mime, size, dataUrl, thumbDataUrl}
// or null. `_maintenancePhotoCleared` is the "user hit the X" flag.
const MAINT_PHOTO_ALLOWED_MIMES = new Set(['image/png','image/jpeg','image/gif','image/webp']);
const MAINT_PHOTO_THUMB_MAX_PX = 200;
let _maintenancePhoto = null;
let _maintenancePhotoCleared = false;

// XSS guard: the URL must declare the same base64 image/* MIME the row
// claims AND match the shared base64 data URL shape. Don't loosen
// without revisiting the previewMaintenancePhoto document.write site.
function isSafeMaintenancePhotoUrl(url, mime) {
  if (!isSafeBase64DataUrl(url)) return false;
  const m = (mime||'').toLowerCase();
  if (!MAINT_PHOTO_ALLOWED_MIMES.has(m)) return false;
  return url.startsWith('data:' + m + ';base64,');
}
// Returns the thumb URL for display in the list / modal preview. Thumbs
// always have `image/jpeg` MIME regardless of the source — they're
// canvas-encoded JPEGs.
function maintenanceThumbUrl(r) {
  if (!r) return '';
  const u = r.photoThumbDataUrl;
  return (typeof u === 'string' && u.startsWith('data:image/jpeg;base64,')) ? u : '';
}
function maintenancePhotoPreviewHTML(src, alt) {
  return `<div class="relative inline-block">
    <img src="${src}" alt="${escapeHTML(alt)}" class="max-h-40 rounded-lg border border-slate-200" />
    <button type="button" onclick="clearMaintenancePhoto()" class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-white border border-slate-200 shadow-sm text-slate-600 hover:text-rose-600 flex items-center justify-center" title="Remove photo">${icon('close','w-3.5 h-3.5')}</button>
  </div>`;
}
// Generate a small JPEG thumbnail from an image blob. Used at upload time
// so the list can render thumbnails cheaply without streaming the full
// multi-MB photo on every page load. createImageBitmap with
// imageOrientation: 'from-image' honors EXIF orientation tags — without
// it, phone photos taken in portrait render sideways on the canvas
// (HTMLImageElement display respects EXIF but canvas drawImage does not).
async function generateImageThumbnail(blob, maxPx = MAINT_PHOTO_THUMB_MAX_PX) {
  const bitmap = await createImageBitmap(blob, { imageOrientation: 'from-image' });
  try {
    const scale = Math.min(1, maxPx / Math.max(bitmap.width, bitmap.height));
    const w = Math.max(1, Math.round(bitmap.width  * scale));
    const h = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.7);
  } finally {
    bitmap.close?.();
  }
}
async function handleMaintenancePhoto(ev) {
  const f = await readUploadedFile(ev, {
    allowed: MAINT_PHOTO_ALLOWED_MIMES,
    errorMsg: 'Unsupported file type. Use a PNG / JPG / GIF / WebP image.',
  });
  if (!f) return;
  let thumbDataUrl;
  try {
    thumbDataUrl = await generateImageThumbnail(f.file);
  } catch {
    toast('Could not generate thumbnail — using full image.', 'error');
    thumbDataUrl = f.dataUrl;
  }
  _maintenancePhoto = { mime: f.mime, size: f.size, dataUrl: f.dataUrl, thumbDataUrl };
  _maintenancePhotoCleared = false;
  const p = document.getElementById('maint-photo-preview');
  if (p) p.innerHTML = maintenancePhotoPreviewHTML(thumbDataUrl, 'Photo preview');
}
function clearMaintenancePhoto() {
  _maintenancePhoto = null;
  _maintenancePhotoCleared = true;
  const p = document.getElementById('maint-photo-preview');
  const f = document.getElementById('maint-photo');
  if (p) p.innerHTML = '<div class="text-xs text-slate-500">Photo will be removed on save.</div>';
  if (f) f.value = '';
}
// Fetch the full photo bytes for a request on demand (the bulk load skips
// this heavy column). Caches the result back into state.maintenance so a
// second view doesn't re-fetch.
async function ensureMaintenancePhotoFull(id) {
  const r = (state.maintenance||[]).find(x => x.id === id);
  if (!r || !r.hasPhoto) return null;
  if (r.photoDataUrl && isSafeMaintenancePhotoUrl(r.photoDataUrl, r.photoMime)) return r;
  const { data, error } = await sb.from('maintenance_requests')
    .select('photo_data_url, photo_mime')
    .eq('id', id).single();
  if (error || !data) return null;
  r.photoDataUrl = data.photo_data_url || null;
  if (data.photo_mime) r.photoMime = data.photo_mime;
  return r;
}
async function previewMaintenancePhoto(id) {
  const w = window.open('', '_blank');
  if (!w) { toast('Allow pop-ups to view the photo.', 'error'); return; }
  w.document.write('<!doctype html><html><head><title>Loading…</title><style>body{margin:0;background:#0f172a;color:#94a3b8;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh}</style></head><body>Loading photo…</body></html>');
  w.document.close();
  const r = await ensureMaintenancePhotoFull(id);
  if (!r) { try { w.close(); } catch(_) {} return; }
  const url = isSafeMaintenancePhotoUrl(r.photoDataUrl, r.photoMime) ? r.photoDataUrl : '';
  if (!url) {
    w.document.open();
    w.document.write('<!doctype html><html><body style="background:#0f172a;color:#94a3b8;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0">Photo unavailable</body></html>');
    w.document.close();
    return;
  }
  w.document.open();
  w.document.write(`<!doctype html><html><head><title>${escapeHTML(r.title||'Maintenance photo')}</title><style>body{margin:0;background:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh;display:block}</style></head><body><img src="${url}" alt=""></body></html>`);
  w.document.close();
}

function openMaintenanceModal(id) {
  _maintenancePhoto = null;
  _maintenancePhotoCleared = false;
  const me = currentEmployee();
  const isManager = hasRole('admin','maintenance');
  const editing = id ? (state.maintenance||[]).find(r => r.id === id) : null;
  // Only managers can edit existing requests; reporters can only create new ones.
  if (editing && !isManager) { toast('Only maintenance can edit existing requests', 'error'); return; }

  const assignableEmps = state.employees
    .filter(e => isActiveEmployee(e) && (e.systemRole === 'maintenance' || e.systemRole === 'admin'))
    .sort((a,b) => (a.firstName||'').localeCompare(b.firstName||''));

  const form = `
    <div class="space-y-4">
      <div>
        <label class="label">Title</label>
        <input id="maint-title" class="input" placeholder="e.g. Espresso machine #2 not heating" value="${escapeHTML(editing?.title||'')}">
      </div>
      <div>
        <label class="label">Description</label>
        <textarea id="maint-desc" class="input" rows="3" placeholder="What's wrong, when did it start, anything you've already tried...">${escapeHTML(editing?.description||'')}</textarea>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="label">Asset / Equipment (optional)</label>
          ${(state.assets||[]).length === 0 ? `
            <div class="text-xs text-slate-500 px-3 py-2 rounded-lg bg-slate-50 border border-dashed border-slate-200">
              No assets registered yet.
              ${hasRole('admin','maintenance') ? `<button type="button" onclick="closeModal(); location.hash='#/assets';" class="text-brand-700 hover:underline font-medium">Add one</button> first, then come back to link it here.` : 'Ask an admin / maintenance to add one.'}
            </div>
          ` : `
            <select id="maint-asset-id" class="input">
              <option value="">— None —</option>
              ${(state.assets||[]).slice().sort((a,b)=>a.name.localeCompare(b.name)).map(a =>
                `<option value="${a.id}" ${editing?.assetId===a.id?'selected':''}>${escapeHTML(a.name)}${a.branch?` · ${escapeHTML(a.branch)}`:''}</option>`
              ).join('')}
            </select>
            ${editing && !editing.assetId && editing.asset ? `
              <div class="text-[10px] text-slate-500 mt-1">Legacy text: <span class="font-medium">${escapeHTML(editing.asset)}</span>. Pick an asset above to replace it.</div>
            ` : ''}
          `}
        </div>
        <div>
          <label class="label">Location (optional)</label>
          <input id="maint-loc" class="input" placeholder="e.g. front bar, kitchen" value="${escapeHTML(editing?.location||'')}">
        </div>
        <div>
          <label class="label">Branch (optional)</label>
          <input id="maint-branch" class="input" placeholder="e.g. Khobar" value="${escapeHTML(editing?.branch||'')}">
        </div>
        <div>
          <label class="label">Priority</label>
          <select id="maint-pri" class="input">
            ${Object.entries(MAINT_PRIORITIES).map(([k,p]) => `<option value="${k}" ${(editing?.priority||'normal')===k?'selected':''}>${escapeHTML(p.label)}</option>`).join('')}
          </select>
        </div>
        ${isManager ? `
          <div>
            <label class="label">Status</label>
            <select id="maint-status" class="input">
              ${Object.entries(MAINT_STATUSES).map(([k,s]) => `<option value="${k}" ${(editing?.status||'open')===k?'selected':''}>${escapeHTML(s.label)}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="label">Assign to</label>
            <select id="maint-asg" class="input">
              <option value="">— Unassigned —</option>
              ${assignableEmps.map(e => `<option value="${e.id}" ${editing?.assignedTo===e.id?'selected':''}>${escapeHTML(((e.firstName||'')+' '+(e.lastName||'')).trim())}</option>`).join('')}
            </select>
          </div>
        ` : ''}
      </div>
      ${isManager ? `
        <div>
          <label class="label">Resolution notes (optional)</label>
          <textarea id="maint-resolution" class="input" rows="2" placeholder="What was done, parts replaced, follow-up needed...">${escapeHTML(editing?.resolution||'')}</textarea>
        </div>
      ` : ''}
      <div>
        <label class="label">Photo (optional)</label>
        <input id="maint-photo" type="file" class="input" accept="image/png,image/jpeg,image/gif,image/webp" capture="environment" onchange="handleMaintenancePhoto(event)">
        <div class="text-xs text-slate-500 mt-1">Max 5MB. PNG / JPG / GIF / WebP. On phones, the camera will open.</div>
        <div id="maint-photo-preview" class="mt-2">${(() => {
          const existing = editing && maintenanceThumbUrl(editing);
          return existing ? maintenancePhotoPreviewHTML(existing, 'Existing photo') : '';
        })()}</div>
      </div>
    </div>
  `;
  openModal(editing ? 'Edit request' : 'Report an issue', form, async () => {
    const title = $('#maint-title').value.trim();
    if (!title) { toast('Title is required', 'error'); return false; }

    // Photo is only written when changed. On edit without a new upload or
    // clear we omit the columns entirely (see the dbRow guard below) so
    // unloaded photoDataUrl doesn't accidentally wipe the row's photo.
    const photoChanged = !!_maintenancePhoto || _maintenancePhotoCleared;
    const photoFields  = photoChanged ? {
      photoMime:         _maintenancePhoto ? _maintenancePhoto.mime         : null,
      photoSize:         _maintenancePhoto ? _maintenancePhoto.size         : 0,
      photoDataUrl:      _maintenancePhoto ? _maintenancePhoto.dataUrl      : null,
      photoThumbDataUrl: _maintenancePhoto ? _maintenancePhoto.thumbDataUrl : null,
    } : {};
    const astEl  = $('#maint-asset-id');
    const astId  = astEl ? (astEl.value || null) : (editing?.assetId || null);
    const data = {
      title,
      description: $('#maint-desc').value.trim(),
      assetId:     astId,
      location:    $('#maint-loc').value.trim(),
      branch:      $('#maint-branch').value.trim(),
      priority:    $('#maint-pri').value,
      status:      isManager ? ($('#maint-status')?.value || 'open') : (editing?.status || 'open'),
      assignedTo:  isManager ? ($('#maint-asg')?.value || null) : (editing?.assignedTo || null),
      resolution:  isManager ? ($('#maint-resolution')?.value.trim() || '') : (editing?.resolution || ''),
      reportedBy:  editing?.reportedBy || me?.id,
      ...photoFields,
    };

    if (editing) {
      const dbRow = maintenanceToDb(data);
      if (!photoChanged) {
        delete dbRow.photo_mime; delete dbRow.photo_size;
        delete dbRow.photo_data_url; delete dbRow.photo_thumb_data_url;
      }
      const { data: row, error } = await sb.from('maintenance_requests').update(dbRow).eq('id', editing.id).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      Object.assign(editing, mapMaintenanceFromDb(row));
      toast('Request updated', 'success');
    } else {
      const { data: row, error } = await sb.from('maintenance_requests').insert(maintenanceToDb(data)).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      state.maintenance.unshift(mapMaintenanceFromDb(row));
      toast('Request submitted', 'success');
    }
    render();
    return true;
  }, { saveLabel: editing ? 'Save changes' : 'Submit' });
}

async function changeMaintenanceStatus(id, newStatus) {
  const r = (state.maintenance||[]).find(x => x.id === id);
  if (!r) return;
  const { data, error } = await sb.from('maintenance_requests').update({ status: newStatus }).eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(r, mapMaintenanceFromDb(data));
  render();
  toast(`Marked ${MAINT_STATUSES[newStatus]?.label || newStatus}`, 'success');
}

async function resolveMaintenance(id) {
  const r = (state.maintenance||[]).find(x => x.id === id);
  if (!r) return;
  const note = prompt('Resolution notes (optional):', r.resolution || '');
  if (note === null) return; // cancelled
  const { data, error } = await sb.from('maintenance_requests')
    .update({ status: 'resolved', resolution: note || null })
    .eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(r, mapMaintenanceFromDb(data));
  render();
  toast('Marked resolved', 'success');
}

async function deleteMaintenance(id) {
  const r = (state.maintenance||[]).find(x => x.id === id);
  if (!r) return;
  if (!confirm(`Delete this request? "${r.title}"`)) return;
  const { error } = await sb.from('maintenance_requests').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.maintenance = state.maintenance.filter(x => x.id !== id);
  render();
  toast('Request deleted', 'success');
}

function renderMaintenanceDashboard() {
  const me = currentEmployee();
  if (!me) return renderDashboard();

  const all = (state.maintenance||[]).slice();
  const open       = all.filter(r => r.status==='open');
  const inProgress = all.filter(r => r.status==='in_progress');
  const urgent     = all.filter(r => r.priority==='urgent' && r.status!=='resolved' && r.status!=='cancelled');
  const myAssigned = all.filter(r => r.assignedTo === me.id && r.status!=='resolved' && r.status!=='cancelled');

  // Resolved this week
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - 6); weekStart.setHours(0,0,0,0);
  const resolvedThisWeek = all.filter(r => r.status==='resolved' && r.resolvedAt && new Date(r.resolvedAt) >= weekStart).length;

  // Triage queue: open + in_progress, sorted by priority then created date
  const priOrder = { urgent:0, high:1, normal:2, low:3 };
  const triage = all
    .filter(r => r.status==='open' || r.status==='in_progress')
    .sort((a,b) => (priOrder[a.priority]??9) - (priOrder[b.priority]??9) || (a.createdAt||'').localeCompare(b.createdAt||''))
    .slice(0, 6);

  return `
    <!-- Hero -->
    <div class="bg-white rounded-2xl shadow-card p-6 mb-5 relative overflow-hidden">
      <div class="absolute -top-12 -right-12 w-48 h-48 rounded-full opacity-20" style="background: radial-gradient(circle, #c2914a 0%, transparent 70%);"></div>
      <div class="relative flex items-start justify-between gap-4 flex-wrap">

function getInventoryFiltered() {
  const f = inventoryFilter;
  const q = (f.q||'').trim().toLowerCase();
  return (state.inventory || []).filter(it => {
    if (f.category && f.category !== 'all' && it.category !== f.category) return false;
    if (f.branch === 'none') {
      if ((it.branch||'').trim() !== '') return false;
    } else if (f.branch && f.branch !== 'all' && (it.branch||'') !== f.branch) return false;
    if (f.lowStock && !isLowStock(it)) return false;
    if (q) {
      const hay = `${it.name} ${it.sku||''} ${supplierLabelForItem(it)} ${it.branch||''} ${it.notes||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// Convenience: look up a supplier by id with a safe fallback to the
// item's legacy free-text supplier string when no supplier_id is set.
function supplierLabelForItem(it) {
  if (!it) return '';
  if (it.supplierId) {
    const s = (state.suppliers || []).find(x => x.id === it.supplierId);
    return s ? s.name : '(removed supplier)';
  }
  return it.supplier || '';
}

    const data = {

      notes:       $('#sup-notes').value.trim(),

async function deleteSupplier(id) {
  const s = (state.suppliers||[]).find(x => x.id === id);
  if (!s) return;
  const linked = (state.inventory||[]).filter(i => i.supplierId === id).length;
  const msg = linked
    ? `Delete supplier "${s.name}"? ${linked} inventory item(s) link to this supplier — those items will be unlinked (their supplier field will go blank, no item data is lost).`
    : `Delete supplier "${s.name}"?`;
  if (!confirm(msg)) return;
  const { error } = await sb.from('suppliers').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.suppliers = state.suppliers.filter(x => x.id !== id);
  // The FK is ON DELETE SET NULL on the server; mirror that locally so
  // the UI doesn't keep pointing at a now-gone supplier.
  state.inventory.forEach(i => { if (i.supplierId === id) i.supplierId = null; });
  toast('Supplier deleted', 'success');
  render();
}

// Single source of truth for changing inventory quantity. Updates
// the item's current `quantity` AND inserts a row in
// inventory_movements so the change is in the audit ledger.
// `opts` may include type (default 'adjust'), branch, occurredAt
// (date), notes. Pass an explicit qtyDelta — positive to add,
// negative to remove. Quantity is floored at 0.
async function logInventoryMovement(itemId, qtyDelta, opts = {}) {
  const it = (state.inventory||[]).find(i => i.id === itemId);
  if (!it) return null;
  const me = currentEmployee();
  const delta = Number(qtyDelta) || 0;
  if (!delta) return null;
  const targetQty = Math.max(0, Number(it.quantity) + delta);
  // Effective delta after the floor — what actually moved on the item.
  const effectiveDelta = targetQty - Number(it.quantity);
  if (effectiveDelta === 0) return null;

  const movementRow = movementToDb({
    itemId,
    qtyDelta: effectiveDelta,
    type: opts.type || 'adjust',
    branch: opts.branch || it.branch || null,
    occurredAt: opts.occurredAt || todayISO(),
    notes: opts.notes || null,
    recordedBy: me?.id || null,
  });

  // Insert movement first so the ledger doesn't drift if the qty
  // update succeeds but the audit row never lands.
  const mIns = await sb.from('inventory_movements').insert(movementRow).select().single();
  if (mIns.error) { toast(mIns.error.message, 'error'); return null; }
  const newMovement = mapMovementFromDb(mIns.data);

  const qIns = await sb.from('inventory_items').update({ quantity: targetQty }).eq('id', itemId).select().single();
  if (qIns.error) {
    // Compensating delete — roll back the ledger row so we don't
    // claim a movement that never actually happened.
    await sb.from('inventory_movements').delete().eq('id', newMovement.id);
    toast(qIns.error.message, 'error');
    return null;
  }

  Object.assign(it, mapInventoryItemFromDb(qIns.data));
  state.inventoryMovements.unshift(newMovement);
  return newMovement;
}

async function adjustInventoryQuantity(id, delta) {
  const m = await logInventoryMovement(id, delta, { type: 'adjust' });
  if (m) render();
}

const MOVEMENT_TYPES = {
  adjust:    { label: 'Adjustment' },
  roast:     { label: 'Roasted' },
  transfer:  { label: 'Transfer' },
  pickup:    { label: 'Cafe pickup' },
  restock:   { label: 'Restock / In' },
  sale:      { label: 'Sold / Used' },
  other:     { label: 'Other' },
};

// Roaster yield bands — the healthy roast loses 8–22% of green weight.
// Below the low band means over-roast (too much loss); above the high band
// means under-roast (likely under-developed). Shared so any tone-coding
// surface (roast logger, Analytics card) uses the same source of truth.
// `darker=true` for surfaces on white backgrounds that need higher contrast
// (the inline yield readout in the roast logger); default is the standard
// shade used by Analytics cards. Literal class names so Tailwind's JIT
// sees them at build time.
const ROAST_YIELD_LOW  = 78;
const ROAST_YIELD_HIGH = 92;
function roastYieldTone(pct, darker = false) {
  if (pct == null || isNaN(pct))   return darker ? 'text-slate-500'   : 'text-slate-400';
  if (pct < ROAST_YIELD_LOW)       return darker ? 'text-rose-700'    : 'text-rose-600';
  if (pct > ROAST_YIELD_HIGH)      return darker ? 'text-amber-700'   : 'text-amber-600';
  return                                  darker ? 'text-emerald-700' : 'text-emerald-600';
}

      ${moves.length === 0 ? `

// Paired roast batch logger. One form, two movements: green-bean
// out (negative qty_delta) and roasted-bean in (positive qty_delta).
// If either insert fails after the first lands, attempt a
// compensating insert on the green item to restore stock.
async function logRoastBatch(greenItemId, roastedItemId, greenOutKg, roastedInKg, opts = {}) {
  const greenOut = await logInventoryMovement(greenItemId, -Math.abs(Number(greenOutKg)||0), {
    type: 'roast',
    occurredAt: opts.occurredAt,
    branch: opts.branch,
    notes: opts.notes ? `Roast: ${opts.notes}` : 'Roasted out',
  });
  if (!greenOut) return null;

  const roastedIn = await logInventoryMovement(roastedItemId, Math.abs(Number(roastedInKg)||0), {
    type: 'roast',
    occurredAt: opts.occurredAt,
    branch: opts.branch,
    notes: opts.notes ? `Roast: ${opts.notes}` : 'Roasted in',
  });
  if (!roastedIn) {
    // Best-effort compensating entry so green stock returns to its
    // pre-call level. Records as type='adjust' with a note pointing
    // at the failed batch so the audit trail is honest about it.
    await logInventoryMovement(greenItemId, Math.abs(Number(greenOutKg)||0), {
      type: 'adjust',
      occurredAt: opts.occurredAt,
      branch: opts.branch,
      notes: 'Reverted: paired roast destination insert failed',
    });
    return null;
  }
  return { greenOut, roastedIn };
}

  openModal('Log roast batch', form, async () => {

    const greenIn   = parseFloat($('#rb-in').value);
    const roastedOut= parseFloat($('#rb-out').value);

    if (isNaN(greenIn) || greenIn <= 0)      { toast('Enter green-in kg', 'error');    return false; }
    if (isNaN(roastedOut) || roastedOut < 0) { toast('Enter roasted-out kg', 'error'); return false; }
    const result = await logRoastBatch(greenId, roastedId, greenIn, roastedOut, {
      occurredAt: date, branch: branch || null, notes,
    });
    if (!result) return false;
    render();
    const yieldPct = greenIn > 0 ? Math.round(roastedOut / greenIn * 100) : 0;
    toast(`Roast logged — ${yieldPct}% yield`, 'success');
    return true;
  }, { saveLabel: 'Log roast' });

  // Auto-suggest roasted-out as 85% of green-in when user types into rb-in.
  setTimeout(() => recalcRoastYield(), 0);
}

function recalcRoastYield() {
  const inEl  = document.getElementById('rb-in');
  const outEl = document.getElementById('rb-out');
  const yEl   = document.getElementById('rb-yield');
  if (!inEl || !outEl || !yEl) return;
  const green = parseFloat(inEl.value) || 0;
  // Suggest 85% of green if user hasn't filled roasted yet.
  if (green > 0 && (!outEl.value || outEl.dataset.userTouched !== '1')) {
    if (document.activeElement !== outEl) {
      outEl.value = (green * 0.85).toFixed(2);
    }
  }
  outEl.addEventListener('input', () => { outEl.dataset.userTouched = '1'; }, { once: true });
  const roasted = parseFloat(outEl.value) || 0;
  if (green > 0 && roasted > 0) {
    const pct = (roasted / green) * 100;
    yEl.innerHTML = `Yield: <span class="font-semibold ${roastYieldTone(pct, true)}">${pct.toFixed(1)}%</span> &middot; loss ${(green - roasted).toFixed(2)} kg`;
  } else {
    yEl.innerHTML = 'Yield: <span class="font-semibold">—</span>';
  }
}

// Inter-branch transfer. Single movement on the source item:
// negative qty_delta, type='transfer', branch=source, notes start
// with "→ {destination}". Keeps the schema simple — the destination
// branch lives in the note. Phase D can pair this with a matching
// destination item if/when items are branch-scoped duplicates.
async function logTransfer(itemId, qty, fromBranch, toBranch, opts = {}) {
  const trimmedNotes = (opts.notes || '').trim();
  const composedNote = `→ ${toBranch || '?'}${trimmedNotes ? ' · ' + trimmedNotes : ''}`;
  return logInventoryMovement(itemId, -Math.abs(Number(qty) || 0), {
    type: 'transfer',
    branch: fromBranch || null,
    occurredAt: opts.occurredAt,
    notes: composedNote,
  });
}

// Delete a movement and restore the item quantity. Item qty change is
// the inverse of the movement's qty_delta. Floors at 0 — if the
// movement was a positive in and qty has since dropped below |delta|
// (because of subsequent outs), we can only restore to zero.
async function deleteInventoryMovement(movementId) {
  const m = (state.inventoryMovements||[]).find(x => x.id === movementId);
  if (!m) return;
  const it = (state.inventory||[]).find(x => x.id === m.itemId);
  if (!it) return;
  if (!confirm(`Delete this ${(MOVEMENT_TYPES[m.type]||MOVEMENT_TYPES.other).label.toLowerCase()} of ${m.qtyDelta>0?'+':''}${m.qtyDelta} ${it.unit||'units'} on ${fmtDate(m.occurredAt||'')}?\n\nThe item quantity will be restored.`)) return;
  const restoredQty = Math.max(0, Number(it.quantity) - Number(m.qtyDelta));

  const mDel = await sb.from('inventory_movements').delete().eq('id', movementId);
  if (mDel.error) { toast(mDel.error.message, 'error'); return; }
  const qUpd = await sb.from('inventory_items').update({ quantity: restoredQty }).eq('id', it.id).select().single();
  if (qUpd.error) {
    toast('Movement deleted, but quantity update failed: ' + qUpd.error.message, 'error');
  } else {
    Object.assign(it, mapInventoryItemFromDb(qUpd.data));
  }
  state.inventoryMovements = state.inventoryMovements.filter(x => x.id !== movementId);
  // If the history modal is open, re-render it to reflect the deletion.
  if (document.getElementById('modal-root')) {
    closeModal();
    openInventoryHistoryModal(it.id);
  }
  render();
  toast('Movement deleted, quantity restored', 'success');
}

// Letterhead-styled weekly inventory report. Mirrors the spreadsheet
// layout: green beans block, per-branch roasted shelf, packaging,
// and the week's movements. Opens in a new window with a Print/Save
// button at the top.
function printWeeklyInventoryReport() {
  const all = (state.inventory || []).slice();
  if (all.length === 0) { toast('Add inventory items first.', 'error'); return; }
  const today = new Date();
  const todayISOd = today.toISOString().slice(0,10);
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 6); weekAgo.setHours(0,0,0,0);
  const weekStartISO = weekAgo.toISOString().slice(0,10);

  const greens     = all.filter(i => i.category === 'beans_raw');
  const roasted    = all.filter(i => i.category === 'beans_roast');
  const packaging  = all.filter(i => ['packaging','cups_lids'].includes(i.category));

  const sumQty = list => list.reduce((s,i) => s + (Number(i.quantity)||0), 0);

  const moves = (state.inventoryMovements||[]).filter(m => (m.occurredAt||'') >= weekStartISO && (m.occurredAt||'') <= todayISOd);
  const movesSorted = moves.slice().sort((a,b) =>
    (b.occurredAt||'').localeCompare(a.occurredAt||'') ||
    (b.createdAt||'').localeCompare(a.createdAt||'')
  );

  // Roasted shelf grouped by branch (FAISALIYAH/KHOBAR/RAYYAN order)
  const branchGroups = {};
  roasted.forEach(it => {
    const b = (it.branch||'').trim() || 'Unassigned';
    (branchGroups[b] = branchGroups[b] || []).push(it);
  });
  const orderedBranches = [
    ...SUGGESTED_BRANCHES.filter(b => branchGroups[b]),
    ...Object.keys(branchGroups).filter(b => !SUGGESTED_BRANCHES.includes(b) && b !== 'Unassigned').sort(),
    ...(branchGroups['Unassigned'] ? ['Unassigned'] : []),
  ];

  // Per-bean roast totals over the week (sum of negative type='roast' deltas on green items, abs)
  const roastByBean = {};
  moves.filter(m => m.type === 'roast').forEach(m => {
    const it = all.find(i => i.id === m.itemId);
    if (!it || it.category !== 'beans_raw') return;
    roastByBean[it.name] = (roastByBean[it.name] || 0) + Math.abs(m.qtyDelta);
  });

  const html = `<!doctype html><html><head><meta charset="utf-8"><title>Weekly Roaster Report — ${escapeHTML(state.settings.companyName||'')}</title>
  <style>
    ${LETTERHEAD_CSS}
    .page { max-width: 960px; }
    h3.section { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#0f172a; margin:22px 0 8px; }
    table.t { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:14px; }
    table.t th { text-align:left; padding:8px 10px; background:#0f172a; color:#fff; font-size:10px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; }
    table.t td { padding:7px 10px; border-bottom:1px solid #e5e7eb; vertical-align:top; }
    table.t tr:nth-child(even) td { background:#fafafa; }
    table.t td.r, table.t th.r { text-align:right; font-variant-numeric: tabular-nums; }
    .branch-foot { background:#fdf6e8 !important; font-weight:700; }
    .small { color:#6b7280; font-size:11px; }
    @media print { .actions { display:none; } }
  </style></head><body>
  <div class="actions" style="margin:18px;"><button class="btn" onclick="window.print()">Print or Save as PDF</button></div>
  <div class="page">
    ${letterheadHTML('WEEKLY ROASTER REPORT.')}
    <div class="doc-date">Week of ${fmtDate(weekStartISO)} — ${fmtDate(todayISOd)}</div>
    <p class="doc-intro">Snapshot of green beans on hand, the roasted shelf at each branch, packaging stock, and every movement logged in the last 7 days. Issued by the Roaster department.</p>

    <h3 class="section">Green beans</h3>
    ${greens.length === 0 ? `<p class="small">No green-bean items tracked.</p>` : `
      <table class="t">
        <thead><tr><th>Bean</th><th>SKU</th><th class="r">On hand</th><th class="r">Roasted (last 7d)</th><th class="r">Reorder ≤</th></tr></thead>
        <tbody>
          ${greens.map(it => `
            <tr>
              <td>${escapeHTML(it.name||'')}</td>
              <td>${escapeHTML(it.sku||'')}</td>
              <td class="r">${Number(it.quantity).toLocaleString(undefined,{maximumFractionDigits:2})} ${escapeHTML(it.unit||'units')}</td>
              <td class="r">${(roastByBean[it.name]||0).toLocaleString(undefined,{maximumFractionDigits:2})}</td>
              <td class="r">${Number(it.reorderThreshold||0) > 0 ? Number(it.reorderThreshold).toLocaleString(undefined,{maximumFractionDigits:2}) : '—'}</td>
            </tr>`).join('')}
          <tr class="branch-foot"><td colspan="2">Total green stock</td><td class="r">${sumQty(greens).toLocaleString(undefined,{maximumFractionDigits:2})}</td><td class="r">${Object.values(roastByBean).reduce((s,n)=>s+n,0).toLocaleString(undefined,{maximumFractionDigits:2})}</td><td></td></tr>
        </tbody>
      </table>`}

    <h3 class="section">Roasted shelf — by branch</h3>
    ${roasted.length === 0 ? `<p class="small">No roasted items tracked.</p>` : orderedBranches.map(b => {
      const list = branchGroups[b];
      const total = sumQty(list);
      return `
        <table class="t">
          <thead><tr><th>${escapeHTML(b)}</th><th>SKU</th><th class="r">Qty</th><th class="r">Reorder ≤</th></tr></thead>
          <tbody>
            ${list.map(it => `
              <tr>
                <td>${escapeHTML(it.name||'')}</td>
                <td>${escapeHTML(it.sku||'')}</td>
                <td class="r">${Number(it.quantity).toLocaleString(undefined,{maximumFractionDigits:2})} ${escapeHTML(it.unit||'units')}</td>
                <td class="r">${Number(it.reorderThreshold||0) > 0 ? Number(it.reorderThreshold).toLocaleString(undefined,{maximumFractionDigits:2}) : '—'}</td>
              </tr>`).join('')}
            <tr class="branch-foot"><td colspan="2">${escapeHTML(b)} total</td><td class="r">${total.toLocaleString(undefined,{maximumFractionDigits:2})}</td><td></td></tr>
          </tbody>
        </table>`;
    }).join('')}

    ${packaging.length > 0 ? `
      <h3 class="section">Packaging &amp; cups</h3>
      <table class="t">
        <thead><tr><th>Item</th><th>SKU</th><th class="r">On hand</th><th class="r">Reorder ≤</th></tr></thead>
        <tbody>
          ${packaging.map(it => `
            <tr>
              <td>${escapeHTML(it.name||'')}</td>
              <td>${escapeHTML(it.sku||'')}</td>
              <td class="r">${Number(it.quantity).toLocaleString(undefined,{maximumFractionDigits:2})} ${escapeHTML(it.unit||'units')}</td>
              <td class="r">${Number(it.reorderThreshold||0) > 0 ? Number(it.reorderThreshold).toLocaleString(undefined,{maximumFractionDigits:2}) : '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    ` : ''}

    <h3 class="section">Movements this week (${moves.length})</h3>
    ${moves.length === 0 ? `<p class="small">No movements logged in the last 7 days.</p>` : `
      <table class="t">
        <thead><tr><th>Date</th><th>Item</th><th>Type</th><th>Branch</th><th>Notes</th><th class="r">Qty</th></tr></thead>
        <tbody>
          ${movesSorted.map(m => {
            const it = all.find(i => i.id === m.itemId);
            const recorder = getEmployee(m.recordedBy);
            const recorderName = recorder ? ((recorder.firstName||'')+' '+(recorder.lastName||'')).trim() : '';
            const positive = m.qtyDelta > 0;
            return `
              <tr>
                <td>${escapeHTML(fmtDate(m.occurredAt||''))}</td>
                <td>${escapeHTML(it?.name||'(deleted)')}</td>
                <td>${escapeHTML((MOVEMENT_TYPES[m.type]||MOVEMENT_TYPES.other).label)}</td>
                <td>${escapeHTML(m.branch||'')}</td>
                <td>${escapeHTML(m.notes||'')}${recorderName?` <span class="small">(${escapeHTML(recorderName)})</span>`:''}</td>
                <td class="r" style="color:${positive?'#047857':'#b91c1c'}">${positive?'+':''}${Number(m.qtyDelta).toLocaleString(undefined,{maximumFractionDigits:2})}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`}
  </div>
  </body></html>`;

  const w = window.open('', '_blank');
  if (!w) { toast('Popup blocked — allow popups to print', 'error'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

          <label class="label">Notes (optional)</label>
          <textarea id="mv-notes" class="input" rows="2" placeholder="batch ID, transfer destination, supplier, etc."></textarea>
        </div>
      </div>
    </div>
  `;
  openModal('Log inventory entry', form, async () => {
    const itemId = $('#mv-item').value;
    const type   = $('#mv-type').value;
    const dir    = parseInt($('#mv-dir').value, 10) || -1;
    const qty    = parseFloat($('#mv-qty').value);
    const date   = $('#mv-date').value;
    const branch = $('#mv-branch').value;
    const notes  = $('#mv-notes').value.trim();
    if (!itemId)                  { toast('Pick an item', 'error');     return false; }
    if (isNaN(qty) || qty <= 0)   { toast('Enter a positive quantity', 'error'); return false; }
    const m = await logInventoryMovement(itemId, dir * qty, {
      type, branch: branch || null, occurredAt: date, notes,
    });
    if (!m) return false;
    render();
    toast('Entry logged', 'success');
    return true;
  }, { saveLabel: 'Log entry' });
}

async function deleteInventoryItem(id) {
  const it = (state.inventory||[]).find(i => i.id === id);
  if (!it) return;
  if (!confirm(`Delete "${it.name}" from inventory? This cannot be undone.`)) return;
  const { error } = await sb.from('inventory_items').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.inventory = state.inventory.filter(i => i.id !== id);
  render();
  toast('Item deleted', 'success');
}
