<style>
  html, body { height: 100%; }
  body {
    font-family: 'Inter', 'Cairo', system-ui, sans-serif;
    background: #fbf7f1;
    color: #2a1f15;
    -webkit-font-smoothing: antialiased;
  }
  [dir="rtl"] body { font-family: 'Cairo', 'Inter', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #e1d4be; border-radius: 8px; border: 2px solid #fbf7f1; }
  ::-webkit-scrollbar-thumb:hover { background: #c8b390; }
  .nav-item.active { background: #fbf6ef; color: #6e4220; font-weight: 600; }
  .nav-item.active .icon { color: #8a5728; }
  .stat-up   { color: #047857; background: #ecfdf5; }
  .stat-down { color: #b91c1c; background: #fef2f2; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge-green  { background: #ecfdf5; color: #047857; }
  .badge-amber  { background: #fffbeb; color: #b45309; }
  .badge-red    { background: #fef2f2; color: #b91c1c; }
  .badge-blue   { background: #fbf6ef; color: #6e4220; }
  .badge-slate  { background: #f5f0e6; color: #6b5a3f; }
  .badge-purple { background: #fdf2f8; color: #c44a4a; }
  .fade-in { animation: fade .2s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .pulse-ring {
    box-shadow: 0 0 0 0 rgba(168,112,53,0.5);
    animation: pulse-ring 2s infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(168,112,53,0.4); }
    70%  { box-shadow: 0 0 0 18px rgba(168,112,53,0); }
    100% { box-shadow: 0 0 0 0 rgba(168,112,53,0); }
  }
  .dropdown { display: none; }
  .dropdown.open { display: block; }
  .modal-backdrop { background: rgba(42,31,21,0.5); backdrop-filter: blur(2px); }
  .skeleton { background: linear-gradient(90deg,#f4e8d4 0%,#fbf7f1 50%,#f4e8d4 100%); background-size: 200% 100%; animation: skel 1.2s linear infinite; }
  @keyframes skel { from {background-position: 200% 0;} to {background-position: -200% 0;} }
  .hover-row:hover { background: #fbf6ef; }
  .input { width: 100%; border: 1px solid #e8dcc4; border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; transition: border .15s, box-shadow .15s; background: white; color: #2a1f15; }
  .input:focus { border-color: #a87035; box-shadow: 0 0 0 3px rgba(168,112,53,0.18); }
  .label { font-size: 12px; font-weight: 600; color: #6b5a3f; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; transition: all .15s; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: #6e4220; color: white; }
  .btn-primary:hover { background: #58351c; }
  .btn-accent { background: #c44a4a; color: white; }
  .btn-accent:hover { background: #a93838; }
  .btn-ghost { background: white; color: #4a3922; border-color: #e8dcc4; }
  .btn-ghost:hover { background: #fbf6ef; }
  .btn-danger { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-success { background: #047857; color: white; }
  .btn-success:hover { background: #036647; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
  .clock-tile {
    background: linear-gradient(135deg, #422813 0%, #6e4220 45%, #a87035 100%);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .clock-tile::after {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(196,74,74,0.35), transparent 70%);
    pointer-events: none;
  }
  table.data { width: 100%; border-collapse: separate; border-spacing: 0; }
  table.data th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b5a3f; text-align: start; padding: 14px 16px; background: #fbf6ef; border-bottom: 1px solid #e8dcc4; }
  table.data td { padding: 14px 16px; border-bottom: 1px solid #f4e8d4; font-size: 14px; color: #2a1f15; }
  table.data tbody tr:last-child td { border-bottom: none; }
  .avatar { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-weight: 600; color: white; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: #2a1f15; color: white; padding: 12px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 500; box-shadow: 0 10px 30px rgba(42,31,21,0.25);
    animation: slideIn .25s ease-out;
  }
  [dir="rtl"] .toast { right: auto; left: 20px; animation: slideInL .25s ease-out; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes slideInL { from { transform: translateX(-20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .tab { padding: 10px 16px; border-bottom: 2px solid transparent; font-size: 14px; font-weight: 500; color: #6b5a3f; cursor: pointer; transition: all .15s; }
  .tab.active { color: #6e4220; border-bottom-color: #a87035; }
  .tab:hover:not(.active) { color: #2a1f15; }
  .progress-bar { height: 8px; background: #f4e8d4; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#a87035,#6e4220); transition: width .3s; }

  /* Mobile responsive: hamburger sidebar */
  .sidebar-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(42,31,21,0.5);
    backdrop-filter: blur(2px); z-index: 30;
  }
  body.sidebar-open .sidebar-backdrop { display: block; }
  @media (max-width: 768px) {
    .app-sidebar {
      position: fixed !important; top: 0; bottom: 0; left: 0; z-index: 40;
      transform: translateX(-100%); transition: transform .25s ease-out;
    }
    [dir="rtl"] .app-sidebar { left: auto; right: 0; transform: translateX(100%); }
    body.sidebar-open .app-sidebar { transform: translateX(0); }
    .topbar-search { display: none !important; }
    .stat-card-caption { display: none; }
  }

  @media print {
    body { background: white; }
    .no-print, aside, header { display: none !important; }
    main { padding: 0 !important; }
    .payslip-print { box-shadow: none !important; border: 1px solid #e8dcc4; }
  }

  [dir="rtl"] .rtl-flip { transform: scaleX(-1); }

/* -------------------- STATE / PERSISTENCE -------------------- */
const STORAGE_KEY = 'pulsehr_state_v1';
let state;

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) { console.warn('Bad state', e); }
  }

function handlePhotoUpload(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { toast('Image too large (max 2MB)', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    _pendingPhoto = e.target.result;
    const preview = document.getElementById('m-photo-preview');
    if (preview) preview.innerHTML = `<img src="${escapeHTML(_pendingPhoto)}" class="w-full h-full object-cover" alt="">`;
  };
  reader.readAsDataURL(file);
}
function clearPendingPhoto() {
  _pendingPhoto = null;
  const preview = document.getElementById('m-photo-preview');
  if (preview) preview.innerHTML = '?';
  toast('Photo will be removed on save');
}
function pickColor() {
  const palette = ['#6e4220','#a87035','#c44a4a','#7c3aed','#059669','#db2777','#ea580c','#0891b2','#9333ea','#475569'];
  return palette[Math.floor(Math.random()*palette.length)];
}

function computeAttStats(records) {
  const present = records.filter(r => r.status==='present').length;
  const late = records.filter(r => r.status==='late').length;
  const absent = records.filter(r => r.status==='absent').length;
  const totalMin = records.filter(r=>r.clockIn && r.clockOut).reduce((s,r)=>s+diffMinutes(r.clockIn,r.clockOut),0);
  const avgHrs = records.length ? minutesToHrs(totalMin / Math.max(1,records.length)) : '0.00';
  return { present, late, absent, avgHrs };
}
function miniStat(label, value, ico, color) {
  const colors = { green:'bg-emerald-50 text-emerald-600', amber:'bg-amber-50 text-amber-600', red:'bg-rose-50 text-rose-600', blue:'bg-brand-50 text-brand-600' };
  return `
    <div class="bg-white rounded-xl shadow-card p-4 flex items-center gap-3">

        <div class="text-xl font-bold text-slate-900">${value}</div>

async function clockIn() {
  const me = currentEmployee();
  const now = nowHHMM();
  const lateMin = diffMinutes(state.settings.workStart, now);
  const status = lateMin > 5 ? 'late' : 'present';
  const record = {
    id: uid(), employeeId: me.id, date: todayISO(),
    clockIn: now, clockOut: null, status,
    location: null, notes: ''
  };
  if (state.settings.requireLocation && navigator.geolocation) {
    toast('Capturing location...');
    try {
      const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
      record.location = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'Captured' };
    } catch(e) {
      record.location = { label: 'Location unavailable' };
    }
  }
  state.attendance.push(record);
  state.activity.unshift({ id: uid(), at: new Date().toISOString(), text: `${me.firstName} clocked in at ${now}`, icon:'clock' });
  saveState(); render();
  toast(status==='late' ? `Clocked in (late by ${lateMin}m)` : 'Clocked in successfully', 'success');
}
function clockOut() {
  const me = currentEmployee();
  const today = todayISO();
  const rec = state.attendance.find(a => a.employeeId===me.id && a.date===today);
  if (!rec) { toast('No clock-in found', 'error'); return; }
  rec.clockOut = nowHHMM();
  saveState(); render();
  toast('Clocked out — have a good rest!', 'success');
}

function balanceCard(label, used, total, color) {
  const remaining = used; // already remaining
  const pct = (used/total)*100;
  return `
    <div class="bg-white rounded-2xl shadow-card p-5">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${escapeHTML(label)} Leave</span>
        <span class="badge badge-slate">${remaining}/${total}</span>
      </div>
      <div class="text-2xl font-bold text-slate-900">${remaining} <span class="text-sm font-normal text-slate-500">days left</span></div>
      <div class="progress-bar mt-3"><div class="progress-fill" style="width:${pct}%; background:${color}"></div></div>
    </div>
  `;
}
function openLeaveModal() {
  const me = currentEmployee();
  const form = `
    <div class="grid grid-cols-2 gap-4">
      <div><label class="label">Type</label>
        <select id="lv-type" class="input">
          <option value="annual">Annual</option>
          <option value="sick">Sick</option>
          <option value="personal">Personal</option>
        </select>
      </div>
      <div><label class="label">Days</label><input id="lv-days" class="input" type="number" min="1" value="1" readonly></div>
      <div><label class="label">Start date</label><input id="lv-start" class="input" type="date" value="${todayISO()}" oninput="calcLeaveDays()"></div>
      <div><label class="label">End date</label><input id="lv-end" class="input" type="date" value="${todayISO()}" oninput="calcLeaveDays()"></div>
      <div class="col-span-2"><label class="label">Reason</label><textarea id="lv-reason" class="input" rows="3" placeholder="Optional notes for your manager..."></textarea></div>
    </div>
  `;
  openModal(t('request_leave'), form, () => {
    const start = $('#lv-start').value, end = $('#lv-end').value;
    if (!start || !end || end<start) { toast('Invalid dates', 'error'); return false; }
    const days = Math.max(1, Math.round((new Date(end) - new Date(start))/86400000)+1);
    state.leaveRequests.push({
      id: uid(), employeeId: me.id, type: $('#lv-type').value,
      startDate: start, endDate: end, days, reason: $('#lv-reason').value.trim(),
      status: 'pending', requestedAt: todayISO()
    });
    saveState(); render();
    toast('Leave request submitted', 'success');
    return true;
  });
  setTimeout(calcLeaveDays, 50);
}
function calcLeaveDays() {
  const s = $('#lv-start')?.value, e = $('#lv-end')?.value;
  if (!s || !e) return;
  const d = Math.max(1, Math.round((new Date(e) - new Date(s))/86400000)+1);
  if ($('#lv-days')) $('#lv-days').value = d;
}
function decideLeave(id, decision) {
  const r = state.leaveRequests.find(x=>x.id===id);
  if (!r) return;
  r.status = decision; r.decidedBy = currentUser().id; r.decidedAt = todayISO();
  if (decision==='approved') {
    const bal = state.leaveBalances[r.employeeId];
    if (bal && bal[r.type]!=null) bal[r.type] = Math.max(0, bal[r.type] - r.days);
  }
  saveState(); render();
  toast(`Request ${decision}`, 'success');
}

function runPayroll() {
  const ym = new Date().toISOString().slice(0,7);
  if (state.payroll.some(p => p.period===ym)) {
    if (!confirm(`Payroll for ${ym} already exists. Run again (will duplicate)?`)) return;
  }
  state.employees.forEach(e => {
    state.payroll.push({
      id: uid(), employeeId: e.id, period: ym,
      base: e.salary, bonus: 0, deductions: 0,
      net: e.salary, status: 'paid', paidAt: todayISO()
    });
  });
  saveState(); render();
  toast(`Payroll run for ${ym} — ${state.employees.length} payslips generated`, 'success');
}

            ${state.employees.map(e => {
              const ps = state.payroll.filter(p=>p.employeeId===e.id);
              const tb = ps.reduce((s,p)=>s+p.base,0);
              const tbo= ps.reduce((s,p)=>s+(p.bonus||0),0);
              const tn = ps.reduce((s,p)=>s+p.net,0);
              return `<tr class="hover-row">
                <td><div class="flex items-center gap-2">${avatarHTML(e,28)}<span class="font-medium">${escapeHTML(e.firstName+' '+e.lastName)}</span></div></td>
                <td>${ps.length}</td>
                <td>${fmtMoney(tb)}</td>
                <td class="text-emerald-600">+${fmtMoney(tbo)}</td>
                <td class="font-bold">${fmtMoney(tn)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>
      `}
    </div>
  `;
}

/* -------------------- SETTINGS -------------------- */
function renderSettings() {
  const s = state.settings;
  return `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div class="bg-white rounded-2xl shadow-card p-6">
        <h3 class="font-semibold text-slate-900 mb-1">Company</h3>
        <p class="text-sm text-slate-500 mb-5">These settings apply to the whole organization.</p>
        <div class="space-y-4">
          <div><label class="label">Company name</label><input id="set-name" class="input" value="${escapeHTML(s.companyName)}"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="label">Work day starts</label><input id="set-start" type="time" class="input" value="${s.workStart}"></div>
            <div><label class="label">Work day ends</label><input id="set-end"   type="time" class="input" value="${s.workEnd}"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="label">Currency</label>
              <select id="set-cur" class="input">
                ${['SAR','AED','USD','EUR','GBP','EGP'].map(c=>`<option value="${c}" ${s.currency===c?'selected':''}>${c}</option>`).join('')}
              </select>
            </div>
            <div><label class="label">Language</label>
              <select id="set-lang" class="input">
                <option value="en" ${s.lang==='en'?'selected':''}>English</option>
                <option value="ar" ${s.lang==='ar'?'selected':''}>العربية</option>
              </select>
            </div>
          </div>
          <div class="flex items-center gap-3 pt-2">
            <input id="set-loc" type="checkbox" ${s.requireLocation?'checked':''} class="w-4 h-4 accent-brand-600">
            <label for="set-loc" class="text-sm text-slate-700">Capture location on clock-in (browser geolocation)</label>
          </div>
        </div>
        <button onclick="saveSettings()" class="btn btn-primary mt-5">${icon('check','w-4 h-4')} ${escapeHTML(t('save'))}</button>
      </div>

      <div class="bg-white rounded-2xl shadow-card p-6">
        <h3 class="font-semibold text-slate-900 mb-1">Users & accounts</h3>
        <p class="text-sm text-slate-500 mb-5">Login accounts that map to employees.</p>
        <div class="space-y-2 max-h-96 overflow-y-auto">
          ${state.users.map(u => {
            const e = getEmployee(u.employeeId);
            return `
            <div class="flex items-center gap-3 p-3 rounded-lg bg-slate-50">
              ${avatarHTML(e,32)}
              <div class="flex-1 min-w-0">
                <div class="font-medium text-slate-900 text-sm truncate">${escapeHTML(e?(e.firstName+' '+e.lastName):'(no employee)')}</div>
                <div class="text-xs text-slate-500">@${escapeHTML(u.username)}</div>
              </div>
              <span class="badge ${u.role==='admin'?'badge-purple':'badge-slate'}">${escapeHTML(u.role)}</span>
              <button onclick="resetUserPassword('${u.id}')" class="text-xs text-brand-600 hover:underline">reset pw</button>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-card p-6 lg:col-span-2">
        <h3 class="font-semibold text-slate-900 mb-1">Danger zone</h3>
        <p class="text-sm text-slate-500 mb-5">Reset all data or clear specific sections.</p>
        <div class="flex flex-wrap gap-3">
          <button onclick="if(confirm('Wipe all data and re-seed?')) { resetState(); location.hash='#/dashboard'; render(); toast('Reset to sample data','success'); }" class="btn btn-danger">${icon('trash','w-4 h-4')} Reset everything</button>
          <button onclick="if(confirm('Clear all attendance records?')) { state.attendance=[]; saveState(); render(); toast('Attendance cleared','success'); }" class="btn btn-ghost">Clear attendance</button>
          <button onclick="downloadBackup()" class="btn btn-ghost">${icon('download','w-4 h-4')} Download backup</button>
        </div>
      </div>
    </div>
  `;
}
function saveSettings() {
  state.settings.companyName = $('#set-name').value.trim() || 'Company';
  state.settings.workStart = $('#set-start').value;
  state.settings.workEnd = $('#set-end').value;
  state.settings.currency = $('#set-cur').value;
  state.settings.requireLocation = $('#set-loc').checked;
  const newLang = $('#set-lang').value;
  if (newLang !== state.settings.lang) { setLang(newLang); }
  saveState(); render();
  toast('Settings saved', 'success');
}
function resetUserPassword(uid_) {
  const u = state.users.find(x=>x.id===uid_);
  if (!u) return;
  const newPw = 'pw' + Math.random().toString(36).slice(2,8);
  u.password = newPw; saveState();
  toast(`New password for @${u.username}: ${newPw}`, 'success');
}
function downloadBackup() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pulsehr-backup-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

/* -------------------- CSV EXPORT -------------------- */
function exportCSV(kind) {
  let rows = [], filename = kind+'.csv';
  if (kind==='employees') {
    rows = [['Name','Email','Phone','Role','Department','Hire date','Salary','Status']];
    state.employees.forEach(e => rows.push([e.firstName+' '+e.lastName, e.email, e.phone, e.role, e.department, e.hireDate, e.salary, e.status]));
  } else if (kind==='my-attendance') {
    const me = currentEmployee();
    rows = [['Date','Clock In','Clock Out','Hours','Status']];
    state.attendance.filter(a=>a.employeeId===me.id).forEach(a => rows.push([a.date,a.clockIn,a.clockOut||'',a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'',a.status]));
  } else if (kind==='today-attendance') {
    rows = [['Employee','Department','Clock In','Clock Out','Status']];
    const today = todayISO();
    state.employees.forEach(e => {
      const a = state.attendance.find(x=>x.employeeId===e.id&&x.date===today);
      rows.push([e.firstName+' '+e.lastName, e.department, a?.clockIn||'', a?.clockOut||'', a?.status||'absent']);
    });
  } else if (kind==='all-attendance') {
    rows = [['Date','Employee','Clock In','Clock Out','Hours','Status']];
    state.attendance.forEach(a => {
      const e = getEmployee(a.employeeId); if(!e) return;
      rows.push([a.date, e.firstName+' '+e.lastName, a.clockIn, a.clockOut||'', a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'', a.status]);
    });
  } else if (kind==='payroll') {
    rows = [['Employee','Period','Base','Bonus','Deductions','Net','Status','Paid on']];
    state.payroll.forEach(p => {
      const e = getEmployee(p.employeeId); if(!e) return;
      rows.push([e.firstName+' '+e.lastName, p.period, p.base, p.bonus||0, p.deductions||0, p.net, p.status, p.paidAt]);
    });
  } else {
    toast('Exporting current view'); return;
  }
  const csv = rows.map(r => r.map(v => {
    const s = String(v??'');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Exported '+filename, 'success');
}

/* -------------------- MODAL SYSTEM -------------------- */
let modalOnSave = null;
function openModal(title, bodyHTML, onSave) {
  modalOnSave = onSave;
  const m = el(`
    <div id="modal-root" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop fade-in">
      <div class="bg-white rounded-2xl shadow-pop w-full max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-slate-100">
          <h3 class="font-semibold text-lg text-slate-900">${escapeHTML(title)}</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 p-1">${icon('close','w-5 h-5')}</button>
        </div>
        <div class="p-5 overflow-y-auto">${bodyHTML}</div>
        <div class="flex justify-end gap-2 p-5 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
          <button onclick="closeModal()" class="btn btn-ghost">${escapeHTML(t('cancel'))}</button>
          <button onclick="submitModal()" class="btn btn-primary">${escapeHTML(t('save'))}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target===m) closeModal(); });
}
function closeModal() { document.getElementById('modal-root')?.remove(); modalOnSave=null; }
function submitModal() {
  if (!modalOnSave) return closeModal();
  const result = modalOnSave();
  if (result !== false) closeModal();
}

/* -------------------- MAIN RENDER -------------------- */
function render() {
  document.documentElement.dir = state.settings.lang==='ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = state.settings.lang;
  const app = $('#app');
  if (!state.session) { app.innerHTML = renderLogin(); return; }
  const route = getRoute();
  let content = '';
  switch (route) {
    case 'dashboard':  content = renderDashboard(); break;
    case 'employees':  content = isAdmin() ? renderEmployees() : renderDashboard(); break;
    case 'attendance': content = renderAttendance(); break;
    case 'leave':      content = renderLeave(); break;
    case 'payroll':    content = renderPayroll(); break;
    case 'reports':    content = isAdmin() ? renderReports() : renderDashboard(); break;
    case 'settings':   content = isAdmin() ? renderSettings() : renderDashboard(); break;
    default:           content = renderDashboard();
  }
  app.innerHTML = renderShell(content);
}

/* -------------------- INIT -------------------- */
render();

// Live clock on dashboard
setInterval(() => {
  const c = document.getElementById('dash-clock');
  if (c) c.textContent = new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}, 30000);
</script>
