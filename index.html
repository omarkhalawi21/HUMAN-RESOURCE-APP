<style>
  html, body { height: 100%; }
  body {
    font-family: 'Inter', 'Cairo', system-ui, sans-serif;

  }
  [dir="rtl"] body { font-family: 'Cairo', 'Inter', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #e1d4be; border-radius: 8px; border: 2px solid #fbf7f1; }
  ::-webkit-scrollbar-thumb:hover { background: #c8b390; }
  .nav-item.active { background: #fbf6ef; color: #6e4220; font-weight: 600; }
  .nav-item.active .icon { color: #8a5728; }
  .stat-up   { color: #047857; background: #ecfdf5; }
  .stat-down { color: #b91c1c; background: #fef2f2; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge-green  { background: #ecfdf5; color: #047857; }
  .badge-amber  { background: #fffbeb; color: #b45309; }
  .badge-red    { background: #fef2f2; color: #b91c1c; }
  .badge-blue   { background: #fbf6ef; color: #6e4220; }
  .badge-slate  { background: #f5f0e6; color: #6b5a3f; }
  .badge-purple { background: #fdf2f8; color: #c44a4a; }
  .fade-in { animation: fade .2s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .pulse-ring {
    box-shadow: 0 0 0 0 rgba(168,112,53,0.5);
    animation: pulse-ring 2s infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(168,112,53,0.4); }
    70%  { box-shadow: 0 0 0 18px rgba(168,112,53,0); }
    100% { box-shadow: 0 0 0 0 rgba(168,112,53,0); }
  }
  .dropdown { display: none; }
  .dropdown.open { display: block; }
  .modal-backdrop { background: rgba(42,31,21,0.5); backdrop-filter: blur(2px); }
  .skeleton { background: linear-gradient(90deg,#f4e8d4 0%,#fbf7f1 50%,#f4e8d4 100%); background-size: 200% 100%; animation: skel 1.2s linear infinite; }
  @keyframes skel { from {background-position: 200% 0;} to {background-position: -200% 0;} }
  .hover-row:hover { background: #fbf6ef; }
  .input { width: 100%; border: 1px solid #e8dcc4; border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; transition: border .15s, box-shadow .15s; background: white; color: #2a1f15; }
  .input:focus { border-color: #a87035; box-shadow: 0 0 0 3px rgba(168,112,53,0.18); }
  .label { font-size: 12px; font-weight: 600; color: #6b5a3f; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; transition: all .15s; cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
  .btn-primary { background: #6e4220; color: white; }
  .btn-primary:hover { background: #58351c; }
  .btn-accent { background: #c44a4a; color: white; }
  .btn-accent:hover { background: #a93838; }
  .btn-ghost { background: white; color: #4a3922; border-color: #e8dcc4; }
  .btn-ghost:hover { background: #fbf6ef; }
  .btn-danger { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .btn-danger:hover { background: #fee2e2; }
  .btn-success { background: #047857; color: white; }
  .btn-success:hover { background: #036647; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
  .clock-tile {
    background: linear-gradient(135deg, #422813 0%, #6e4220 45%, #a87035 100%);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .clock-tile::after {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(196,74,74,0.35), transparent 70%);
    pointer-events: none;
  }
  table.data { width: 100%; border-collapse: separate; border-spacing: 0; }
  table.data th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b5a3f; text-align: start; padding: 14px 16px; background: #fbf6ef; border-bottom: 1px solid #e8dcc4; }
  table.data td { padding: 14px 16px; border-bottom: 1px solid #f4e8d4; font-size: 14px; color: #2a1f15; }
  table.data tbody tr:last-child td { border-bottom: none; }
  .avatar { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-weight: 600; color: white; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .toast {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: #2a1f15; color: white; padding: 12px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 500; box-shadow: 0 10px 30px rgba(42,31,21,0.25);
    animation: slideIn .25s ease-out;
  }
  [dir="rtl"] .toast { right: auto; left: 20px; animation: slideInL .25s ease-out; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes slideInL { from { transform: translateX(-20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .tab { padding: 10px 16px; border-bottom: 2px solid transparent; font-size: 14px; font-weight: 500; color: #6b5a3f; cursor: pointer; transition: all .15s; }
  .tab.active { color: #6e4220; border-bottom-color: #a87035; }
  .tab:hover:not(.active) { color: #2a1f15; }
  .progress-bar { height: 8px; background: #f4e8d4; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#a87035,#6e4220); transition: width .3s; }

  /* Mobile responsive: hamburger sidebar */
  .sidebar-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(42,31,21,0.5);
    backdrop-filter: blur(2px); z-index: 30;
  }
  body.sidebar-open .sidebar-backdrop { display: block; }
  @media (max-width: 768px) {
    .app-sidebar {
      position: fixed !important; top: 0; bottom: 0; left: 0; z-index: 40;
      transform: translateX(-100%); transition: transform .25s ease-out;
    }
    [dir="rtl"] .app-sidebar { left: auto; right: 0; transform: translateX(100%); }
    body.sidebar-open .app-sidebar { transform: translateX(0); }
    .topbar-search { display: none !important; }
    .stat-card-caption { display: none; }
  }

  @media print {
    body { background: white; }
    .no-print, aside, header { display: none !important; }
    main { padding: 0 !important; }
    .payslip-print { box-shadow: none !important; border: 1px solid #e8dcc4; }
  }

  /* RTL adjustments */
  [dir="rtl"] .rtl-flip { transform: scaleX(-1); }

/* -------------------- LOAD ALL FROM SUPABASE -------------------- */
async function loadAll() {
  isLoadingData = true;
  try {
    const [companyR, employeesR, attendanceR, leaveR, payrollR] = await Promise.all([
      sb.from('companies').select('*').limit(1).maybeSingle(),
      sb.from('employees').select('*').order('first_name'),
      sb.from('attendance').select('*').order('date', { ascending: false }),
      sb.from('leave_requests').select('*').order('created_at', { ascending: false }),
      sb.from('payroll').select('*').order('period', { ascending: false }),
    ]);
    if (companyR.data) {
      const c = mapCompanyFromDb(companyR.data);
      state.companyId = c._id;
      state.settings = { companyName: c.companyName, workStart: c.workStart, workEnd: c.workEnd, currency: c.currency, lang: c.lang || state.settings.lang, requireLocation: c.requireLocation };
    }
    state.employees = (employeesR.data || []).map(mapEmployeeFromDb);
    state.attendance = (attendanceR.data || []).map(mapAttendanceFromDb);
    state.leaveRequests = (leaveR.data || []).map(mapLeaveFromDb);
    state.payroll = (payrollR.data || []).map(mapPayrollFromDb);
    state.leaveBalances = {};
    state.employees.forEach(e => {
      state.leaveBalances[e.id] = { annual: e.leave_annual, sick: e.leave_sick, personal: e.leave_personal };
    });
    state.users = state.employees.filter(e => e.user_id).map(e => ({
      id: 'u-'+e.id, username: e.email, role: e.isAdmin?'admin':'employee', employeeId: e.id, user_id: e.user_id
    }));
  } catch(e) {
    console.error('Load failed:', e);
    toast('Failed to load data: '+e.message, 'error');
  } finally {
    isLoadingData = false;
  }
}

let authMode = 'login';
function setAuthMode(m) { authMode = m; render(); }
function togglePw(id) {
  const i = $('#'+(id||'login-password'));
  if (i) i.type = i.type==='password' ? 'text' : 'password';
}
async function doLogin() {
  const email = $('#login-email').value.trim();
  const password = $('#login-password').value;
  if (!email || !password) { toast('Email and password required', 'error'); return; }
  const btn = $('#login-submit'); if (btn) { btn.disabled = true; btn.style.opacity='0.6'; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (btn) { btn.disabled = false; btn.style.opacity=''; }
  if (error) { toast(error.message || 'Invalid credentials', 'error'); return; }
  await afterAuth(data.user);
}
async function doSignup() {
  const firstName = $('#signup-fn').value.trim();
  const lastName  = $('#signup-ln').value.trim();
  const email     = $('#signup-email').value.trim();
  const password  = $('#signup-password').value;
  if (!firstName || !email) { toast('First name and email required', 'error'); return; }
  if (!password || password.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
  const btn = $('#signup-submit'); if (btn) { btn.disabled = true; btn.style.opacity='0.6'; }
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { first_name: firstName, last_name: lastName } }
  });
  if (btn) { btn.disabled = false; btn.style.opacity=''; }
  if (error) { toast(error.message || 'Sign up failed', 'error'); return; }
  // If email confirmation is on, session will be null until they confirm.
  if (!data.session) {
    toast('Check your email to confirm your account.', 'success');
    return;
  }
  await afterAuth(data.user);
}
async function afterAuth(user) {
  state.session = { userId: user.id, email: user.email, loggedAt: new Date().toISOString() };
  await loadAll();
  const me = currentEmployee();
  toast(`${t('welcome_back')}, ${me?.firstName||user.email}!`, 'success');

}

async function deleteEmployee(id) {
  if (!confirm(t('confirm_delete'))) return;
  const { error } = await sb.from('employees').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  state.employees = state.employees.filter(e => e.id!==id);
  delete state.leaveBalances[id];
  render();
  toast('Employee removed', 'success');
}
let _pendingPhoto = null;
function openEmployeeModal(id) {
  const editing = id ? getEmployee(id) : null;
  _pendingPhoto = editing?.photo || null;
  const form = `
    <div class="flex items-center gap-4 mb-4 pb-4 border-b border-slate-100">
      <div id="m-photo-preview" class="w-20 h-20 rounded-full overflow-hidden flex items-center justify-center text-white font-bold text-2xl shrink-0" style="background:${editing?.avatarColor || '#a87035'}">
        ${editing?.photo ? `<img src="${escapeHTML(editing.photo)}" class="w-full h-full object-cover" alt="">` : escapeHTML((editing?.firstName?.[0]||'?')+(editing?.lastName?.[0]||''))}
      </div>
      <div class="flex-1">
        <div class="text-sm font-semibold text-slate-700 mb-1">Profile photo</div>
        <div class="text-xs text-slate-500 mb-2">JPG or PNG, ideally square. Stays in your browser only.</div>
        <div class="flex gap-2">
          <label class="btn btn-ghost btn-sm cursor-pointer">
            ${icon('plus','w-4 h-4')} Choose photo
            <input type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)" />
          </label>
          ${editing?.photo ? '<button type="button" onclick="clearPendingPhoto()" class="btn btn-danger btn-sm">Remove</button>' : ''}

      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="label">First name</label><input id="m-fn" class="input" value="${escapeHTML(editing?.firstName||'')}"></div>
      <div><label class="label">Last name</label><input id="m-ln" class="input" value="${escapeHTML(editing?.lastName||'')}"></div>
      <div class="col-span-2"><label class="label">Email</label><input id="m-em" class="input" type="email" value="${escapeHTML(editing?.email||'')}"></div>
      <div><label class="label">Phone</label><input id="m-ph" class="input" value="${escapeHTML(editing?.phone||'')}"></div>
      <div><label class="label">Role</label><input id="m-ro" class="input" value="${escapeHTML(editing?.role||'')}"></div>
      <div><label class="label">Department</label><input id="m-dp" class="input" list="dept-list" value="${escapeHTML(editing?.department||'')}">
        <datalist id="dept-list">${[...new Set(state.employees.map(e=>e.department))].map(d=>`<option value="${escapeHTML(d)}">`).join('')}</datalist>
      </div>
      <div><label class="label">Hire date</label><input id="m-hd" class="input" type="date" value="${escapeHTML(editing?.hireDate||todayISO())}"></div>
      <div><label class="label">Monthly salary (${state.settings.currency})</label><input id="m-sa" class="input" type="number" min="0" step="100" value="${editing?.salary||0}"></div>
      <div><label class="label">Status</label>
        <select id="m-st" class="input">
          <option value="active" ${editing?.status==='active'?'selected':''}>Active</option>
          <option value="on_leave" ${editing?.status==='on_leave'?'selected':''}>On leave</option>
        </select>
      </div>
    </div>
  `;
  openModal(editing ? 'Edit employee' : t('add_employee'), form, async () => {
    const data = {
      firstName: $('#m-fn').value.trim(),
      lastName:  $('#m-ln').value.trim(),
      email:     $('#m-em').value.trim(),
      phone:     $('#m-ph').value.trim(),
      role:      $('#m-ro').value.trim() || 'Employee',
      department:$('#m-dp').value.trim() || 'General',
      hireDate:  $('#m-hd').value,
      salary:    Number($('#m-sa').value)||0,
      status:    $('#m-st').value,
    };
    if (!data.firstName || !data.email) { toast('Name and email required', 'error'); return false; }
    const dbRow = { ...employeeToDb(data), photo: _pendingPhoto, avatar_color: editing?.avatarColor || pickColor() };
    if (editing) {
      const { data: row, error } = await sb.from('employees').update(dbRow).eq('id', editing.id).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      const updated = mapEmployeeFromDb(row);
      Object.assign(editing, updated);
      toast('Employee updated', 'success');
    } else {
      const { data: row, error } = await sb.from('employees').insert(dbRow).select().single();
      if (error) { toast(error.message, 'error'); return false; }
      const newE = mapEmployeeFromDb(row);
      state.employees.push(newE);
      state.leaveBalances[newE.id] = { annual: newE.leave_annual, sick: newE.leave_sick, personal: newE.leave_personal };
      toast('Employee added. Share the signup link with them so they can create a password.', 'success');
    }
    _pendingPhoto = null;
    render();
    return true;
  });
}
function handlePhotoUpload(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { toast('Image too large (max 2MB)', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    _pendingPhoto = e.target.result;
    const preview = document.getElementById('m-photo-preview');
    if (preview) preview.innerHTML = `<img src="${escapeHTML(_pendingPhoto)}" class="w-full h-full object-cover" alt="">`;
  };
  reader.readAsDataURL(file);
}
function clearPendingPhoto() {
  _pendingPhoto = null;
  const preview = document.getElementById('m-photo-preview');
  if (preview) preview.innerHTML = '?';
  toast('Photo will be removed on save');
}
function pickColor() {
  const palette = ['#6e4220','#a87035','#c44a4a','#7c3aed','#059669','#db2777','#ea580c','#0891b2','#9333ea','#475569'];
  return palette[Math.floor(Math.random()*palette.length)];
}

function computeAttStats(records) {
  const present = records.filter(r => r.status==='present').length;
  const late = records.filter(r => r.status==='late').length;
  const absent = records.filter(r => r.status==='absent').length;
  const totalMin = records.filter(r=>r.clockIn && r.clockOut).reduce((s,r)=>s+diffMinutes(r.clockIn,r.clockOut),0);
  const avgHrs = records.length ? minutesToHrs(totalMin / Math.max(1,records.length)) : '0.00';
  return { present, late, absent, avgHrs };
}
function miniStat(label, value, ico, color) {
  const colors = { green:'bg-emerald-50 text-emerald-600', amber:'bg-amber-50 text-amber-600', red:'bg-rose-50 text-rose-600', blue:'bg-brand-50 text-brand-600' };
  return `
    <div class="bg-white rounded-xl shadow-card p-4 flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg ${colors[color]} flex items-center justify-center">${icon(ico,'w-5 h-5')}</div>
      <div>
        <div class="text-xs text-slate-500">${escapeHTML(label)}</div>
        <div class="text-xl font-bold text-slate-900">${value}</div>
      </div>
    </div>
  `;
}
async function clockIn() {
  const me = currentEmployee();
  if (!me) { toast('Not signed in', 'error'); return; }
  const now = nowHHMM();
  const lateMin = diffMinutes(state.settings.workStart, now);
  const status = lateMin > 5 ? 'late' : 'present';
  let location = null;
  if (state.settings.requireLocation && navigator.geolocation) {
    toast('Capturing location...');
    try {
      const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
      location = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'Captured' };
    } catch(e) {
      location = { label: 'Location unavailable' };
    }
  }
  const { data, error } = await sb.from('attendance').insert({
    employee_id: me.id, date: todayISO(),
    clock_in: now, clock_out: null, status,
    location_lat: location?.lat || null, location_lng: location?.lng || null, location_label: location?.label || null
  }).select().single();
  if (error) { toast(error.message, 'error'); return; }
  state.attendance.unshift(mapAttendanceFromDb(data));
  render();
  toast(status==='late' ? `Clocked in (late by ${lateMin}m)` : 'Clocked in successfully', 'success');
}
async function clockOut() {
  const me = currentEmployee();
  if (!me) return;
  const today = todayISO();
  const rec = state.attendance.find(a => a.employeeId===me.id && a.date===today);
  if (!rec) { toast('No clock-in found', 'error'); return; }
  const newOut = nowHHMM();
  const { data, error } = await sb.from('attendance').update({ clock_out: newOut }).eq('id', rec.id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(rec, mapAttendanceFromDb(data));
  render();
  toast('Clocked out — have a good rest!', 'success');
}

function balanceCard(label, used, total, color) {
  const remaining = used; // already remaining
  const pct = (used/total)*100;
  return `
    <div class="bg-white rounded-2xl shadow-card p-5">
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${escapeHTML(label)} Leave</span>
        <span class="badge badge-slate">${remaining}/${total}</span>
      </div>
      <div class="text-2xl font-bold text-slate-900">${remaining} <span class="text-sm font-normal text-slate-500">days left</span></div>
      <div class="progress-bar mt-3"><div class="progress-fill" style="width:${pct}%; background:${color}"></div></div>
    </div>
  `;
}
function openLeaveModal() {
  const me = currentEmployee();
  const form = `
    <div class="grid grid-cols-2 gap-4">
      <div><label class="label">Type</label>
        <select id="lv-type" class="input">
          <option value="annual">Annual</option>
          <option value="sick">Sick</option>
          <option value="personal">Personal</option>
        </select>
      </div>
      <div><label class="label">Days</label><input id="lv-days" class="input" type="number" min="1" value="1" readonly></div>
      <div><label class="label">Start date</label><input id="lv-start" class="input" type="date" value="${todayISO()}" oninput="calcLeaveDays()"></div>
      <div><label class="label">End date</label><input id="lv-end" class="input" type="date" value="${todayISO()}" oninput="calcLeaveDays()"></div>
      <div class="col-span-2"><label class="label">Reason</label><textarea id="lv-reason" class="input" rows="3" placeholder="Optional notes for your manager..."></textarea></div>
    </div>
  `;
  openModal(t('request_leave'), form, async () => {
    const start = $('#lv-start').value, end = $('#lv-end').value;
    if (!start || !end || end<start) { toast('Invalid dates', 'error'); return false; }
    const days = Math.max(1, Math.round((new Date(end) - new Date(start))/86400000)+1);
    const { data, error } = await sb.from('leave_requests').insert({
      employee_id: me.id, leave_type: $('#lv-type').value,
      start_date: start, end_date: end, days, reason: $('#lv-reason').value.trim(),
      status: 'pending'
    }).select().single();
    if (error) { toast(error.message, 'error'); return false; }
    state.leaveRequests.unshift(mapLeaveFromDb(data));
    render();
    toast('Leave request submitted', 'success');
    return true;
  });
  setTimeout(calcLeaveDays, 50);
}
function calcLeaveDays() {
  const s = $('#lv-start')?.value, e = $('#lv-end')?.value;
  if (!s || !e) return;
  const d = Math.max(1, Math.round((new Date(e) - new Date(s))/86400000)+1);
  if ($('#lv-days')) $('#lv-days').value = d;
}
async function decideLeave(id, decision) {
  const r = state.leaveRequests.find(x=>x.id===id);
  if (!r) return;
  const me = currentEmployee();
  const updates = { status: decision, decided_by: me?.id || null, decided_at: new Date().toISOString() };
  const { data, error } = await sb.from('leave_requests').update(updates).eq('id', id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(r, mapLeaveFromDb(data));
  if (decision==='approved') {
    // Decrement employee's leave balance
    const emp = getEmployee(r.employeeId);
    if (emp) {
      const balField = 'leave_'+r.type;
      const newBal = Math.max(0, (emp[balField]||0) - r.days);
      const dbField = balField; // same name in DB
      const { data: empRow, error: balErr } = await sb.from('employees').update({ [dbField]: newBal }).eq('id', r.employeeId).select().single();
      if (!balErr && empRow) {
        Object.assign(emp, mapEmployeeFromDb(empRow));
        state.leaveBalances[r.employeeId] = { annual: emp.leave_annual, sick: emp.leave_sick, personal: emp.leave_personal };
      }
    }
  }
  render();
  toast(`Request ${decision}`, 'success');
}

async function runPayroll() {
  const ym = new Date().toISOString().slice(0,7);
  if (state.payroll.some(p => p.period===ym)) {
    if (!confirm(`Payroll for ${ym} already exists. Run again (will duplicate)?`)) return;
  }
  const rows = state.employees.map(e => ({
    employee_id: e.id, period: ym,
    base: e.salary, bonus: 0, deductions: 0,
    net: e.salary, status: 'paid', paid_at: todayISO()
  }));
  if (rows.length === 0) { toast('No employees to pay', 'error'); return; }
  const { data, error } = await sb.from('payroll').insert(rows).select();
  if (error) { toast(error.message, 'error'); return; }
  (data || []).forEach(r => state.payroll.unshift(mapPayrollFromDb(r)));
  render();
  toast(`Payroll run for ${ym} — ${rows.length} payslips generated`, 'success');
}

let reportType = 'attendance';
let reportRange = { from: '', to: '' };
function renderReports() {
  if (!reportRange.from) {

    reportRange.from = d.toISOString().slice(0,10);

  }
  const recs = state.attendance.filter(a => a.date>=reportRange.from && a.date<=reportRange.to);

    const k = a.employeeId;
    if (!byEmp[k]) byEmp[k] = { present:0, late:0, absent:0, mins:0, days:0 };
    byEmp[k][a.status] = (byEmp[k][a.status]||0) + 1;
    if (a.clockIn && a.clockOut) {

          <button onclick="window.print()" class="btn btn-ghost">${icon('report','w-4 h-4')} ${escapeHTML(t('print'))}</button>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-2xl shadow-card overflow-hidden">
      ${reportType==='attendance' ? `
        <div class="p-5 border-b border-slate-100"><h3 class="font-display text-lg font-semibold text-slate-900">Attendance Summary</h3><div class="text-xs text-slate-500">${reportRange.from} → ${reportRange.to}</div></div>
        <div class="overflow-x-auto"><table class="data">
          <thead><tr><th>Employee</th><th>Department</th><th>Present</th><th>Late</th><th>Absent</th><th>Days worked</th><th>Avg hours/day</th></tr></thead>
          <tbody>
            ${state.employees.map(e => {
              const s = byEmp[e.id]||{present:0,late:0,absent:0,mins:0,days:0};
              return `<tr class="hover-row">
                <td><div class="flex items-center gap-2">${avatarHTML(e,28)}<span class="font-medium">${escapeHTML(e.firstName+' '+e.lastName)}</span></div></td>

                <td><span class="badge badge-amber">${s.late}</span></td>

      ` : reportType==='leave' ? `
        <div class="p-5 border-b border-slate-100"><h3 class="font-display text-lg font-semibold text-slate-900">Leave Summary</h3></div>
        <div class="overflow-x-auto"><table class="data">

      `}
    </div>

async function changeMyPassword() {
  const cur = $('#acc-current').value;
  const newPw = $('#acc-new').value;
  const confirmPw = $('#acc-confirm').value;
  if (!newPw || newPw.length < 6) { toast('New password must be at least 6 characters', 'error'); return; }
  if (newPw !== confirmPw) { toast('Passwords do not match', 'error'); return; }
  // Verify current password by attempting a sign-in
  const email = state.session?.email;
  if (!email) { toast('Session expired', 'error'); return; }
  if (cur) {
    const verify = await sb.auth.signInWithPassword({ email, password: cur });
    if (verify.error) { toast('Current password is incorrect', 'error'); return; }
  }
  const { error } = await sb.auth.updateUser({ password: newPw });
  if (error) { toast(error.message, 'error'); return; }
  $('#acc-current').value = '';
  $('#acc-new').value = '';
  $('#acc-confirm').value = '';
  toast('Password updated successfully', 'success');
}

async function saveSettings() {
  const updates = {
    name: $('#set-name').value.trim() || 'Hassad Coffee Roasters',
    work_start: $('#set-start').value,
    work_end: $('#set-end').value,
    currency: $('#set-cur').value,
    require_location: $('#set-loc').checked,
    language: $('#set-lang').value,
  };
  const { error } = await sb.from('companies').update(updates).eq('id', state.companyId);
  if (error) { toast(error.message, 'error'); return; }
  state.settings.companyName = updates.name;
  state.settings.workStart = updates.work_start;
  state.settings.workEnd = updates.work_end;
  state.settings.currency = updates.currency;
  state.settings.requireLocation = updates.require_location;
  if (updates.language !== state.settings.lang) { setLang(updates.language); }
  render();
  toast('Settings saved', 'success');
}
async function resetUserPassword(uid_) {
  // We can't directly reset another user's password from the client.
  // Instead, send them a Supabase reset-password email.
  const emp = state.employees.find(e => 'u-'+e.id === uid_);
  if (!emp) return;
  if (!emp.email) { toast('No email on record', 'error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(emp.email, { redirectTo: window.location.origin });
  if (error) { toast(error.message, 'error'); return; }
  toast(`Reset link sent to ${emp.email}`, 'success');
}
async function toggleUserRole(uid_) {
  const emp = state.employees.find(e => 'u-'+e.id === uid_);
  if (!emp) return;
  if (emp.user_id === state.session?.userId) {
    toast('You cannot change your own role — ask another admin', 'error');
    return;
  }
  if (emp.isAdmin) {
    const adminCount = state.employees.filter(e=>e.isAdmin).length;
    if (adminCount <= 1) { toast('At least one admin is required', 'error'); return; }
    if (!confirm(`Demote ${emp.firstName} to employee? They will lose admin access.`)) return;
  } else {
    if (!confirm(`Promote ${emp.firstName} to admin? They will get full access to all data and settings.`)) return;
  }
  const newAdmin = !emp.isAdmin;
  const { data, error } = await sb.from('employees').update({ is_admin: newAdmin }).eq('id', emp.id).select().single();
  if (error) { toast(error.message, 'error'); return; }
  Object.assign(emp, mapEmployeeFromDb(data));
  render();
  toast(`${emp.firstName} is now ${newAdmin?'an admin':'an employee'}`, 'success');
}
function downloadBackup() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pulsehr-backup-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

/* -------------------- CSV EXPORT -------------------- */
function exportCSV(kind) {
  let rows = [], filename = kind+'.csv';
  if (kind==='employees') {
    rows = [['Name','Email','Phone','Role','Department','Hire date','Salary','Status']];
    state.employees.forEach(e => rows.push([e.firstName+' '+e.lastName, e.email, e.phone, e.role, e.department, e.hireDate, e.salary, e.status]));
  } else if (kind==='my-attendance') {
    const me = currentEmployee();
    rows = [['Date','Clock In','Clock Out','Hours','Status']];
    state.attendance.filter(a=>a.employeeId===me.id).forEach(a => rows.push([a.date,a.clockIn,a.clockOut||'',a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'',a.status]));
  } else if (kind==='today-attendance') {
    rows = [['Employee','Department','Clock In','Clock Out','Status']];
    const today = todayISO();
    state.employees.forEach(e => {
      const a = state.attendance.find(x=>x.employeeId===e.id&&x.date===today);
      rows.push([e.firstName+' '+e.lastName, e.department, a?.clockIn||'', a?.clockOut||'', a?.status||'absent']);
    });
  } else if (kind==='all-attendance') {
    rows = [['Date','Employee','Clock In','Clock Out','Hours','Status']];
    state.attendance.forEach(a => {
      const e = getEmployee(a.employeeId); if(!e) return;
      rows.push([a.date, e.firstName+' '+e.lastName, a.clockIn, a.clockOut||'', a.clockIn&&a.clockOut?minutesToHrs(diffMinutes(a.clockIn,a.clockOut)):'', a.status]);
    });
  } else if (kind==='payroll') {
    rows = [['Employee','Period','Base','Bonus','Deductions','Net','Status','Paid on']];
    state.payroll.forEach(p => {
      const e = getEmployee(p.employeeId); if(!e) return;
      rows.push([e.firstName+' '+e.lastName, p.period, p.base, p.bonus||0, p.deductions||0, p.net, p.status, p.paidAt]);
    });
  } else {
    toast('Exporting current view'); return;
  }
  const csv = rows.map(r => r.map(v => {
    const s = String(v??'');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Exported '+filename, 'success');
}

/* -------------------- MODAL SYSTEM -------------------- */
let modalOnSave = null;
function openModal(title, bodyHTML, onSave) {
  modalOnSave = onSave;
  const m = el(`
    <div id="modal-root" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop fade-in">
      <div class="bg-white rounded-2xl shadow-pop w-full max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-slate-100">
          <h3 class="font-display text-xl font-semibold text-slate-900">${escapeHTML(title)}</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 p-1">${icon('close','w-5 h-5')}</button>
        </div>
        <div class="p-5 overflow-y-auto">${bodyHTML}</div>
        <div class="flex justify-end gap-2 p-5 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
          <button onclick="closeModal()" class="btn btn-ghost">${escapeHTML(t('cancel'))}</button>
          <button onclick="submitModal()" class="btn btn-primary">${escapeHTML(t('save'))}</button>
        </div>
      </div>
    </div>
  `);
  document.body.appendChild(m);
  m.addEventListener('click', e => { if (e.target===m) closeModal(); });
}
function closeModal() { document.getElementById('modal-root')?.remove(); modalOnSave=null; }
function submitModal() {
  if (!modalOnSave) return closeModal();
  const result = modalOnSave();
  if (result !== false) closeModal();
}

/* -------------------- MAIN RENDER -------------------- */
function render() {
  document.documentElement.dir = state.settings.lang==='ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = state.settings.lang;
  const app = $('#app');
  if (!state.session) { app.innerHTML = renderLogin(); return; }
  const route = getRoute();
  let content = '';
  switch (route) {
    case 'dashboard':  content = renderDashboard(); break;
    case 'employees':  content = isAdmin() ? renderEmployees() : renderDashboard(); break;
    case 'attendance': content = renderAttendance(); break;
    case 'leave':      content = renderLeave(); break;
    case 'payroll':    content = renderPayroll(); break;
    case 'reports':    content = isAdmin() ? renderReports() : renderDashboard(); break;
    case 'settings':   content = isAdmin() ? renderSettings() : renderDashboard(); break;
    case 'account':    content = renderAccount(); break;
    default:           content = renderDashboard();
  }
  app.innerHTML = renderShell(content);
}

/* -------------------- INIT -------------------- */
async function bootstrap() {
  // Show a quick splash
  $('#app').innerHTML = `
    <div class="min-h-screen flex items-center justify-center" style="background:#fbf7f1">
      <div class="text-center">
        <div class="w-14 h-14 rounded-full border-4 border-brand-200 border-t-brand-700 animate-spin mx-auto"></div>
        <div class="mt-4 text-sm text-slate-500 font-display">Loading…</div>
      </div>
    </div>`;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
    }
  } catch(e) { console.error('Bootstrap error:', e); }
  render();

  // React to login/logout in another tab or via session expiry
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') {
      state = emptyState();
      location.hash = '';
      render();
    } else if (event === 'SIGNED_IN' && session?.user && !state.session) {
      state.session = { userId: session.user.id, email: session.user.email, loggedAt: new Date().toISOString() };
      await loadAll();
      render();
    } else if (event === 'TOKEN_REFRESHED') {
      // no-op
    }
  });
}
bootstrap();

// Live clock on dashboard
setInterval(() => {
  const c = document.getElementById('dash-clock');
  if (c) c.textContent = new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}, 30000);
</script>
